<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lessons — Ai Visual Guitar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d2e; --surface2:#22263a;
    --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.06);
    --red:#e05540; --red-dark:#c44432; --blue:#4f8ef7;
    --gold:#e8a020; --teal:#2dd4bf; --green:#3dba72;
    --vizi:#3dba72; --vizi-light:#2e9658;
    --text:#f0ede8; --text-mid:#a89f94; --text-light:#6b6560;
    --white:#1a1d2e; --shadow:rgba(0,0,0,0.35); --shadow-lg:rgba(0,0,0,0.55);
    --cream:#0f1117; --cream-dark:rgba(255,255,255,0.10); --cream-mid:rgba(255,255,255,0.06);
    /* strum player */
    --neck:#3d2a18; --neck-dark:#2a1d10;
    --slot-empty-bg:rgba(255,255,255,0.10); --slot-empty-border:rgba(255,255,255,0.20);
    --slot-down-bg:rgba(217,64,37,0.38); --slot-down-border:#D94025;
    --slot-up-bg:rgba(80,130,210,0.38); --slot-up-border:#6b9fd4;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:400;
    min-height:100vh; padding-bottom:5rem;
  }

  /* nav */
  nav{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:.85rem 1.5rem; background:rgba(15,17,23,0.96);
    backdrop-filter:blur(12px); border-bottom:1.5px solid var(--border);
  }
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;color:var(--text)}
  .nav-link{font-size:.82rem;font-weight:600;color:var(--text);text-decoration:none;padding:7px 16px;border-radius:6px;border:2px solid var(--cream-dark);transition:all .2s;}
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}

  /* panel */
  .panel-wrap{ max-width:920px; margin:1rem auto 0; padding:0 1.5rem; }
  .cat-panel{display:none;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;box-shadow:0 8px 28px var(--shadow);overflow:hidden;animation:fade-up .35s ease both;}
  .cat-panel.show{display:block}
  @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .cat-head{padding:1.6rem 2rem 1.4rem;border-bottom:1.5px solid var(--border);background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .cat-stage-tag{font-family:'DM Mono',monospace;font-size:.87rem;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;}
  .cat-title{font-family:'Playfair Display',serif;font-weight:900;font-size:1.95rem;letter-spacing:-.01em;color:var(--text);}
  .cat-desc{color:var(--text-mid);font-size:.92rem;margin-top:.5rem;max-width:480px;line-height:1.6;font-weight:400}
  .cat-close{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;width:34px;height:34px;flex-shrink:0;cursor:pointer;font-size:1rem;color:var(--text-mid);transition:all .2s;}
  .cat-close:hover{border-color:var(--red);color:var(--red)}
  .cat-body{padding:1.4rem 1.75rem 2rem;}

  /* choice row */
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.6rem;}
  .choice-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;cursor:pointer;transition:all .2s;text-align:left;}
  .choice-card:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .choice-card .ci{font-size:1.4rem;margin-bottom:.4rem;display:block}
  .choice-card .ct{font-weight:700;font-size:.95rem;margin-bottom:.2rem;color:var(--text)}
  .choice-card .cs{font-size:.85rem;color:var(--text-mid);line-height:1.4}
  .choice-card.watched .cs{color:var(--green)}

  /* video */
  .vid-wrap{display:none;}
  .vid-wrap.show{display:block}
  .vid-wrap video{width:100%;max-height:420px;border-radius:12px;background:#0a0a0a;display:block;box-shadow:0 6px 20px var(--shadow);}
  .vid-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);}
  .vid-meta button{background:none;border:none;color:var(--blue);cursor:pointer;font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.06em;text-transform:uppercase;}

  /* tip */
  .tip-card{display:none;align-items:flex-start;gap:.8rem;background:rgba(232,160,32,0.07);border:1.5px solid rgba(232,160,32,0.25);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.6rem;}
  .tip-card.show{display:flex}
  .tip-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
  .tip-text{font-size:.88rem;line-height:1.55;color:var(--text);font-weight:400}
  .tip-label{font-family:'DM Mono',monospace;font-size:.84rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.25rem;}

  /* exercise list */
  .ex-list{display:flex;flex-direction:column;gap:.6rem;}
  .ex-item{display:flex;align-items:center;gap:.85rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;cursor:pointer;transition:all .18s;}
  .ex-item:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .ex-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--text-mid);font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;display:flex;align-items:center;justify-content:center;}
  .ex-item.done .ex-num{background:var(--green);color:white}
  .ex-name{font-size:.95rem;font-weight:600;flex:1;color:var(--text)}
  .ex-arrow{color:var(--text-light);font-size:.9rem}

  /* choice panel */
  .choice-panel-label{font-family:'DM Mono',monospace;font-size:.87rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mid);margin-bottom:.75rem;display:block;font-weight:500;}
  .choice-grid{display:grid;gap:.55rem;margin-bottom:1rem;}
  .choice-grid.cols-2{grid-template-columns:1fr 1fr}
  .choice-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .choice-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.75rem .85rem;cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;gap:.6rem;}
  .choice-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04);transform:translateY(-1px)}
  .choice-btn .cb-icon{font-size:1.1rem;flex-shrink:0}
  .choice-btn .cb-name{font-size:.95rem;font-weight:700;color:var(--text);display:block}
  .choice-btn .cb-desc{font-size:.86rem;color:var(--text-mid);line-height:1.4;margin-top:.1rem}
  .choice-btn .cb-arrow{margin-left:auto;color:var(--text-light);font-size:.8rem;flex-shrink:0}
  .choice-hint{font-size:.85rem;color:var(--text);line-height:1.55;background:rgba(79,142,247,0.08);border:1.5px solid rgba(79,142,247,0.18);border-radius:8px;padding:.75rem .95rem;margin-bottom:1rem;}

  /* tuner */
  .choice-card.tuner-card{background:rgba(76,175,80,0.06);border-color:rgba(76,175,80,0.3)}
  .choice-card.tuner-card:hover{border-color:var(--green);background:rgba(76,175,80,0.1)}
  .tuner-wrap{display:none;margin-bottom:1.6rem;}
  .tuner-wrap.show{display:block}
  .tuner-box{background:linear-gradient(180deg,#2a1d12,#1c130c);border-radius:14px;padding:1.6rem 1.4rem 1.4rem;box-shadow:0 10px 28px var(--shadow-lg);}
  .tuner-status{text-align:center;font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.72);margin-bottom:1rem;}
  .tuner-note{text-align:center;font-family:'Playfair Display',serif;font-weight:900;font-size:3.2rem;color:#fff;line-height:1;margin-bottom:.3rem;transition:color .15s;}
  .tuner-note.in-tune{color:var(--green)}
  .tuner-freq{text-align:center;font-family:'DM Mono',monospace;font-size:.82rem;color:rgba(255,255,255,0.72);margin-bottom:1.2rem;}
  .tuner-gauge{position:relative;height:54px;margin-bottom:1.3rem;}
  .tuner-track{position:absolute;left:0;right:0;top:24px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red) 38%,var(--green) 46%,var(--green) 54%,var(--red) 62%,var(--red) 100%);opacity:.85;}
  .tuner-center-mark{position:absolute;left:50%;top:14px;width:2px;height:24px;background:rgba(255,255,255,0.5);transform:translateX(-50%);}
  .tuner-needle{position:absolute;top:0;width:3px;height:54px;background:#fff;left:50%;transform:translateX(-50%);border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,0.6);transition:left .08s linear;}
  .tuner-needle.in-tune{background:var(--green);box-shadow:0 0 10px var(--green)}
  .tuner-strings{display:flex;gap:.4rem;justify-content:center;}
  .tuner-string-btn{flex:1;max-width:64px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:.5rem .3rem;cursor:default;text-align:center;transition:all .15s;}
  .tuner-string-btn .sname{font-family:'DM Mono',monospace;font-size:.82rem;color:rgba(255,255,255,0.82);display:block}
  .tuner-string-btn .sled{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);margin:.3rem auto 0;}
  .tuner-string-btn.target{border-color:var(--gold);background:rgba(232,160,32,0.12)}
  .tuner-string-btn.target .sname{color:var(--gold)}
  .tuner-string-btn.in-tune .sled{background:var(--green);box-shadow:0 0 6px var(--green)}
  .tuner-mic-btn{display:block;margin:1.2rem auto 0;background:var(--white);border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;}
  .tuner-mic-btn:hover{background:var(--cream)}
  .tuner-mic-btn.listening{background:var(--red);color:white}

  /* warmup: scale sub-panels and reference */
  .scale-subpanel{margin-top:.5rem}
  .scale-key-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:.75rem}
  .scale-key-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.65rem .5rem;cursor:pointer;transition:all .18s;text-align:center;}
  .scale-key-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .scale-key-btn .skb-key{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;color:var(--text);display:block}
  .scale-key-btn .skb-desc{font-size:.85rem;color:var(--text-light);margin-top:.15rem}
  .scale-back-btn{background:none;border:1.5px solid var(--cream-dark);border-radius:6px;padding:.35rem .75rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:.85rem;transition:all .2s;}
  .scale-back-btn:hover{border-color:var(--blue);color:var(--blue)}
  .scale-ref-card{background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;}
  .scale-ref-name{font-family:'DM Mono',monospace;font-size:.87rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:.35rem;}
  .scale-ref-pattern{display:flex;align-items:center;gap:.25rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .step-pill{padding:.2rem .45rem;border-radius:4px;font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;}
  .step-pill.W{background:rgba(27,79,138,0.12);color:var(--blue)}
  .step-pill.H{background:rgba(217,64,37,0.12);color:var(--red)}
  .step-pill.arrow{color:var(--text-light);font-size:.83rem;padding:0}
  .scale-ref-notes{display:flex;gap:.3rem;flex-wrap:wrap}
  .scale-note{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.3rem .45rem;border-radius:6px;border:1.5px solid var(--cream-dark);background:var(--cream);min-width:2rem;}
  .scale-note .sn-name{font-family:'DM Mono',monospace;font-size:.83rem;font-weight:600;color:var(--text)}
  .scale-note .sn-label{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text-light)}
  .scale-note.root{background:rgba(217,64,37,0.1);border-color:var(--red)}
  .scale-note.root .sn-name{color:var(--red)}
  .scale-note.third{background:rgba(76,175,80,0.1);border-color:var(--green)}
  .scale-note.third .sn-name{color:var(--green)}
  .scale-note.fifth{background:rgba(27,79,138,0.1);border-color:var(--blue)}
  .scale-note.fifth .sn-name{color:var(--blue)}
  .scale-note.seventh{background:rgba(232,160,32,0.1);border-color:var(--gold)}
  .scale-note.seventh .sn-name{color:var(--gold)}

  /* soloing: bandcamp + grouped */
  .bt-link{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1da0c3,#1a7fa0);border:none;border-radius:10px;padding:.85rem 1.1rem;text-decoration:none;color:white;margin-bottom:1.25rem;cursor:pointer;transition:all .2s;}
  .bt-link:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .bt-link .bt-left{display:flex;align-items:center;gap:.7rem}
  .bt-link .bt-icon{font-size:1.3rem}
  .bt-link .bt-name{font-size:.9rem;font-weight:600;display:block}
  .bt-link .bt-tag{font-family:'DM Mono',monospace;font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-top:1px;display:block}
  .bt-link .bt-arrow{font-size:1rem;opacity:.8}
  .solo-group{margin-bottom:1rem}
  .solo-group-head{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:8px;background:var(--cream);border:2px solid var(--cream-dark);margin-bottom:.4rem;}
  .solo-key{font-family:'DM Mono',monospace;font-size:.83rem;font-weight:600;color:var(--text);letter-spacing:.04em}
  .solo-key-desc{font-size:.83rem;color:var(--text-light)}
  .solo-scale-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;padding-left:.5rem}
  .solo-scale-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.6rem .75rem;cursor:pointer;transition:all .18s;text-align:left;}
  .solo-scale-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .solo-scale-btn .ssb-name{font-size:.82rem;font-weight:700;color:var(--text);display:block;margin-bottom:.15rem}
  .solo-scale-btn .ssb-desc{font-size:.86rem;color:var(--text-mid)}

  @media(max-width:640px){
    nav{padding:.85rem 1.2rem}
    .choice-row{grid-template-columns:1fr}
    .cat-head,.cat-body{padding-left:1.3rem;padding-right:1.3rem}
    .scale-key-grid{grid-template-columns:1fr 1fr}
    .solo-scale-row{grid-template-columns:1fr}
  }
  /* ════ STRUM PLAYER ════ */

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  /* ── Time signature selector ── */
  .ts-header{
    background:var(--cream);border-bottom:2px solid var(--cream-dark);
    padding:.75rem 1rem .65rem;
  }
  .ts-header-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);margin-bottom:.5rem;display:block;
  }
  .ts-tabs{display:flex;gap:.4rem;}
  .ts-tab{
    flex:1;padding:.55rem .4rem;border-radius:8px;
    border:2px solid var(--cream-dark);background:var(--white);
    cursor:pointer;transition:all .18s;text-align:center;
  }
  .ts-tab:hover{border-color:var(--blue);}
  .ts-tab.active{border-color:var(--red);background:rgba(217,64,37,0.06);}
  .ts-tab-sig{
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:1.1rem;color:var(--text);display:block;line-height:1;
  }
  .ts-tab.active .ts-tab-sig{color:var(--red);}
  .ts-tab-name{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--text-light);display:block;margin-top:.2rem;
  }

  /* ── Explainer ── */
  .ts-explainer{
    background:rgba(27,79,138,0.05);
    border-bottom:2px solid var(--cream-dark);
    padding:.8rem 1.1rem;
  }
  .ts-explainer-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.25rem;}
  .ts-explainer-body{font-size:.86rem;color:var(--text-mid);line-height:1.55;}
  .ts-explainer-songs{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.04em;
    color:var(--text-light);margin-top:.35rem;display:block;
  }

  /* ── Foot tap row ── */
  .foot-tap-row{
    display:flex;gap:.5rem;padding:.65rem 1rem;
    background:var(--neck-dark);
    border-bottom:1px solid rgba(255,255,255,0.08);
    align-items:center;
  }
  .foot-tap-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,0.75);
    flex-shrink:0;width:3rem;
  }
  .foot-taps{display:flex;gap:.4rem;flex:1;}
  .foot-tap{
    flex:1;height:24px;border-radius:4px;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:.85rem;
    color:rgba(255,255,255,0.72);
    transition:all .1s;
  }
  .foot-tap.active{
    background:rgba(232,160,32,0.28);border-color:var(--gold);
    color:var(--gold);box-shadow:0 0 10px rgba(232,160,32,0.3);
  }
  .foot-tap.downbeat{
    background:rgba(217,64,37,0.28);border-color:var(--red);
    color:#ff7055;box-shadow:0 0 10px rgba(217,64,37,0.3);
  }

  /* ── Pattern selector ── */
  .pattern-header{
    background:var(--cream);border-bottom:2px solid var(--cream-dark);
    padding:.6rem 1rem .55rem;
  }
  .pattern-header-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);margin-bottom:.45rem;display:block;
  }
  .pattern-tabs{display:flex;gap:.3rem;overflow-x:auto;}
  .pattern-tab{
    flex:1;min-width:0;padding:.42rem .3rem;border-radius:7px;
    border:2px solid var(--cream-dark);background:var(--white);
    font-family:'DM Mono',monospace;font-size:.87rem;font-weight:500;
    color:var(--text-light);cursor:pointer;
    transition:all .18s;white-space:nowrap;letter-spacing:.04em;text-align:center;
  }
  .pattern-tab:hover{border-color:var(--blue);color:var(--text-mid);}
  .pattern-tab.active{
    border-color:var(--red);background:rgba(217,64,37,0.08);
    color:var(--red);font-weight:600;
  }
  .pattern-tab.custom-tab{color:var(--text-mid);}
  .pattern-tab.custom-tab.active{
    border-color:var(--teal);background:rgba(42,172,184,0.08);color:var(--teal);
  }

  /* ── Custom hint banner ── */
  .custom-hint{
    display:none;
    background:rgba(42,172,184,0.08);border-bottom:2px solid rgba(42,172,184,0.25);
    padding:.75rem 1.1rem;
  }
  .custom-hint.show{display:block;}
  .custom-hint-title{font-size:.84rem;font-weight:600;color:var(--teal);margin-bottom:.3rem;}
  .custom-hint-steps{list-style:none;display:flex;flex-direction:column;gap:.2rem;}
  .custom-hint-steps li{
    font-size:.85rem;color:var(--text-mid);line-height:1.45;
    display:flex;align-items:center;gap:.5rem;
  }
  .hint-badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:4px;
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;
    flex-shrink:0;
  }
  .hint-badge.down{background:var(--slot-down-bg);color:#ff7055;border:1.5px solid var(--slot-down-border);}
  .hint-badge.up{background:var(--slot-up-bg);color:#90bff0;border:1.5px solid var(--slot-up-border);}
  .hint-badge.skip{background:var(--slot-empty-bg);color:rgba(255,255,255,0.5);border:1.5px dashed rgba(255,255,255,0.65);}

  /* ── Static reference diagram ── */
  .static-diagram-wrap{
    background:var(--neck);padding:.9rem 1rem .8rem;
    border-bottom:2px solid rgba(255,255,255,0.06);
  }
  .static-diagram-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,0.5);
    text-align:center;margin-bottom:.6rem;
  }
  .static-diagram{display:flex;gap:.3rem;justify-content:center;align-items:flex-start;}
  .static-beat{display:flex;flex-direction:column;align-items:center;gap:.18rem;flex:1;max-width:80px;}
  .static-beat-num{
    font-family:'DM Mono',monospace;font-size:.83rem;font-weight:600;
    color:rgba(255,255,255,0.82);margin-bottom:.06rem;
  }
  .static-beat-group{display:flex;gap:.12rem;}
  .static-stroke{
    width:26px;height:30px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;flex-shrink:0;
    border:1.5px solid transparent;
  }
  .static-stroke.down{
    background:var(--slot-down-bg);color:#ff7055;
    border-color:var(--slot-down-border);
  }
  .static-stroke.up{
    background:var(--slot-up-bg);color:#90bff0;
    border-color:var(--slot-up-border);
  }
  .static-stroke.skip{
    background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.65);
    border:1.5px dashed rgba(255,255,255,0.18);
  }
  .static-divider{
    width:1.5px;background:rgba(255,255,255,0.18);
    align-self:stretch;margin:0 .1rem;border-radius:1px;
  }
  .group-bracket{display:flex;flex-direction:column;align-items:center;gap:.16rem;}
  .bracket-label{
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;
    color:rgba(255,255,255,0.5);letter-spacing:.03em;text-align:center;
  }
  .bracket-strokes{display:flex;gap:.12rem;}

  /* ── Animated beat grid ── */
  .beat-grid-wrap{background:var(--neck);padding:.9rem 1rem .8rem;}
  .beat-grid-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,0.5);
    text-align:center;margin-bottom:.6rem;
  }
  .beat-grid{display:flex;gap:.3rem;justify-content:center;}
  .beat-cell{display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1;max-width:80px;}
  .beat-number{
    font-family:'DM Mono',monospace;font-size:.83rem;font-weight:600;
    color:rgba(255,255,255,0.82);
  }
  .beat-strokes{display:flex;gap:.12rem;}

  /* Base slot */
  .stroke-slot{
    width:26px;height:34px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-size:.88rem;font-weight:700;flex-shrink:0;
    transition:all .1s;
    background:var(--slot-empty-bg);
    border:1.5px solid var(--slot-empty-border);
    color:rgba(255,255,255,0.70);
    user-select:none;
  }
  /* Preset slots — not editable, just display */
  .stroke-slot.locked{ cursor:default; }
  /* Custom slots — tappable */
  .stroke-slot.editable{
    cursor:pointer;
    border-style:dashed;
    border-color:rgba(255,255,255,0.65);
  }
  .stroke-slot.editable:active{ transform:scale(0.92); }
  /* Down stroke */
  .stroke-slot.down{
    background:var(--slot-down-bg);
    border:1.5px solid var(--slot-down-border);
    color:#ff7055;
    border-style:solid;
  }
  /* Up stroke */
  .stroke-slot.up{
    background:var(--slot-up-bg);
    border:1.5px solid var(--slot-up-border);
    color:#90bff0;
    border-style:solid;
  }
  /* Active beat highlight */
  .stroke-slot.active-beat{
    box-shadow:0 0 0 2.5px var(--gold),0 0 16px rgba(232,160,32,0.5);
    transform:scale(1.12);z-index:1;position:relative;
  }

  /* ── Legend ── */
  .legend{
    display:flex;gap:.75rem;justify-content:center;
    padding:.5rem 1rem;background:var(--neck-dark);
    font-family:'DM Mono',monospace;font-size:.84rem;
    letter-spacing:.06em;text-transform:uppercase;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .legend span{display:flex;align-items:center;gap:.3rem;color:rgba(255,255,255,0.5);}
  .leg-dot{width:10px;height:10px;border-radius:2px;}
  .leg-dot.down{background:#ff7055;}
  .leg-dot.up{background:#90bff0;}
  .leg-dot.off{background:rgba(255,255,255,0.15);border:1px dashed rgba(255,255,255,0.65);}

  /* ── Beat indicator ── */
  .beat-indicator{
    display:flex;gap:.4rem;justify-content:center;
    padding:.6rem 1rem;border-top:1.5px solid var(--cream-dark);
  }
  .beat-dot{
    height:8px;border-radius:4px;background:var(--cream-dark);
    transition:all .12s;flex:1;max-width:48px;
  }
  .beat-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(232,160,32,0.5);}
  .beat-dot.downbeat{background:var(--red);box-shadow:0 0 8px rgba(217,64,37,0.4);}

  /* ── Controls ── */
  .controls{padding:.9rem 1.1rem 1.1rem;}
  .ctrl-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
  .ctrl-label{
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-light);flex-shrink:0;width:3rem;
  }
  .bpm-slider{
    flex:1;-webkit-appearance:none;appearance:none;height:5px;
    border-radius:3px;background:var(--cream-dark);outline:none;cursor:pointer;
  }
  .bpm-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:var(--red);cursor:pointer;box-shadow:0 2px 6px rgba(217,64,37,0.4);
  }
  .bpm-value{
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;
    color:var(--text);width:4.2rem;text-align:right;flex-shrink:0;
  }
  .pill-btns{display:flex;gap:.3rem;}
  .pill-btn{
    flex:1;padding:.35rem .3rem;border-radius:6px;
    border:1.5px solid var(--cream-dark);background:var(--cream);
    font-family:'DM Mono',monospace;font-size:.86rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .18s;
    white-space:nowrap;text-align:center;
  }
  .pill-btn:hover{border-color:var(--blue);}
  .pill-btn.active-feel{
    border-color:var(--blue);background:rgba(27,79,138,0.09);
    color:var(--blue);font-weight:600;
  }

  .play-row{display:flex;align-items:center;justify-content:center;margin-top:.2rem;}
  .play-btn{
    width:64px;height:64px;border-radius:50%;border:none;
    background:var(--red);color:white;font-size:1.3rem;
    cursor:pointer;transition:all .18s;
    box-shadow:0 4px 18px rgba(217,64,37,0.38);
    display:flex;align-items:center;justify-content:center;
  }
  .play-btn.playing{background:var(--text);box-shadow:0 4px 16px rgba(42,32,24,0.25);}
  .play-btn:active{transform:scale(0.93);}
  .play-btn:disabled{
    background:var(--cream-dark);color:var(--text-light);
    box-shadow:none;cursor:not-allowed;
  }

  /* ── TAB READER ── */

  .tab-input{width:100%;min-height:90px;border-radius:10px;border:2px solid var(--cream-dark);background:var(--cream);color:var(--text);padding:.7rem .85rem;font-family:'DM Mono',monospace;font-size:.82rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .18s}
  .tab-input:focus{border-color:var(--teal)}
  .tab-input::placeholder{color:var(--text-light)}
  .tab-actions{display:flex;gap:.4rem;margin-top:.5rem;margin-bottom:.75rem}
  .tab-btn{flex:1;padding:.5rem .4rem;border-radius:8px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'DM Mono',monospace;font-size:.86rem;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:center}
  .tab-btn:hover{border-color:var(--blue);color:var(--blue)}
  .tab-btn.primary{background:var(--teal);border-color:var(--teal);color:white;font-weight:600}
  .tab-notes-row{display:flex;gap:.5rem;margin-bottom:.6rem}
  .tab-notes-box{flex:1;background:#0a0a0a;border-radius:8px;padding:.6rem .75rem;min-height:36px}
  .tab-notes-label{font-family:'DM Mono',monospace;font-size:.87rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:.3rem}
  .tab-notes-content{font-family:'DM Mono',monospace;font-size:.87rem;color:rgba(255,255,255,0.75);line-height:1.5;word-break:break-all}
  .tab-stepper{display:flex;align-items:center;gap:.5rem;background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.6rem .85rem;margin-bottom:.5rem}
  .tab-step-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--cream-dark);background:var(--white);font-size:1rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tab-step-btn:hover{border-color:var(--blue)}
  .tab-step-btn:disabled{opacity:.35;cursor:not-allowed}
  .tab-step-info{flex:1;text-align:center}
  .tab-step-note{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--text);display:block}
  .tab-step-pos{font-family:'DM Mono',monospace;font-size:.84rem;color:var(--text-light);letter-spacing:.06em;text-transform:uppercase}
  .tab-auto-row{display:flex;gap:.5rem;margin-bottom:.5rem}
  .tab-auto-btn{flex:1;padding:.5rem .6rem;border-radius:8px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'DM Mono',monospace;font-size:.86rem;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:center}
  .tab-auto-btn.playing{background:var(--text);border-color:var(--text);color:white}
  .tab-speed-row{display:flex;align-items:center;gap:.5rem}
  .tab-speed-label{font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);flex-shrink:0;width:3.5rem}
  .tab-speed-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--cream-dark);outline:none;cursor:pointer}
  .tab-speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--teal);cursor:pointer}
  .tab-speed-val{font-family:'DM Mono',monospace;font-size:.87rem;color:var(--text);width:3rem;text-align:right;flex-shrink:0}
  .tab-fret-status{font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:.35rem;min-height:1.3em;color:var(--text-light)}
  .tab-divider{border:none;border-top:1.5px solid var(--cream-dark);margin:1rem 0 .75rem}

  /* ── TRIAD SHAPES (Stage 7) ── */
  .triad-section{ margin-bottom:1.2rem; }
  .triad-group-head{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);
    padding:.45rem 0 .4rem;margin-bottom:.5rem;display:block;
    border-bottom:1.5px solid var(--cream-dark);
  }
  .triad-shape-row{ display:flex;gap:.6rem;margin-bottom:.85rem; }
  .triad-shape-btn{
    flex:1;border:1.5px solid var(--cream-dark);border-radius:12px;
    background:var(--white);cursor:pointer;transition:all .18s;
    padding:14px 8px 10px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .triad-shape-btn:hover{ background:var(--cream); }
  .triad-shape-btn.major{ border-color:rgba(232,160,32,0.5); }
  .triad-shape-btn.major:hover{ border-color:var(--gold); }
  .triad-shape-btn.minor{ border-color:rgba(27,79,138,0.35); }
  .triad-shape-btn.minor:hover{ border-color:var(--blue); }
  .triad-shape-btn.selected-major{ border-color:var(--gold);background:rgba(232,160,32,0.06); }
  .triad-shape-btn.selected-minor{ border-color:var(--blue);background:rgba(27,79,138,0.06); }
  .triad-shape-label{
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase;
  }
  .triad-shape-btn.major .triad-shape-label{ color:#BA7517; }
  .triad-shape-btn.minor .triad-shape-label{ color:var(--blue); }

  /* ── CHORD BUILDER (Stage 3) ── */
  .cb-wrap{ width:100%; }

  /* Note picker */
  .cb-note-grid{
    display:grid;grid-template-columns:repeat(6,1fr);gap:.35rem;
    margin-bottom:.85rem;
  }
  .cb-note-btn{
    padding:.5rem .4rem;border-radius:8px;
    border:1.5px solid rgba(255,255,255,0.22);background:var(--surface2);
    font-family:'DM Mono',monospace;font-size:.92rem;font-weight:700;
    color:#ffffff;cursor:pointer;transition:all .15s;text-align:center;
    line-height:1.2;
  }
  .cb-note-btn:hover{ border-color:var(--blue);color:var(--blue); }
  .cb-note-btn.selected{ border-color:var(--red);background:rgba(217,64,37,0.08);color:var(--red); }

  /* Chord type selector */
  .cb-type-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;
    margin-bottom:.85rem;
  }
  .cb-type-btn{
    padding:.45rem .2rem;border-radius:8px;
    border:1.5px solid var(--cream-dark);background:var(--white);
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .15s;text-align:center;
  }
  .cb-type-btn:hover{ border-color:var(--teal);color:var(--teal); }
  .cb-type-btn.selected{ border-color:var(--teal);background:rgba(42,172,184,0.08);color:var(--teal);font-weight:600; }

  /* Build button */
  .cb-build-btn{
    width:100%;padding:.7rem;border-radius:10px;border:none;
    background:var(--red);color:white;
    font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;
    cursor:pointer;transition:all .18s;margin-bottom:1rem;
    box-shadow:0 4px 14px rgba(217,64,37,0.28);
  }
  .cb-build-btn:hover{ filter:brightness(1.06); }
  .cb-build-btn:disabled{ background:var(--cream-dark);color:var(--text-light);box-shadow:none;cursor:not-allowed; }

  /* Steps display */
  .cb-steps{ display:flex;flex-direction:column;gap:.6rem;margin-bottom:.85rem; }
  .cb-step{
    border-radius:12px;border:2px solid var(--cream-dark);
    overflow:hidden;transition:border-color .2s;
  }
  .cb-step.active{ border-color:var(--gold); }
  .cb-step.done{ border-color:var(--green); }
  .cb-step-head{
    display:flex;align-items:center;gap:.6rem;
    padding:.6rem .85rem;background:var(--cream);
    cursor:pointer;
  }
  .cb-step-num{
    width:22px;height:22px;border-radius:50%;flex-shrink:0;
    background:var(--cream-dark);
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
    color:var(--text-mid);display:flex;align-items:center;justify-content:center;
  }
  .cb-step.active .cb-step-num{ background:var(--gold);color:white; }
  .cb-step.done   .cb-step-num{ background:var(--green);color:white; }
  .cb-step-title{
    font-size:.84rem;font-weight:600;color:var(--text);flex:1;
  }
  .cb-step-subtitle{
    font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text-light);
  }
  .cb-step-body{ display:none;padding:.7rem .85rem .85rem; }
  .cb-step.active .cb-step-body,
  .cb-step.done   .cb-step-body{ display:block; }

  /* Note pills inside steps */
  .cb-pill-row{
    display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem;
  }
  .cb-pill{
    padding:.3rem .6rem;border-radius:6px;
    font-family:'DM Mono',monospace;font-size:.92rem;font-weight:700;
    border:1.5px solid var(--cream-dark);background:var(--cream);
    color:var(--text-mid);transition:all .2s;
  }
  .cb-pill.active-note{ background:rgba(79,142,247,0.15);border-color:#6aaeff;color:#8ec8ff;font-weight:700; }
  .cb-pill.root-note{   background:rgba(224,85,64,0.20);border-color:#ff7055;color:#ff8870;font-weight:800; }
  .cb-pill.third-note{  background:rgba(232,160,32,0.18);border-color:#ffc840;color:#ffd060;font-weight:800; }
  .cb-pill.fifth-note{  background:rgba(61,186,114,0.18);border-color:#50e090;color:#70ffb0;font-weight:800; }
  .cb-pill.seventh-note{background:rgba(232,160,32,0.1);border-color:var(--gold);color:var(--gold); }
  .cb-pill.dim-note{    background:rgba(150,80,200,0.1);border-color:#9650c8;color:#9650c8; }
  .cb-pill.faded{       opacity:.45;color:rgba(255,255,255,0.5); }

  .cb-step-desc{
    font-size:.92rem;color:var(--text);line-height:1.65;margin-bottom:.75rem;font-weight:400;
  }
  .cb-interval-row{
    display:flex;align-items:center;gap:.2rem;flex-wrap:wrap;margin-bottom:.5rem;
  }
  .cb-interval{
    padding:.2rem .4rem;border-radius:4px;
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
  }
  .cb-interval.W{ background:rgba(27,79,138,0.12);color:var(--blue); }
  .cb-interval.H{ background:rgba(217,64,37,0.12);color:var(--red); }
  .cb-interval.WH{ background:rgba(232,160,32,0.12);color:var(--gold); }
  .cb-interval-arrow{ font-size:.83rem;color:var(--text-light); }

  /* Step-back + ask Vizi row */
  .cb-action-row{
    display:flex;gap:.5rem;margin-top:.75rem;
  }
  
  .cb-vizi-btn{
    flex:2;padding:.5rem .6rem;border-radius:8px;
    border:1.5px solid var(--blue);background:rgba(27,79,138,0.06);
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
    color:var(--blue);cursor:pointer;transition:all .18s;text-align:center;
  }
  .cb-vizi-btn:hover{ background:rgba(27,79,138,0.12); }

  /* Fretboard status */
  .cb-fret-status{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.06em;
    text-transform:uppercase;text-align:center;
    padding:.4rem;min-height:1.3em;color:var(--text-light);
  }

  /* Legend */
  .cb-legend{
    display:flex;flex-wrap:wrap;gap:.4rem .75rem;
    margin-bottom:.5rem;
  }
  .cb-legend-item{
    display:flex;align-items:center;gap:.3rem;
    font-family:'DM Mono',monospace;font-size:.84rem;color:var(--text-light);
  }
  .cb-legend-dot{
    width:9px;height:9px;border-radius:50%;flex-shrink:0;
  }

  /* ── OPEN CHORDS PANEL (Stage 4) ── */
  .oc-tabs{
    display:flex;gap:.35rem;margin-bottom:.85rem;
  }
  .oc-tab{
    flex:1;padding:.45rem .3rem;border-radius:8px;
    border:1.5px solid var(--cream-dark);background:var(--white);
    font-family:'DM Mono',monospace;font-size:.83rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:center;
  }
  .oc-tab:hover{border-color:var(--blue);color:var(--blue);}
  .oc-tab.active{border-color:var(--red);background:rgba(217,64,37,0.07);color:var(--red);font-weight:600;}

  .oc-chord-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;
    margin-bottom:.85rem;
  }
  .oc-chord-btn{
    padding:.5rem .3rem;border-radius:8px;
    border:1.5px solid var(--cream-dark);background:var(--white);
    font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
    color:var(--text);cursor:pointer;transition:all .18s;text-align:center;
  }
  .oc-chord-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.05);}
  .oc-chord-btn.selected{border-color:var(--gold);background:rgba(232,160,32,0.08);color:var(--text);}
  .oc-chord-btn.barre{
    color:var(--text-light);border-color:var(--cream-dark);
    background:var(--cream);cursor:default;
    position:relative;
  }
  .oc-chord-btn.barre::after{
    content:'barre';
    display:block;font-size:.86rem;letter-spacing:.04em;
    text-transform:uppercase;color:var(--text-light);
    margin-top:.1rem;
  }
  .oc-chord-btn.barre:hover{border-color:var(--cream-dark);background:var(--cream);}

  .oc-action-row{
    display:none;flex-direction:column;gap:.5rem;margin-bottom:.75rem;
  }
  .oc-action-row.show{display:flex;}
  .oc-selected-label{
    font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--text-light);text-align:center;
  }
  .oc-selected-name{
    font-family:'Playfair Display',serif;font-weight:700;

  function buildMiniTriadDiagram(shape, type){
    // shape: array of {str, role, row} for G, B, e strings
    // Standard chord diagram: E A D on left (faded), G B e on right (active)
    // Columns: E=x10, A=x24, D=x38, G=x52, B=x66, e=x80
    // Fret rows: nut=y6, fret1-center=y13, fret2=y28, fret3=y44, fret4=y60
    const roleColor = { root: type==='major'?'#BA7517':'#185FA5', third:'#444', fifth:'#444' };
    const roleLabel = { root:'R', third: type==='major'?'Δ3':'♭3', fifth:'p5' };
    // High strings: G=left, B=mid, e=right
    // Low strings: D=left, A=mid, LoE=right (same x positions)
    const colX = { G:52, B:66, e:80, D:52, A:66, LoE:80 };
    const rowY = { 1:13, 2:28, 3:44, 4:60 };

    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('width','88'); svg.setAttribute('height','88');
    svg.setAttribute('viewBox','0 0 88 88');

    function line(x1,y1,x2,y2,stroke,w,op){
      const l=document.createElementNS(ns,'line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y1);
      l.setAttribute('x2',x2);l.setAttribute('y2',y2);
      l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',w||1);
      if(op) l.setAttribute('opacity',op);
      return l;
    }
    function txt(x,y,label,size,fill){
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x);t.setAttribute('y',y);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size',size||8);
      t.setAttribute('font-weight','600');
      t.setAttribute('fill',fill||'white');
      t.textContent=label;
      return t;
    }
    function circle(cx,cy,r,fill){
      const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r||8);
      c.setAttribute('fill',fill);
      return c;
    }

    // Nut
    svg.appendChild(line(4,6,84,6,'#2A2018',3));
    // Fret lines
    [20,36,52,68].forEach(y=>svg.appendChild(line(4,y,84,y,'rgba(42,32,24,0.15)')));
    // Low strings E A D — faded
    [10,24,38].forEach(x=>svg.appendChild(line(x,6,x,72,'rgba(42,32,24,0.2)',1)));
    // Active strings G B e
    [52,66,80].forEach(x=>svg.appendChild(line(x,6,x,72,'rgba(42,32,24,0.45)',1)));

    // Dots
    shape.forEach(dot=>{
      const cx=colX[dot.str], cy=rowY[dot.row];
      const fill=roleColor[dot.role];
      const label=roleLabel[dot.role];
      svg.appendChild(circle(cx,cy,8,fill));
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+4);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','7');
      t.setAttribute('font-weight','600');
      t.setAttribute('fill','white');
      t.textContent=label;
      svg.appendChild(t);
    });

    // String labels — adapt for high vs low string group
    const isLowGroup = shape.some(d=>d.str==='D'||d.str==='A'||d.str==='LoE');
    const strLabels = isLowGroup
      ? [['E',10,'muted'],['A_hi',24,'muted'],['G',38,'muted'],['D',52,'active'],['A',66,'active'],['E (low)',80,'active']]
      : [['E',10,'muted'],['A',24,'muted'],['D',38,'muted'],['G',52,'active'],['B',66,'active'],['e',80,'active']];
    strLabels.forEach(([lbl,x,cls],i)=>{
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x);t.setAttribute('y',83);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size',i<3?'7':'8');
      t.setAttribute('fill',i<3?'rgba(42,32,24,0.3)':'rgba(42,32,24,0.65)');
      t.setAttribute('font-weight','400');
      t.textContent = lbl==='A_hi'?'A':lbl==='E (low)'?'E':lbl;
      svg.appendChild(t);
    });

    return svg;
  }

  // ── CHORD BUILDER (Stage 3) ─────────────────────────────────
  const CHROMATIC = ['C','C#/Db','D','D#/Eb','E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B'];
  const CHROM12   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  // Display names for pills — show both sharp and flat so students recognise either name
  const ENHARMONIC = {
    'C#':'C#/Db','D#':'D#/Eb','F#':'F#/Gb','G#':'G#/Ab','A#':'A#/Bb'
  };
  function displayNote(n){ return ENHARMONIC[n] || n; }

  const CHORD_TYPES = {
    'Major':      { intervals:[2,2,1,2,2,2,1], formula:'W W H W W W H', degrees:[0,2,4], labels:['Root','Major 3rd','5th'],         pillClass:['root-note','third-note','fifth-note'],    desc:'Major scale → take Root, 3rd, 5th' },
    'Minor':      { intervals:[2,1,2,2,1,2,2], formula:'W H W W H W W', degrees:[0,2,4], labels:['Root','Minor 3rd','5th'],         pillClass:['root-note','third-note','fifth-note'],    desc:'Minor scale → take Root, 3rd, 5th' },
    'Major 7th':  { intervals:[2,2,1,2,2,2,1], formula:'W W H W W W H', degrees:[0,2,4,6], labels:['Root','3rd','5th','Major 7th'], pillClass:['root-note','third-note','fifth-note','seventh-note'], desc:'Major scale → take Root, 3rd, 5th, 7th' },
    'Minor 7th':  { intervals:[2,1,2,2,1,2,2], formula:'W H W W H W W', degrees:[0,2,4,6], labels:['Root','♭3rd','5th','Minor 7th'],pillClass:['root-note','third-note','fifth-note','seventh-note'], desc:'Minor scale → take Root, 3rd, 5th, 7th' },
    'Dom 7th':    { intervals:[2,2,1,2,2,2,1], formula:'W W H W W W H', degrees:[0,2,4,5], labels:['Root','3rd','5th','♭7th'],      pillClass:['root-note','third-note','fifth-note','seventh-note'], desc:'Major scale → take Root, 3rd, 5th, ♭7th' },
    'Diminished': { intervals:[2,1,2,1,2,1,2,1], formula:'W H W H W H W H', degrees:[0,2,4,6], labels:['Root','♭3rd','♭5th','♭♭7th'],pillClass:['root-note','third-note','dim-note','seventh-note'], desc:'Diminished scale → Root, ♭3rd, ♭5th, dim7th' },
    'Sus2':       { intervals:[2,2,1,2,2,2,1], formula:'W W H W W W H', degrees:[0,1,4], labels:['Root','2nd','5th'],               pillClass:['root-note','third-note','fifth-note'],    desc:'Major scale → replace 3rd with 2nd' },
    'Sus4':       { intervals:[2,2,1,2,2,2,1], formula:'W W H W W W H', degrees:[0,3,4], labels:['Root','4th','5th'],               pillClass:['root-note','third-note','fifth-note'],    desc:'Major scale → replace 3rd with 4th' },
  };

  // Common open chord voicings for fretboard lighting
  const OPEN_CHORDS = {
    'C Major':'CHORD C','D Major':'CHORD D','E Major':'CHORD E',
    'F Major':'CHORD F','G Major':'CHORD G','A Major':'CHORD A',
    'B Major':'CHORD B',
    'A Minor':'CHORD Am','B Minor':'CHORD Bm','D Minor':'CHORD Dm',
    'E Minor':'CHORD Em','G Minor':'CHORD Gm',
    'A Major 7th':'CHORD Amaj7','C Major 7th':'CHORD Cmaj7','D Major 7th':'CHORD Dmaj7',
    'E Major 7th':'CHORD Emaj7','G Major 7th':'CHORD Gmaj7',
    'A Minor 7th':'CHORD Am7','D Minor 7th':'CHORD Dm7','E Minor 7th':'CHORD Em7',
    'G Dom 7th':'CHORD G7','C Dom 7th':'CHORD C7','D Dom 7th':'CHORD D7',
    'B Diminished':'CHORD Bdim',
  };

  let cbRoot = null, cbType = null, cbStep = 0;
  let cbScaleNotes = [], cbChordNotes = [];

  function buildScaleFromRoot(root, intervals){
    const rootIdx = CHROM12.indexOf(root.replace('C#/Db','C#').replace('D#/Eb','D#').replace('F#/Gb','F#').replace('G#/Ab','G#').replace('A#/Bb','A#'));
    const scale = [CHROM12[rootIdx]];
    let pos = rootIdx;
    for(let i=0;i<intervals.length-1;i++){
      pos = (pos + intervals[i]) % 12;
      scale.push(CHROM12[pos]);
    }
    return scale;
  }

  async function runChordBuilder(){ await runChordBuilderFromStep(0); }

  async function runChordBuilderFromStep(fromStep){
    if(!cbRoot||!cbType) return;
    const def = CHORD_TYPES[cbType];
    clearSteps();
    cbStep = fromStep;

    // Build scale
    cbScaleNotes = buildScaleFromRoot(cbRoot, def.intervals);
    // Build chord notes (pick degrees from scale)
    cbChordNotes = def.degrees.map(d => cbScaleNotes[d] || cbScaleNotes[d%cbScaleNotes.length]);

    const stepsEl = document.getElementById('cbSteps');

    // ── STEP 1: All 12 notes ──
    if(fromStep <= 0){
      await animateStep(stepsEl, 1, 'All Possible Notes',
        'These are all 12 notes in Western music. Every chord, scale, and melody is built from these.',
        ()=> renderAllNotes('all'),
        0
      );
    }

    // ── STEP 2: The scale ──
    if(fromStep <= 1){
      await animateStep(stepsEl, 2, cbRoot+' '+cbType.split(' ')[0]+' Scale',
        buildScaleDesc(cbRoot, cbType, def, cbScaleNotes),
        ()=> renderAllNotes('scale'),
        fromStep===1 ? 0 : 600
      );
    }

    // ── STEP 3: The chord tones ──
    if(fromStep <= 2){
      await animateStep(stepsEl, 3, cbRoot+' '+cbType+' Chord',
        buildChordDesc(cbRoot, cbType, def, cbChordNotes),
        ()=> renderAllNotes('chord'),
        fromStep===2 ? 0 : 600
      );
      // Light fretboard
      await lightChordOnFretboard();
    }

    cbStep = 3;

  }

  function animateStep(container, num, title, desc, contentFn, delay){
    return new Promise(resolve=>{
      setTimeout(()=>{
        // Mark previous steps done
        container.querySelectorAll('.cb-step').forEach(s=>{ s.classList.remove('active'); s.classList.add('done'); });
        const step = document.createElement('div'); step.className='cb-step active';
        const head = document.createElement('div'); head.className='cb-step-head';
        const numEl = document.createElement('div'); numEl.className='cb-step-num'; numEl.textContent=num;
        const titleEl = document.createElement('div'); titleEl.className='cb-step-title'; titleEl.textContent=title;
        head.appendChild(numEl); head.appendChild(titleEl);
        const body = document.createElement('div'); body.className='cb-step-body';
        const descEl = document.createElement('div'); descEl.className='cb-step-desc'; descEl.textContent=desc;
        body.appendChild(descEl);
        const pillRow = document.createElement('div'); pillRow.className='cb-pill-row';
        body.appendChild(pillRow);
        step.appendChild(head); step.appendChild(body);
        container.appendChild(step);
        head.addEventListener('click',()=>{ step.classList.toggle('done'); step.classList.toggle('active'); });
        contentFn();
        // Populate pill row — pass step number so pills show correct state
        const info = getPillInfo(num);
        info.forEach(p=>{
          const pill=document.createElement('span'); pill.className='cb-pill '+p.cls;
          pill.textContent=displayNote(p.note); pillRow.appendChild(pill);
        });
        resolve();
      }, delay);
    });
  }

  function getPillInfo(forStep){
    // forStep: 1=all notes, 2=scale, 3=chord tones
    const def = CHORD_TYPES[cbType];

    // Rotate CHROM12 so the chosen root is always the first note shown
    function rootFirst(arr){
      if(!cbRoot) return arr;
      const idx = arr.indexOf(cbRoot);
      if(idx <= 0) return arr;
      return [...arr.slice(idx), ...arr.slice(0, idx)];
    }

    if(forStep===1 || !cbRoot){
      // All 12 notes — root first if selected, otherwise C-first
      return rootFirst(CHROM12).map(n=>({note:n, cls:'active-note'}));
    }
    if(forStep===2){
      // All 12 rotated root-first; scale notes highlighted, rest faded
      return rootFirst(CHROM12).map(n=>({
        note:n,
        cls: cbScaleNotes.includes(n)
          ? (n===cbRoot ? 'root-note' : 'active-note')
          : 'faded'
      }));
    }
    // Step 3 — scale notes only (already root-first from buildScaleFromRoot)
    // highlight 1st, 3rd, 5th as chord tones
    return cbScaleNotes.map((n,i)=>({
      note:n,
      cls: cbChordNotes.includes(n)
        ? (i===0 ? 'root-note'
          : i===def.degrees[1] ? 'third-note'
          : i===def.degrees[2] ? 'fifth-note'
          : 'seventh-note')
        : 'faded'
    }));
  }

  function buildScaleDesc(root, type, def, scale){
    const typeName = type.split(' ')[0];
    return 'Starting from ' + root + ' (the Root), applying the '
      + typeName + ' formula (' + def.formula + ') gives us: '
      + scale.join(' – ') + '.  These ' + scale.length + ' notes form the '
      + root + ' ' + typeName + ' scale — now we pick the chord tones from it.';
  }

  function buildChordDesc(root, type, def, chordNotes){
    const noteStr = chordNotes.join(', ');
    const degStr = def.labels.join(' + ');
    // Use "Root" not "1st" throughout
    const cleanDesc = def.desc.replace('1st','Root');
    return cleanDesc + '.  '
      + root + ' ' + type + ' = ' + noteStr
      + '  (' + degStr + ').  '
      + 'Combine any of these notes on the guitar and you have a ' + root + ' ' + type + ' chord.';
  }

  async function lightChordOnFretboard(){
    const statusEl = document.getElementById('cbFretStatus');
    const key = cbRoot + ' ' + cbType;

    if(!cmd){
      if(statusEl){ statusEl.textContent='No open voicing — ask Vizi to show it on the fretboard'; statusEl.style.color='var(--text-light)'; }
      return;
    }
    if(statusEl){ statusEl.textContent='Lighting fretboard...'; statusEl.style.color='var(--gold)'; }
    try{
      const res = await fetch(RAILWAY_URL+'/fretboard-command',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({command:cmd})
      });
      if(res.ok){
        if(statusEl){ statusEl.textContent='Fretboard lit — open '+cbRoot+' '+cbType+' shape'; statusEl.style.color='var(--green)'; }
      } else {
        if(statusEl){ statusEl.textContent='Could not reach fretboard'; statusEl.style.color='var(--red)'; }
      }

  function getVoicings(note){
    const root = cleanNote(note);

    if(OPEN_VOICINGS[root+'m7'])   voicings.push({tag:'open',label:'Open '+root+' Minor 7th',   cmd:'CHORD '+root+'m7', type:'open'});
    if(OPEN_VOICINGS[root+'7'])    voicings.push({tag:'open',label:'Open '+root+' Dom 7th',      cmd:'CHORD '+root+'7',  type:'open'});
    // Barre shapes
    ['E Shape','A Shape','C Shape','G Shape','D Shape'].forEach(shape=>{
      voicings.push({tag:'barre', label:root+' Major — '+shape, cmd:'CHORD '+root, type:'barre', shape});
      voicings.push({tag:'barre', label:root+' Minor — '+shape, cmd:'CHORD '+root+'m', type:'barre', shape});
    });
    // Triads high
    ['Root on High E','Root on B','Root on G'].forEach(grp=>{

      voicings.push({tag:'triad', label:root+' Major Triad ('+key+')', cmd:'TRIAD '+key+' '+root,     type:'triad'});
      voicings.push({tag:'triad', label:root+' Minor Triad ('+key+')', cmd:'TRIAD '+key+' '+root+'M', type:'triad'});
    });
    // Triads low

      voicings.push({tag:'triad', label:root+' Major Triad ('+key+')', cmd:'TRIAD '+key+' '+root,     type:'triad'});
      voicings.push({tag:'triad', label:root+' Minor Triad ('+key+')', cmd:'TRIAD '+key+' '+root+'M', type:'triad'});
    });
    return voicings;
  }

  // ════════════════════════════════════════════════════════
  // SOLO SCALE LIGHTING — sends SCALE command directly to
  // Railway fretboard relay so backing track keeps playing
  // ════════════════════════════════════════════════════════
  const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';

  // Map scale choice names to fretboard SCALE commands
  const SCALE_COMMANDS = {
    'E Minor — Major Scale':        'SCALE E major shape 1',
    'E Minor — E Minor Pentatonic': 'SCALE E minor pentatonic shape 1',
    'A Minor — Major Scale':        'SCALE A major shape 1',
    'A Minor — A Minor Pentatonic': 'SCALE A minor pentatonic shape 1',
    'G Major — Major Scale':        'SCALE G major shape 1',
    'G Major — E Minor Pentatonic': 'SCALE E minor pentatonic shape 1',
    'D Major — Major Scale':        'SCALE D major shape 1',
    'D Major — B Minor Pentatonic': 'SCALE B minor pentatonic shape 1',
    'C Major — Major Scale':        'SCALE C major shape 1',
    'C Major — A Minor Pentatonic': 'SCALE A minor pentatonic shape 1',
  };

  let soloFeedbackEl = null; // set when solo panel is rendered

  async function lightScaleOnFretboard(scaleName){
    const cmd = SCALE_COMMANDS[scaleName];
    if (!cmd){ console.warn('No command for', scaleName); return; }
    if (soloFeedbackEl){
      soloFeedbackEl.textContent = 'Lighting ' + scaleName.split(' — ')[1] + ' on fretboard...';
      soloFeedbackEl.style.color = 'var(--gold)';
    }
    try {
      const res = await fetch(RAILWAY_URL + '/fretboard-command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd })
      });
      if (res.ok){
        if (soloFeedbackEl){
          soloFeedbackEl.textContent = 'Fretboard lit — solo away!';
          soloFeedbackEl.style.color = 'var(--green)';
        }
      } else {
        if (soloFeedbackEl){
          soloFeedbackEl.textContent = 'Could not reach fretboard — check connection';
          soloFeedbackEl.style.color = 'var(--red)';
        }
      }
    } catch(e){
      if (soloFeedbackEl){
        soloFeedbackEl.textContent = 'Could not reach fretboard — check connection';
        soloFeedbackEl.style.color = 'var(--red)';
      }
    }
  }

  async function startTuner(){
    try {
      tunerCtx = new (window.AudioContext||window.webkitAudioContext)();
      tunerStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      const src = tunerCtx.createMediaStreamSource(tunerStream);
      tunerAnalyser = tunerCtx.createAnalyser(); tunerAnalyser.fftSize=2048;
      src.connect(tunerAnalyser);
      tunerRunning=true; tunerMicBtn.textContent='Stop Listening'; tunerMicBtn.classList.add('listening');
      tunerStatus.textContent='Listening… play one string at a time';
      tunerLoop();
    } catch(e){ tunerStatus.textContent='Microphone blocked — allow mic access'; }
  }
  function stopTuner(){
    tunerRunning=false;
    if (tunerRAF) cancelAnimationFrame(tunerRAF);
    if (tunerStream) tunerStream.getTracks().forEach(t=>t.stop());
    if (tunerCtx) tunerCtx.close().catch(()=>{});
    tunerCtx=null; tunerStream=null; tunerAnalyser=null;
    tunerMicBtn.textContent='Start Listening'; tunerMicBtn.classList.remove('listening');
    tunerStatus.textContent='Tap "Start Listening" and play a string';
    tunerNote.textContent='—'; tunerNote.classList.remove('in-tune');
    tunerFreq.innerHTML='&nbsp;';
    tunerNeedle.style.left='50%'; tunerNeedle.classList.remove('in-tune');
    document.querySelectorAll('.tuner-string-btn').forEach(el=>el.classList.remove('target','in-tune'));
  }
  function tunerLoop(){
    if (!tunerRunning) return;
    const buf=new Float32Array(tunerAnalyser.fftSize);
    tunerAnalyser.getFloatTimeDomainData(buf);
    const freq=autoCorrelate(buf,tunerCtx.sampleRate);
    if (freq>0) updateTunerDisplay(freq);
    tunerRAF=requestAnimationFrame(tunerLoop);
  }
  function autoCorrelate(buf,sampleRate){
    const SIZE=buf.length; let rms=0;
    for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/SIZE); if(rms<0.01) return -1;
    let r1=0,r2=SIZE-1,thresh=0.2;
    for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<thresh){r1=i;break;}}
    for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<thresh){r2=SIZE-i;break;}}
    const trimmed=buf.slice(r1,r2); const n=trimmed.length; if(n<2) return -1;
    const c=new Array(n).fill(0);
    for(let lag=0;lag<n;lag++) for(let i=0;i<n-lag;i++) c[lag]+=trimmed[i]*trimmed[i+lag];
    let d=0; while(d<n-1&&c[d]>c[d+1])d++;
    let maxVal=-1,maxPos=-1;
    for(let i=d;i<n;i++){if(c[i]>maxVal){maxVal=c[i];maxPos=i;}}
    let T0=maxPos; if(T0<=0) return -1;
    if(T0>0&&T0<n-1){const x1=c[T0-1],x2=c[T0],x3=c[T0+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a!==0)T0=T0-b/(2*a);}
    return sampleRate/T0;
  }
  function nearestString(freq){
    let best=STRINGS_TUNER[0],bestDiff=Infinity;
    STRINGS_TUNER.forEach(s=>{const d=Math.abs(Math.log2(freq/s.freq));if(d<bestDiff){bestDiff=d;best=s;}});
    return best;
  }
  function updateTunerDisplay(freq){
    if(freq<60||freq>500) return;
    const target=nearestString(freq);
    const cents=1200*Math.log2(freq/target.freq);
    const clamped=Math.max(-50,Math.min(50,cents));
    const pct=50+(clamped/50)*50;
    const inTune=Math.abs(cents)<5;
    tunerNote.textContent=target.label; tunerNote.classList.toggle('in-tune',inTune);
    tunerFreq.textContent=freq.toFixed(1)+' Hz  ·  target '+target.freq.toFixed(2)+' Hz  ·  '+(cents>0?'+':'')+cents.toFixed(0)+'c';
    tunerNeedle.style.left=pct+'%'; tunerNeedle.classList.toggle('in-tune',inTune);
    tunerStatus.textContent=inTune?'In tune!':cents<0?'Tune up':'Tune down';
    document.querySelectorAll('.tuner-string-btn').forEach(el=>{
      const idx=parseInt(el.dataset.idx,10),isTarget=STRINGS_TUNER[idx]===target;
      el.classList.toggle('target',isTarget); el.classList.toggle('in-tune',isTarget&&inTune);
    });
  }

      `;

    // ── Build DOM ───────────────────────────────────────────
    const wrap=document.createElement('div'); wrap.className='tb-wrap';

    const topRow=document.createElement('div'); topRow.className='tb-top-row';

    // Preset buttons

    [{label:'Single',cls:'',desc:'One note per beat'},{label:'Double',cls:'',desc:'Mix of singles and double stops'},{label:'Triple',cls:'',desc:'Power chords and triples'},{label:'Custom',cls:'custom-btn',desc:'Build your own'}]

    // Grid

    gridWrap.appendChild(lblCol);

    const cells=[[],[]] ;
    const noteLabelCells=[[],[]];
    for(let m=0;m<2;m++){
      cells[m]=[[],[],[],[]];
      const mDiv=document.createElement('div'); mDiv.className='tb-measure';
      const mHead=document.createElement('div'); mHead.className='tb-measure-head';
      const mLbl=document.createElement('span'); mLbl.className='tb-m-label'; mLbl.textContent='M'+(m+1);
      mHead.appendChild(mLbl);
      for(let b=0;b<4;b++){ const bh=document.createElement('div'); bh.className='tb-beat-head'; bh.textContent=b+1; mHead.appendChild(bh); }
      mDiv.appendChild(mHead);
      for(let s=0;s<6;s++){

    const clrAll=document.createElement('button'); clrAll.className='tb-action-btn clr'; clrAll.textContent='Clear All'; clrAll.addEventListener('click',clearAll); clrRow.appendChild(clrAll);
    wrap.appendChild(clrRow);

    // Numpad
    const numWrap=document.createElement('div'); numWrap.className='tb-numpad-wrap';
    const numLabel=document.createElement('div'); numLabel.className='tb-numpad-label';
    numLabel.textContent='Tap a cell, then enter fret 0–13';
    numWrap.appendChild(numLabel);
    const numpad=document.createElement('div'); numpad.className='tb-numpad';
    for(let n=0;n<=13;n++){ const nb=document.createElement('button'); nb.className='tb-num-btn'; nb.textContent=n; nb.addEventListener('click',()=>enterFret(n)); numpad.appendChild(nb); }
    const clrCellBtn=document.createElement('button'); clrCellBtn.className='tb-num-btn tb-clr-btn'; clrCellBtn.textContent='✕'; clrCellBtn.addEventListener('click',clearCell); numpad.appendChild(clrCellBtn);
    numWrap.appendChild(numpad); wrap.appendChild(numWrap);

    const status=document.createElement('div'); status.className='tb-status'; status.textContent='Choose a preset or tap a cell to start'; wrap.appendChild(status);

    const actions=document.createElement('div'); actions.className='tb-actions';
    const playBtn=document.createElement('button'); playBtn.className='tb-action-btn play full-width'; playBtn.innerHTML='&#9654; Show';
    actions.appendChild(playBtn); wrap.appendChild(actions);
    container.appendChild(wrap);

    // ── Helpers ────────────────────────────────────────────
    function token(s,f){ return 'S'+STR_CODES[s]+f; }

    function updateCell(m,b,s){
      const cell=cells[m][b][s],val=grid[m][b][s];
      cell.classList.remove('filled','empty-ph');
      if(val===null){ cell.textContent=''; cell.classList.add('empty-ph'); }
      else{ cell.textContent=val; cell.classList.add('filled'); }
      updateNoteLabel(m,b);
    }

    function updateNoteLabel(m,b){
      const el=noteLabelCells[m][b];
      const notes=[];
      for(let s=0;s<6;s++){ const v=grid[m][b][s]; if(v!==null) notes.push(fretToNote(STR_CODES[s],v)); }
      el.textContent = notes.length ? notes.join('/') : '';
    }

    function selectCell(m,b,s){
      if(tbSelectedCell){ const {m:pm,b:pb,s:ps}=tbSelectedCell; cells[pm][pb][ps].classList.remove('selected'); }
      tbSelectedCell={m,b,s};
      cells[m][b][s].classList.remove('empty-ph'); cells[m][b][s].classList.add('selected');
      numLabel.textContent='String '+STRINGS[s]+', Beat '+(b+1)+', Measure '+(m+1)+' — enter fret 0–13';
    }

    function enterFret(n){
      if(!tbSelectedCell)return;
      const {m,b,s}=tbSelectedCell;
      grid[m][b][s]=n; updateCell(m,b,s); cells[m][b][s].classList.add('selected');
      status.textContent=STRINGS[s]+' string fret '+n+' = '+fretToNote(STR_CODES[s],n);
      if(s<5) selectCell(m,b,s+1);
    }

    function clearCell(){ if(!tbSelectedCell)return; const {m,b,s}=tbSelectedCell; grid[m][b][s]=null; updateCell(m,b,s); }
    function clearMeasure(m){ for(let b=0;b<4;b++) for(let s=0;s<6;s++){ grid[m][b][s]=null; updateCell(m,b,s); } status.textContent='Measure '+(m+1)+' cleared'; }
    function clearAll(){ for(let m=0;m<2;m++) clearMeasure(m); tbSelectedCell=null; }
    // ── Random presets ─────────────────────────────────────
    function randFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function randomNote(sIdx){ return randFrom(PENTA['G'][STR_CODES[sIdx]]); }

    function generatePreset(type){
      clearAll();
      for(let m=0;m<2;m++){
        for(let b=0;b<4;b++){
          if(type===0){
            const s=Math.floor(Math.random()*6); grid[m][b][s]=randomNote(s);
          } else if(type===1){
            if(Math.random()>0.4){ const s=Math.floor(Math.random()*5); grid[m][b][s]=randomNote(s); grid[m][b][s+1]=randomNote(s+1); }
            else { const s=Math.floor(Math.random()*6); grid[m][b][s]=randomNote(s); }
          } else {
            if(Math.random()>0.4){ const root=3+Math.floor(Math.random()*2); grid[m][b][root]=randomNote(root); grid[m][b][root-1]=randomNote(root-1); if(root===4) grid[m][b][2]=randomNote(2); }
            else { const s=Math.floor(Math.random()*4); grid[m][b][s]=randomNote(s); grid[m][b][s+1]=randomNote(s+1); grid[m][b][s+2]=randomNote(s+2); }
          }
          for(let s=0;s<6;s++) updateCell(m,b,s);
        }
      }
      status.textContent=['Single','Double','Triple'][type]+' note pattern — tap again for a different one';
    }

    // ── Show: hand the whole sequence to the fretboard, no JS timing ──
    async function sendFretboardCmd(cmd){ try{ await fetch(RAILWAY_URL+'/fretboard-command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})}); }catch(e){} }

    function allBeats(){ const beats=[]; for(let m=0;m<2;m++) for(let b=0;b<4;b++){ const notes=[]; for(let s=0;s<6;s++) if(grid[m][b][s]!==null) notes.push({s,f:grid[m][b][s]}); beats.push({m,b,notes}); } return beats; }

    // Build one sequential bracket command spanning BOTH measures in order —
    // the fretboard firmware paces itself; we don't drive timing from JS.
    function fullSequenceCmd(){
      const steps=[];
      allBeats().forEach(bt=>{
        if(!bt.notes.length) return;
        const toks=bt.notes.map(n=>token(n.s,n.f));
        steps.push(toks.length===1?toks[0]:'('+toks.join(',')+')');
      });
      return steps.length?'['+steps.join(',')+']':null;
    }

    playBtn.addEventListener('click',async()=>{
      const cmd=fullSequenceCmd();
      if(!cmd){ status.textContent='Add some notes first'; return; }
      status.textContent='Sent to fretboard — follow the LEDs at your own pace.';
      await sendFretboardCmd(cmd);
    });
  }

  function updateTabStepper(){
    if(!tabGroups.length)return;
    const g=tabGroups[tabStepIdx];
    const el=document.getElementById('tabStepNote'),pos=document.getElementById('tabStepPos');
    const prev=document.getElementById('tabPrevBtn'),next=document.getElementById('tabNextBtn');
    if(el)el.textContent=g.map(tokenToNote).join(', ');
    if(pos)pos.textContent='step '+(tabStepIdx+1)+' of '+tabGroups.length;
    if(prev)prev.disabled=(tabStepIdx===0);
    if(next)next.disabled=(tabStepIdx===tabGroups.length-1);
  }

  async function sendTabStep(){
    if(!tabGroups.length)return;
    const g=tabGroups[tabStepIdx];
    const sEl=document.getElementById('tabFretStatus');
    const strMap={He:'HiE',B:'B',G:'G',D:'D',A:'A',Le:'LoE'};
    // Build pipe-delimited command for all simultaneous notes
    const cmds=g.map(t=>{
      const m=t.match(/^S(He|B|G|D|A|Le)(\d+)$/);
      if(!m)return null;
      return 'SF '+strMap[m[1]]+' '+m[2];
    }).filter(Boolean);
    if(!cmds.length)return;
    const cmd=cmds.join(' | ');
    const noteNames=g.map(tokenToNote).join('+');
    if(sEl){sEl.textContent='Sending...';sEl.style.color='var(--gold)';}
    try{
      const res=await fetch(RAILWAY_URL+'/fretboard-command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
      if(res.ok){if(sEl){sEl.textContent=noteNames+' — lit';sEl.style.color='var(--green)';}}
      else{if(sEl){sEl.textContent='Could not reach fretboard';sEl.style.color='var(--red)';}}
    }catch(e){if(sEl){sEl.textContent='Could not reach fretboard';sEl.style.color='var(--red)';}}
  }

  function startTabAuto(){
    if(!tabGroups.length)return;
    tabAutoPlaying=true;
    const btn=document.getElementById('tabAutoBtn');
    if(btn){btn.textContent='■ Stop';btn.classList.add('playing');}
    function step(){
      if(!tabAutoPlaying)return;
      updateTabStepper();sendTabStep();
      if(tabStepIdx<tabGroups.length-1){tabStepIdx++;tabAutoTimer=setTimeout(step,tabSpeedMs);}
      else{stopTabAuto();}
    }
    step();
  }
  function stopTabAuto(){
    tabAutoPlaying=false;clearTimeout(tabAutoTimer);
    const btn=document.getElementById('tabAutoBtn');
    if(btn){btn.textContent='▶ Auto-play';btn.classList.remove('playing');}
  }

  // ── Tab parser ───────────────────────────────────────────────
  const LABEL_TO_CODE_TAB={'e':'He','b':'B','g':'G','d':'D','a':'A','E':'Le'};
  const OPEN_SEMI={'He':4,'B':11,'G':7,'D':2,'A':9,'Le':4};
  const NOTE_NAMES_TAB=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function tokenToNote(t){const m=t.match(/^S(He|B|G|D|A|Le)(\d+)$/);if(!m)return'?';return NOTE_NAMES_TAB[(OPEN_SEMI[m[1]]+parseInt(m[2]))%12];}
  function parseAsciiTab(text){
    const lines=text.replace(/\r\n/g,'\n').split('\n');
    const blocks=[];let i=0;
    function isStr(l){return /^[eEbBgGdDaA]\s*\|/.test(l);}
    while(i<lines.length){
      const block=[];let j=i;const exp=['e','B','G','D','A','E'];
      for(let k=0;k<exp.length&&j<lines.length;){
        const l=lines[j];if(!isStr(l)){j++;continue;}
        if(l.trim().slice(0,1).toUpperCase()===exp[k].toUpperCase()){block.push(l);k++;}j++;
      }
      if(block.length===6){blocks.push(block);i=j;}else{i++;}
    }
    const all=[];
    for(const blk of blocks){
      const rows=blk.map(l=>{const ix=l.indexOf('|');return{label:l.slice(0,ix).trim(),content:l.slice(ix+1)};});
      const maxLen=Math.max(...rows.map(r=>r.content.length));
      let col=0;
      while(col<maxLen){
        const notes=[];
        for(let r=0;r<rows.length;r++){
          const row=rows[r],c1=row.content[col]||'-',c2=row.content[col+1]||'',c3=row.content[col+2]||'';
          if(/\d/.test(c1)){
            let n=c1;if(/\d/.test(c2))n+=c2;if(/\d/.test(c3)&&n.length<3)n+=c3;
            const fret=parseInt(n,10),raw=row.label.slice(0,1);
            const code=raw==='e'?'He':raw==='E'?'Le':LABEL_TO_CODE_TAB[raw]||raw;
            notes.push({code,fret});
          }
        }
        if(notes.length>0){
          const ord={He:0,B:1,G:2,D:3,A:4,Le:5};
          notes.sort((a,b)=>ord[a.code]-ord[b.code]);
          all.push(notes.map(n=>'S'+n.code+n.fret));
          col+=Math.max(1,Math.max(...notes.map(n=>String(n.fret).length)));
        }else{col++;}
      }
    }
    return all;
  }
