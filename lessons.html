function getAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playStrum(time, type, isDownbeat){
  const ctx = getAudioCtx();
  const freqs = type==='D' ? [82,110,147,196,247,330] : [330,247,196,147,110,82];
  freqs.forEach((freq,i)=>{
    const delay = (i/freqs.length)*0.018;
    const osc = ctx.createOscillator();
    const bpf = ctx.createBiquadFilter();
    const g   = ctx.createGain();
    osc.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, time+delay);
    osc.detune.setValueAtTime((Math.random()-.5)*10, time+delay);
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(freq*1.6, time+delay);
    bpf.Q.setValueAtTime(2.8, time+delay);
    const vel = isDownbeat ? 0.26 : (type==='D' ? 0.17 : 0.13);
    g.gain.setValueAtTime(0, time+delay);
    g.gain.linearRampToValueAtTime(vel, time+delay+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, time+delay+0.3);
    osc.start(time+delay); osc.stop(time+delay+0.35);
  });
}

// ═══════════════════════════════════════════════════
// SCHEDULER
// ═══════════════════════════════════════════════════
function secPerSlot(){
  if (currentTS==='68') return 60/bpm/3;
  if (subdivisions===0)  return 60/bpm * TIME_SIGS[currentTS].beats; // whole = full measure
  if (subdivisions===-1) return 60/bpm * (TIME_SIGS[currentTS].beats/2); // half
  if (subdivisions===1)  return 60/bpm;       // quarter
  return 60/bpm/2;                            // eighth
}

function scheduleNotes(){
  const ctx = getAudioCtx();
  while (nextNoteTime < ctx.currentTime+SCHEDULE_AHEAD){
    const idx = currentSlotIndex % slots.length;
    const val = slots[idx];
    const isDownbeat = currentTS==='68' ? (idx===0||idx===3) : (idx===0);
    if (val==='D'||val==='U') playStrum(nextNoteTime, val, isDownbeat);
    const cap = idx, capT = nextNoteTime;
    const delay = Math.max(0,(capT-ctx.currentTime)*1000);
    const beats = TIME_SIGS[currentTS] ? TIME_SIGS[currentTS].beats : 4;
    const quarterSec = 60/bpm; // always one quarter note in seconds

    // How many quarter-note beats does this slot span?
    const beatsThisSlot = currentTS==='68' ? 1
      : subdivisions===0  ? beats      // whole = full measure
      : subdivisions===-1 ? beats/2    // half  = half measure (2 in 4/4, 1.5 in 3/4)
      : subdivisions===1  ? 1          // quarter = 1 beat
      : 0.5;                           // eighth = half a beat (2 slots per beat)

    // Beat number of the FIRST beat in this slot, derived from slot index — never drifts
    // For eighth notes 2 slots = 1 beat, so beatOffset advances every 2 slots
    const slotsBeatRatio = subdivisions===2 ? 0.5 : beatsThisSlot; // beats per slot
    const firstBeatOfSlot = Math.round(currentSlotIndex * slotsBeatRatio) % beats;

    // For eighth notes: 2 slots per beat, only fire foot tap on first slot of each beat pair
    const isEighth = (subdivisions===2);
    const shouldTickFoot = !isEighth || (currentSlotIndex % 2 === 0);
    const beatAtThisSlot = isEighth ? Math.floor(currentSlotIndex/2) % beats : firstBeatOfSlot;

    if (isEighth){
      // Eighth: one slot = one strum, foot only taps every other slot
      const capSlot = cap, capBeat = beatAtThisSlot;
      setTimeout(()=>{
        if (!isPlaying) return;
        currentSlot = capSlot;
        if (shouldTickFoot) currentBeat = capBeat;
        updateHighlights();
      }, delay);
    } else {
      // Whole/half/quarter: fire one tick per beat within the slot
      for (let b=0; b<Math.round(beatsThisSlot); b++){
        const beatNum = (firstBeatOfSlot + b) % beats;
        const beatDelay = delay + b * quarterSec * 1000;
        const capSlot = cap, capBeat = beatNum;
        setTimeout(()=>{
          if (!isPlaying) return;
          currentSlot = capSlot;
          currentBeat = capBeat;
          updateHighlights();
        }, beatDelay);
      }
    }
    nextNoteTime += secPerSlot();
    currentSlotIndex++;
  }
}

function startScheduler(){
  const ctx = getAudioCtx();
  nextNoteTime = ctx.currentTime+0.05;
  currentSlotIndex = 0;
  currentBeat = -1;
  schedulerTimer = setInterval(scheduleNotes, TICK_INTERVAL);
}

function stopScheduler(){
  clearInterval(schedulerTimer); schedulerTimer=null;
  currentSlot=-1; currentBeat=-1; updateHighlights();
}

function stopPlayback(){
  if (!isPlaying) return;
  isPlaying=false; stopScheduler();
  const btn = document.getElementById('playBtn');
  btn.textContent='▶'; btn.classList.remove('playing'); btn.disabled=false;
}

// ═══════════════════════════════════════════════════
// HIGHLIGHTS
// ═══════════════════════════════════════════════════
function updateHighlights(){
  document.querySelectorAll('.stroke-slot').forEach(el=>{
    el.classList.toggle('active-beat', parseInt(el.dataset.idx)===currentSlot);
  });
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach((dot,i)=>{
    dot.classList.remove('active','downbeat');
    const slotsPerBt = subdivisions<=0?1:subdivisions===1?1:2;
    const beatIdx = currentTS==='68' ? (currentSlot<3?0:1)
                  : subdivisions===0  ? 0
                  : subdivisions===-1 ? currentSlot
                  : Math.floor(currentSlot/slotsPerBt);
    if (i===beatIdx) dot.classList.add(beatIdx===0?'downbeat':'active');
  });
  const taps = document.querySelectorAll('.foot-tap');
  taps.forEach(t=>t.classList.remove('active','downbeat'));
  if (currentBeat>=0){
    // Foot always taps every quarter-note beat regardless of note duration
    const ti = currentTS==='68' ? (currentBeat<1?0:1) : currentBeat;
    if (taps[ti]) taps[ti].classList.add(ti===0?'downbeat':'active');
  }
}

// ═══════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════
function renderExplainer(){
  const ts = TIME_SIGS[currentTS];
  document.getElementById('tsExplainer').innerHTML =
    '<div class="ts-explainer-title">'+ts.explainerTitle+'</div>'+
    '<div class="ts-explainer-body">'+ts.explainerBody+'</div>'+
    '<span class="ts-explainer-songs">🎸 '+ts.songs+'</span>';
}

function renderFootTaps(){
  const container = document.getElementById('footTaps');
  container.innerHTML = '';
  TIME_SIGS[currentTS].footLabels.forEach(label=>{
    const el = document.createElement('div');
    el.className='foot-tap'; el.textContent=label;
    container.appendChild(el);
  });
}

function renderPatternTabs(){
  const ts = TIME_SIGS[currentTS];
  const container = document.getElementById('patternTabs');
  container.innerHTML = '';
  ts.patterns.forEach((pat,i)=>{
    const btn = document.createElement('button');
    btn.className = 'pattern-tab'+(pat.custom?' custom-tab':'')+(i===currentPatternIdx?' active':'');
    btn.textContent = pat.label;
    btn.addEventListener('click',()=>{
      if (pat.custom) stopPlayback();
      currentPatternIdx=i;
      slots=[...ts.patterns[i].slots];
      syncSlotsLength();
      renderPatternTabs();
      renderCustomHint();
      renderStaticDiagram();
      buildGrid();
      updatePlayBtn();
    });
    container.appendChild(btn);
  });
}

function renderCustomHint(){
  document.getElementById('customHint').classList.toggle('show', isCustom());
  document.getElementById('gridLabel').textContent = isCustom()
    ? 'Tap each slot to set it — then hit play'
    : 'Lights up as it plays';
}

function makeStaticStroke(val){
  const el = document.createElement('div');
  el.className = 'static-stroke '+(val==='D'?'down':val==='U'?'up':'skip');
  el.textContent = val==='D'?'D':val==='U'?'U':' ';
  return el;
}

function renderStaticDiagram(){
  const ts = TIME_SIGS[currentTS];
  const pat = ts.patterns[currentPatternIdx];
  const container = document.getElementById('staticDiagram');
  container.innerHTML = '';

  if (currentTS==='68'){
    const groups = pat.groups||[[0,1,2],[3,4,5]];
    ['ONE – and – a','TWO – and – a'].forEach((lbl,gi)=>{
      const grp = document.createElement('div'); grp.className='group-bracket';
      const lblEl = document.createElement('div'); lblEl.className='bracket-label'; lblEl.textContent=lbl;
      grp.appendChild(lblEl);
      const strokes = document.createElement('div'); strokes.className='bracket-strokes';
      groups[gi].forEach(idx=>strokes.appendChild(makeStaticStroke(slots[idx]||' ')));
      grp.appendChild(strokes); container.appendChild(grp);
      if (gi<1){ const div=document.createElement('div'); div.className='static-divider'; container.appendChild(div); }
    });
  } else {
    for (let b=0; b<ts.beats; b++){
      const cell=document.createElement('div'); cell.className='static-beat';
      const num=document.createElement('div'); num.className='static-beat-num'; num.textContent=b+1;
      cell.appendChild(num);
      const grp=document.createElement('div'); grp.className='static-beat-group';
      for (let s=0; s<subdivisions; s++) grp.appendChild(makeStaticStroke(slots[b*subdivisions+s]||' '));
      cell.appendChild(grp); container.appendChild(cell);
      if (b<ts.beats-1){ const div=document.createElement('div'); div.className='static-divider'; container.appendChild(div); }
    }
  }
}

function buildGrid(){
  const ts = TIME_SIGS[currentTS];
  const grid = document.getElementById('beatGrid');
  grid.innerHTML = '';
  const editable = isCustom();

  function makeSlot(idx){
    const val = slots[idx]||' ';
    const slot = document.createElement('div');
    const cls = val==='D'?'down':val==='U'?'up':'';
    slot.className = 'stroke-slot'+(cls?' '+cls:'')+(editable?' editable':' locked');
    slot.dataset.idx = idx;
    slot.textContent = val==='D'?'↓':val==='U'?'↑':' ';
    if (editable){
      slot.addEventListener('click',()=>{
        const cur=slots[idx]||' ';
        slots[idx]=cur===' '?'D':cur==='D'?'U':' ';
        const v=slots[idx];
        slot.className='stroke-slot'+(v==='D'?' down':v==='U'?' up':'')+' editable';
        slot.textContent=v==='D'?'↓':v==='U'?'↑':' ';
        renderStaticDiagram();
        updatePlayBtn();
      });
    }
    return slot;
  }

  if (currentTS==='68'){
    [[0,1,2],[3,4,5]].forEach((grpIndices,gi)=>{
      const cell=document.createElement('div'); cell.className='beat-cell';
      const num=document.createElement('div'); num.className='beat-number';
      num.textContent=gi===0?'ONE – and – a':'TWO – and – a'; num.style.fontSize='.44rem';
      cell.appendChild(num);
      const strokes=document.createElement('div'); strokes.className='beat-strokes';
      grpIndices.forEach(idx=>strokes.appendChild(makeSlot(idx)));
      cell.appendChild(strokes); grid.appendChild(cell);
    });
  } else {
    // slotsPerBeat: whole=all in 1 cell, half=2 cells total, quarter=1/beat, eighth=2/beat
    const slotsPerBeat = subdivisions===0 ? 0
                       : subdivisions===-1 ? 0
                       : subdivisions===1  ? 1
                       : 2; // eighth
    if (subdivisions===0){
      // Whole note — one single cell spanning all beats
      const cell=document.createElement('div'); cell.className='beat-cell';
      cell.style.flex='4';
      const num=document.createElement('div'); num.className='beat-number'; num.textContent='1 — whole note';
      cell.appendChild(num);
      const strokes=document.createElement('div'); strokes.className='beat-strokes';
      strokes.appendChild(makeSlot(0));
      cell.appendChild(strokes); grid.appendChild(cell);
    } else if (subdivisions===-1){
      // Half notes — two cells
      for (let h=0; h<2; h++){
        const cell=document.createElement('div'); cell.className='beat-cell'; cell.style.flex='2';
        const num=document.createElement('div'); num.className='beat-number';
        num.textContent = h===0?'1-2':'3-4';
        cell.appendChild(num);
        const strokes=document.createElement('div'); strokes.className='beat-strokes';
        strokes.appendChild(makeSlot(h));
        cell.appendChild(strokes); grid.appendChild(cell);
      }
    } else {
      for (let b=0; b<ts.beats; b++){
        const cell=document.createElement('div'); cell.className='beat-cell';
        const num=document.createElement('div'); num.className='beat-number'; num.textContent=b+1;
        cell.appendChild(num);
        const strokes=document.createElement('div'); strokes.className='beat-strokes';
        for (let s=0; s<slotsPerBeat; s++) strokes.appendChild(makeSlot(b*slotsPerBeat+s));
        cell.appendChild(strokes); grid.appendChild(cell);
      }
    }
  }
  buildBeatIndicator();
}

function buildBeatIndicator(){
  const container = document.getElementById('beatIndicator');
  container.innerHTML = '';
  const count = currentTS==='68' ? 2
              : subdivisions===0  ? 1
              : subdivisions===-1 ? 2
              : TIME_SIGS[currentTS].beats;
  for (let i=0; i<count; i++){
    const dot=document.createElement('div'); dot.className='beat-dot'; container.appendChild(dot);
  }
}

function updatePlayBtn(){
  const btn = document.getElementById('playBtn');
  if (isCustom()){
    btn.disabled = !slots.some(s=>s==='D'||s==='U');
  } else {
    btn.disabled = false;
  }
}

function syncSlotsLength(){
  // slots per measure by duration:
  // whole=1, half=2, quarter=beats, eighth=beats*2
  let needed;
  if (currentTS==='68'){
    needed = 6; // 6/8 always 6 eighth notes
  } else {
    const beats = TIME_SIGS[currentTS].beats;
    if      (subdivisions===0)  needed = 1;           // whole note
    else if (subdivisions===-1) needed = 2;           // half notes
    else if (subdivisions===1)  needed = beats;       // quarter notes
    else                        needed = beats * 2;   // eighth notes (default)
  }
  while (slots.length<needed) slots.push(' ');
  while (slots.length>needed) slots.pop();
}

function renderAll(){
  slots = [...TIME_SIGS[currentTS].patterns[currentPatternIdx].slots];
  syncSlotsLength();
  renderExplainer();
  renderFootTaps();
  renderPatternTabs();
  renderCustomHint();
  renderStaticDiagram();
  buildGrid();
  updatePlayBtn();
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
document.querySelectorAll('.ts-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    stopPlayback();
    document.querySelectorAll('.ts-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTS=tab.dataset.ts; currentPatternIdx=0;
    renderAll();
  });
});

document.getElementById('playBtn').addEventListener('click',()=>{
  if (isPlaying){ stopPlayback(); }
  else {
    isPlaying=true; startScheduler();
    const btn=document.getElementById('playBtn');
    btn.textContent='■'; btn.classList.add('playing');
  }
});

document.getElementById('bpmSlider').addEventListener('input',e=>{
  bpm=parseInt(e.target.value);
  document.getElementById('bpmValue').textContent=bpm+' BPM';
});

document.querySelectorAll('[data-feel]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const feel = parseInt(btn.dataset.feel);
    // feel: 0=whole(1 slot/measure), -1=half(2 slots), 1=quarter(4 slots), 2=eighth(8 slots)
    // Reload preset slots fresh for new duration — no scaling needed
    if (!isCustom()){
      const ts = TIME_SIGS[currentTS];
      // Reset to preset default then let syncSlotsLength pad/trim
      slots = [...ts.patterns[currentPatternIdx].slots];
    }
    document.querySelectorAll('[data-feel]').forEach(b=>b.classList.remove('active-feel'));
    btn.classList.add('active-feel');
    subdivisions = feel===0 ? 0 : feel===-1 ? -1 : feel;
    syncSlotsLength(); renderPatternTabs(); renderCustomHint();
    renderStaticDiagram(); buildGrid(); updatePlayBtn();
  });
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();

  renderAll();
} // end initStrumPlayer



  // Metronome handled by shared floating widget — see metronome-widget.js

})(); // end IIFE
</script>
