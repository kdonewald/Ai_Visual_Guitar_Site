<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lessons — Ai Visual Guitar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F0E8; --cream-dark:#EDE6D6; --cream-mid:#E0D5C0;
    --red:#D94025; --red-dark:#B83320; --blue:#1B4F8A;
    --gold:#E8A020; --teal:#2AACB8; --green:#4CAF50;
    --text:#2A2018; --text-mid:#5A4A38; --text-light:#8A7A68;
    --white:#FFFFFF; --shadow:rgba(42,32,24,0.10); --shadow-lg:rgba(42,32,24,0.18);
    /* strum player */
    --neck:#3d2a18; --neck-dark:#2a1d10;
    --slot-empty-bg:rgba(255,255,255,0.10); --slot-empty-border:rgba(255,255,255,0.20);
    --slot-down-bg:rgba(217,64,37,0.38); --slot-down-border:#D94025;
    --slot-up-bg:rgba(80,130,210,0.38); --slot-up-border:#6b9fd4;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--cream); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; padding-bottom:3rem;
  }

  /* nav */
  nav{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 2rem; background:rgba(245,240,232,0.95);
    backdrop-filter:blur(12px); border-bottom:2px solid var(--cream-dark);
  }
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;color:var(--text)}
  .nav-link{font-size:.82rem;font-weight:500;color:var(--text-mid);text-decoration:none;padding:7px 16px;border-radius:6px;border:2px solid var(--cream-dark);transition:all .2s;}
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}

  /* panel */
  .panel-wrap{ max-width:920px; margin:1rem auto 0; padding:0 1.5rem; }
  .cat-panel{display:none;background:var(--white);border:2px solid var(--cream-dark);border-radius:16px;box-shadow:0 8px 28px var(--shadow);overflow:hidden;animation:fade-up .35s ease both;}
  .cat-panel.show{display:block}
  @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .cat-head{padding:1.6rem 2rem 1.4rem;border-bottom:2px solid var(--cream-dark);background:linear-gradient(135deg,var(--white) 0%,var(--cream) 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .cat-stage-tag{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;}
  .cat-title{font-family:'Playfair Display',serif;font-weight:900;font-size:1.7rem;letter-spacing:-.01em;}
  .cat-desc{color:var(--text-mid);font-size:.86rem;margin-top:.4rem;max-width:480px;line-height:1.55}
  .cat-close{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;width:34px;height:34px;flex-shrink:0;cursor:pointer;font-size:1rem;color:var(--text-mid);transition:all .2s;}
  .cat-close:hover{border-color:var(--red);color:var(--red)}
  .cat-body{padding:1.6rem 2rem 2rem;}

  /* choice row */
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.6rem;}
  .choice-card{background:var(--cream);border:2px solid var(--cream-dark);border-radius:12px;padding:1.1rem 1.2rem;cursor:pointer;transition:all .2s;text-align:left;}
  .choice-card:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .choice-card .ci{font-size:1.4rem;margin-bottom:.4rem;display:block}
  .choice-card .ct{font-weight:600;font-size:.92rem;margin-bottom:.2rem}
  .choice-card .cs{font-size:.74rem;color:var(--text-light);line-height:1.4}
  .choice-card.watched .cs{color:var(--green)}

  /* video */
  .vid-wrap{display:none;margin-bottom:1.6rem;}
  .vid-wrap.show{display:block}
  .vid-wrap video{width:100%;max-height:420px;border-radius:12px;background:#0a0a0a;display:block;box-shadow:0 6px 20px var(--shadow);}
  .vid-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);}
  .vid-meta button{background:none;border:none;color:var(--blue);cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;}

  /* tip */
  .tip-card{display:none;align-items:flex-start;gap:.8rem;background:rgba(232,160,32,0.08);border:2px solid rgba(232,160,32,0.3);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.6rem;}
  .tip-card.show{display:flex}
  .tip-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
  .tip-text{font-size:.86rem;line-height:1.55;color:var(--text)}
  .tip-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.25rem;}

  /* exercise list */
  .ex-list{display:flex;flex-direction:column;gap:.6rem;}
  .ex-item{display:flex;align-items:center;gap:.85rem;background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.85rem 1.1rem;cursor:pointer;transition:all .18s;}
  .ex-item:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .ex-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--cream-dark);color:var(--text-mid);font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;display:flex;align-items:center;justify-content:center;}
  .ex-item.done .ex-num{background:var(--green);color:white}
  .ex-name{font-size:.88rem;font-weight:500;flex:1}
  .ex-arrow{color:var(--text-light);font-size:.9rem}

  /* choice panel */
  .choice-panel-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-light);margin-bottom:.75rem;display:block;}
  .choice-grid{display:grid;gap:.55rem;margin-bottom:1rem;}
  .choice-grid.cols-2{grid-template-columns:1fr 1fr}
  .choice-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .choice-btn{background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.75rem .85rem;cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;gap:.6rem;}
  .choice-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04);transform:translateY(-1px)}
  .choice-btn .cb-icon{font-size:1.1rem;flex-shrink:0}
  .choice-btn .cb-name{font-size:.88rem;font-weight:600;color:var(--text);display:block}
  .choice-btn .cb-desc{font-size:.72rem;color:var(--text-light);line-height:1.35;margin-top:.1rem}
  .choice-btn .cb-arrow{margin-left:auto;color:var(--text-light);font-size:.8rem;flex-shrink:0}
  .choice-hint{font-size:.78rem;color:var(--text-mid);line-height:1.5;background:rgba(27,79,138,0.05);border:1.5px solid rgba(27,79,138,0.12);border-radius:8px;padding:.7rem .9rem;margin-bottom:1rem;}

  /* tuner */
  .choice-card.tuner-card{background:rgba(76,175,80,0.06);border-color:rgba(76,175,80,0.3)}
  .choice-card.tuner-card:hover{border-color:var(--green);background:rgba(76,175,80,0.1)}
  .tuner-wrap{display:none;margin-bottom:1.6rem;}
  .tuner-wrap.show{display:block}
  .tuner-box{background:linear-gradient(180deg,#2a1d12,#1c130c);border-radius:14px;padding:1.6rem 1.4rem 1.4rem;box-shadow:0 10px 28px var(--shadow-lg);}
  .tuner-status{text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:1rem;}
  .tuner-note{text-align:center;font-family:'Playfair Display',serif;font-weight:900;font-size:3.2rem;color:#fff;line-height:1;margin-bottom:.3rem;transition:color .15s;}
  .tuner-note.in-tune{color:var(--green)}
  .tuner-freq{text-align:center;font-family:'DM Mono',monospace;font-size:.7rem;color:rgba(255,255,255,0.4);margin-bottom:1.2rem;}
  .tuner-gauge{position:relative;height:54px;margin-bottom:1.3rem;}
  .tuner-track{position:absolute;left:0;right:0;top:24px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red) 38%,var(--green) 46%,var(--green) 54%,var(--red) 62%,var(--red) 100%);opacity:.85;}
  .tuner-center-mark{position:absolute;left:50%;top:14px;width:2px;height:24px;background:rgba(255,255,255,0.5);transform:translateX(-50%);}
  .tuner-needle{position:absolute;top:0;width:3px;height:54px;background:#fff;left:50%;transform:translateX(-50%);border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,0.6);transition:left .08s linear;}
  .tuner-needle.in-tune{background:var(--green);box-shadow:0 0 10px var(--green)}
  .tuner-strings{display:flex;gap:.4rem;justify-content:center;}
  .tuner-string-btn{flex:1;max-width:64px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:.5rem .3rem;cursor:default;text-align:center;transition:all .15s;}
  .tuner-string-btn .sname{font-family:'DM Mono',monospace;font-size:.7rem;color:rgba(255,255,255,0.55);display:block}
  .tuner-string-btn .sled{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);margin:.3rem auto 0;}
  .tuner-string-btn.target{border-color:var(--gold);background:rgba(232,160,32,0.12)}
  .tuner-string-btn.target .sname{color:var(--gold)}
  .tuner-string-btn.in-tune .sled{background:var(--green);box-shadow:0 0 6px var(--green)}
  .tuner-mic-btn{display:block;margin:1.2rem auto 0;background:var(--white);border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;}
  .tuner-mic-btn:hover{background:var(--cream)}
  .tuner-mic-btn.listening{background:var(--red);color:white}

  /* warmup: scale sub-panels and reference */
  .scale-subpanel{margin-top:.5rem}
  .scale-key-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:.75rem}
  .scale-key-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.65rem .5rem;cursor:pointer;transition:all .18s;text-align:center;}
  .scale-key-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .scale-key-btn .skb-key{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;color:var(--text);display:block}
  .scale-key-btn .skb-desc{font-size:.62rem;color:var(--text-light);margin-top:.15rem}
  .scale-back-btn{background:none;border:1.5px solid var(--cream-dark);border-radius:6px;padding:.35rem .75rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:.85rem;transition:all .2s;}
  .scale-back-btn:hover{border-color:var(--blue);color:var(--blue)}
  .scale-ref-card{background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;}
  .scale-ref-name{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:.35rem;}
  .scale-ref-pattern{display:flex;align-items:center;gap:.25rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .step-pill{padding:.2rem .45rem;border-radius:4px;font-family:'DM Mono',monospace;font-size:.62rem;font-weight:600;}
  .step-pill.W{background:rgba(27,79,138,0.12);color:var(--blue)}
  .step-pill.H{background:rgba(217,64,37,0.12);color:var(--red)}
  .step-pill.arrow{color:var(--text-light);font-size:.55rem;padding:0}
  .scale-ref-notes{display:flex;gap:.3rem;flex-wrap:wrap}
  .scale-note{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.3rem .45rem;border-radius:6px;border:1.5px solid var(--cream-dark);background:var(--cream);min-width:2rem;}
  .scale-note .sn-name{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;color:var(--text)}
  .scale-note .sn-label{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--text-light)}
  .scale-note.root{background:rgba(217,64,37,0.1);border-color:var(--red)}
  .scale-note.root .sn-name{color:var(--red)}
  .scale-note.third{background:rgba(76,175,80,0.1);border-color:var(--green)}
  .scale-note.third .sn-name{color:var(--green)}
  .scale-note.fifth{background:rgba(27,79,138,0.1);border-color:var(--blue)}
  .scale-note.fifth .sn-name{color:var(--blue)}
  .scale-note.seventh{background:rgba(232,160,32,0.1);border-color:var(--gold)}
  .scale-note.seventh .sn-name{color:var(--gold)}

  /* soloing: bandcamp + grouped */
  .bt-link{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1da0c3,#1a7fa0);border:none;border-radius:10px;padding:.85rem 1.1rem;text-decoration:none;color:white;margin-bottom:1.25rem;cursor:pointer;transition:all .2s;}
  .bt-link:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .bt-link .bt-left{display:flex;align-items:center;gap:.7rem}
  .bt-link .bt-icon{font-size:1.3rem}
  .bt-link .bt-name{font-size:.9rem;font-weight:600;display:block}
  .bt-link .bt-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-top:1px;display:block}
  .bt-link .bt-arrow{font-size:1rem;opacity:.8}
  .solo-group{margin-bottom:1rem}
  .solo-group-head{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:8px;background:var(--cream);border:2px solid var(--cream-dark);margin-bottom:.4rem;}
  .solo-key{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;color:var(--text);letter-spacing:.04em}
  .solo-key-desc{font-size:.72rem;color:var(--text-light)}
  .solo-scale-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;padding-left:.5rem}
  .solo-scale-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.6rem .75rem;cursor:pointer;transition:all .18s;text-align:left;}
  .solo-scale-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .solo-scale-btn .ssb-name{font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:.15rem}
  .solo-scale-btn .ssb-desc{font-size:.65rem;color:var(--text-light)}

  @media(max-width:640px){
    nav{padding:.85rem 1.2rem}
    .choice-row{grid-template-columns:1fr}
    .cat-head,.cat-body{padding-left:1.3rem;padding-right:1.3rem}
    .scale-key-grid{grid-template-columns:1fr 1fr}
    .solo-scale-row{grid-template-columns:1fr}
  }
  /* ════ STRUM PLAYER ════ */

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  /* ── Time signature selector ── */
  .ts-header{
    background:var(--cream);border-bottom:2px solid var(--cream-dark);
    padding:.75rem 1rem .65rem;
  }
  .ts-header-label{
    font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);margin-bottom:.5rem;display:block;
  }
  .ts-tabs{display:flex;gap:.4rem;}
  .ts-tab{
    flex:1;padding:.55rem .4rem;border-radius:8px;
    border:2px solid var(--cream-dark);background:var(--white);
    cursor:pointer;transition:all .18s;text-align:center;
  }
  .ts-tab:hover{border-color:var(--blue);}
  .ts-tab.active{border-color:var(--red);background:rgba(217,64,37,0.06);}
  .ts-tab-sig{
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:1.1rem;color:var(--text);display:block;line-height:1;
  }
  .ts-tab.active .ts-tab-sig{color:var(--red);}
  .ts-tab-name{
    font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--text-light);display:block;margin-top:.2rem;
  }

  /* ── Explainer ── */
  .ts-explainer{
    background:rgba(27,79,138,0.05);
    border-bottom:2px solid var(--cream-dark);
    padding:.8rem 1.1rem;
  }
  .ts-explainer-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.25rem;}
  .ts-explainer-body{font-size:.78rem;color:var(--text-mid);line-height:1.55;}
  .ts-explainer-songs{
    font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.04em;
    color:var(--text-light);margin-top:.35rem;display:block;
  }

  /* ── Foot tap row ── */
  .foot-tap-row{
    display:flex;gap:.5rem;padding:.65rem 1rem;
    background:var(--neck-dark);
    border-bottom:1px solid rgba(255,255,255,0.08);
    align-items:center;
  }
  .foot-tap-label{
    font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,0.45);
    flex-shrink:0;width:3rem;
  }
  .foot-taps{display:flex;gap:.4rem;flex:1;}
  .foot-tap{
    flex:1;height:24px;border-radius:4px;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:.6rem;
    color:rgba(255,255,255,0.40);
    transition:all .1s;
  }
  .foot-tap.active{
    background:rgba(232,160,32,0.28);border-color:var(--gold);
    color:var(--gold);box-shadow:0 0 10px rgba(232,160,32,0.3);
  }
  .foot-tap.downbeat{
    background:rgba(217,64,37,0.28);border-color:var(--red);
    color:#ff7055;box-shadow:0 0 10px rgba(217,64,37,0.3);
  }

  /* ── Pattern selector ── */
  .pattern-header{
    background:var(--cream);border-bottom:2px solid var(--cream-dark);
    padding:.6rem 1rem .55rem;
  }
  .pattern-header-label{
    font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);margin-bottom:.45rem;display:block;
  }
  .pattern-tabs{display:flex;gap:.3rem;overflow-x:auto;}
  .pattern-tab{
    flex:1;min-width:0;padding:.42rem .3rem;border-radius:7px;
    border:2px solid var(--cream-dark);background:var(--white);
    font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;
    color:var(--text-light);cursor:pointer;
    transition:all .18s;white-space:nowrap;letter-spacing:.04em;text-align:center;
  }
  .pattern-tab:hover{border-color:var(--blue);color:var(--text-mid);}
  .pattern-tab.active{
    border-color:var(--red);background:rgba(217,64,37,0.08);
    color:var(--red);font-weight:600;
  }
  .pattern-tab.custom-tab{color:var(--text-mid);}
  .pattern-tab.custom-tab.active{
    border-color:var(--teal);background:rgba(42,172,184,0.08);color:var(--teal);
  }

  /* ── Custom hint banner ── */
  .custom-hint{
    display:none;
    background:rgba(42,172,184,0.08);border-bottom:2px solid rgba(42,172,184,0.25);
    padding:.75rem 1.1rem;
  }
  .custom-hint.show{display:block;}
  .custom-hint-title{font-size:.84rem;font-weight:600;color:var(--teal);margin-bottom:.3rem;}
  .custom-hint-steps{list-style:none;display:flex;flex-direction:column;gap:.2rem;}
  .custom-hint-steps li{
    font-size:.76rem;color:var(--text-mid);line-height:1.45;
    display:flex;align-items:center;gap:.5rem;
  }
  .hint-badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:4px;
    font-family:'DM Mono',monospace;font-size:.7rem;font-weight:700;
    flex-shrink:0;
  }
  .hint-badge.down{background:var(--slot-down-bg);color:#ff7055;border:1.5px solid var(--slot-down-border);}
  .hint-badge.up{background:var(--slot-up-bg);color:#90bff0;border:1.5px solid var(--slot-up-border);}
  .hint-badge.skip{background:var(--slot-empty-bg);color:rgba(255,255,255,0.5);border:1.5px dashed rgba(255,255,255,0.3);}

  /* ── Static reference diagram ── */
  .static-diagram-wrap{
    background:var(--neck);padding:.9rem 1rem .8rem;
    border-bottom:2px solid rgba(255,255,255,0.06);
  }
  .static-diagram-label{
    font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,0.5);
    text-align:center;margin-bottom:.6rem;
  }
  .static-diagram{display:flex;gap:.3rem;justify-content:center;align-items:flex-start;}
  .static-beat{display:flex;flex-direction:column;align-items:center;gap:.18rem;flex:1;max-width:80px;}
  .static-beat-num{
    font-family:'DM Mono',monospace;font-size:.54rem;font-weight:600;
    color:rgba(255,255,255,0.55);margin-bottom:.06rem;
  }
  .static-beat-group{display:flex;gap:.12rem;}
  .static-stroke{
    width:26px;height:30px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;flex-shrink:0;
    border:1.5px solid transparent;
  }
  .static-stroke.down{
    background:var(--slot-down-bg);color:#ff7055;
    border-color:var(--slot-down-border);
  }
  .static-stroke.up{
    background:var(--slot-up-bg);color:#90bff0;
    border-color:var(--slot-up-border);
  }
  .static-stroke.skip{
    background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.25);
    border:1.5px dashed rgba(255,255,255,0.18);
  }
  .static-divider{
    width:1.5px;background:rgba(255,255,255,0.18);
    align-self:stretch;margin:0 .1rem;border-radius:1px;
  }
  .group-bracket{display:flex;flex-direction:column;align-items:center;gap:.16rem;}
  .bracket-label{
    font-family:'DM Mono',monospace;font-size:.52rem;font-weight:500;
    color:rgba(255,255,255,0.5);letter-spacing:.03em;text-align:center;
  }
  .bracket-strokes{display:flex;gap:.12rem;}

  /* ── Animated beat grid ── */
  .beat-grid-wrap{background:var(--neck);padding:.9rem 1rem .8rem;}
  .beat-grid-label{
    font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,0.5);
    text-align:center;margin-bottom:.6rem;
  }
  .beat-grid{display:flex;gap:.3rem;justify-content:center;}
  .beat-cell{display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1;max-width:80px;}
  .beat-number{
    font-family:'DM Mono',monospace;font-size:.54rem;font-weight:600;
    color:rgba(255,255,255,0.55);
  }
  .beat-strokes{display:flex;gap:.12rem;}

  /* Base slot */
  .stroke-slot{
    width:26px;height:34px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-size:.88rem;font-weight:700;flex-shrink:0;
    transition:all .1s;
    background:var(--slot-empty-bg);
    border:1.5px solid var(--slot-empty-border);
    color:rgba(255,255,255,0.35);
    user-select:none;
  }
  /* Preset slots — not editable, just display */
  .stroke-slot.locked{ cursor:default; }
  /* Custom slots — tappable */
  .stroke-slot.editable{
    cursor:pointer;
    border-style:dashed;
    border-color:rgba(255,255,255,0.28);
  }
  .stroke-slot.editable:active{ transform:scale(0.92); }
  /* Down stroke */
  .stroke-slot.down{
    background:var(--slot-down-bg);
    border:1.5px solid var(--slot-down-border);
    color:#ff7055;
    border-style:solid;
  }
  /* Up stroke */
  .stroke-slot.up{
    background:var(--slot-up-bg);
    border:1.5px solid var(--slot-up-border);
    color:#90bff0;
    border-style:solid;
  }
  /* Active beat highlight */
  .stroke-slot.active-beat{
    box-shadow:0 0 0 2.5px var(--gold),0 0 16px rgba(232,160,32,0.5);
    transform:scale(1.12);z-index:1;position:relative;
  }

  /* ── Legend ── */
  .legend{
    display:flex;gap:.75rem;justify-content:center;
    padding:.5rem 1rem;background:var(--neck-dark);
    font-family:'DM Mono',monospace;font-size:.58rem;
    letter-spacing:.06em;text-transform:uppercase;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .legend span{display:flex;align-items:center;gap:.3rem;color:rgba(255,255,255,0.5);}
  .leg-dot{width:10px;height:10px;border-radius:2px;}
  .leg-dot.down{background:#ff7055;}
  .leg-dot.up{background:#90bff0;}
  .leg-dot.off{background:rgba(255,255,255,0.15);border:1px dashed rgba(255,255,255,0.3);}

  /* ── Beat indicator ── */
  .beat-indicator{
    display:flex;gap:.4rem;justify-content:center;
    padding:.6rem 1rem;border-top:1.5px solid var(--cream-dark);
  }
  .beat-dot{
    height:8px;border-radius:4px;background:var(--cream-dark);
    transition:all .12s;flex:1;max-width:48px;
  }
  .beat-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(232,160,32,0.5);}
  .beat-dot.downbeat{background:var(--red);box-shadow:0 0 8px rgba(217,64,37,0.4);}

  /* ── Controls ── */
  .controls{padding:.9rem 1.1rem 1.1rem;}
  .ctrl-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
  .ctrl-label{
    font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-light);flex-shrink:0;width:3rem;
  }
  .bpm-slider{
    flex:1;-webkit-appearance:none;appearance:none;height:5px;
    border-radius:3px;background:var(--cream-dark);outline:none;cursor:pointer;
  }
  .bpm-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:var(--red);cursor:pointer;box-shadow:0 2px 6px rgba(217,64,37,0.4);
  }
  .bpm-value{
    font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;
    color:var(--text);width:4.2rem;text-align:right;flex-shrink:0;
  }
  .pill-btns{display:flex;gap:.3rem;}
  .pill-btn{
    flex:1;padding:.35rem .3rem;border-radius:6px;
    border:1.5px solid var(--cream-dark);background:var(--cream);
    font-family:'DM Mono',monospace;font-size:.64rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .18s;
    white-space:nowrap;text-align:center;
  }
  .pill-btn:hover{border-color:var(--blue);}
  .pill-btn.active-feel{
    border-color:var(--blue);background:rgba(27,79,138,0.09);
    color:var(--blue);font-weight:600;
  }

  .play-row{display:flex;align-items:center;justify-content:center;margin-top:.2rem;}
  .play-btn{
    width:64px;height:64px;border-radius:50%;border:none;
    background:var(--red);color:white;font-size:1.3rem;
    cursor:pointer;transition:all .18s;
    box-shadow:0 4px 18px rgba(217,64,37,0.38);
    display:flex;align-items:center;justify-content:center;
  }
  .play-btn.playing{background:var(--text);box-shadow:0 4px 16px rgba(42,32,24,0.25);}
  .play-btn:active{transform:scale(0.93);}
  .play-btn:disabled{
    background:var(--cream-dark);color:var(--text-light);
    box-shadow:none;cursor:not-allowed;
  }

  /* ── TAB READER ── */
  .tab-reader-section{margin-bottom:1rem}
  .tab-reader-header{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;border-radius:10px;background:rgba(42,172,184,0.07);border:2px solid rgba(42,172,184,0.22);margin-bottom:.75rem}
  .tab-reader-icon{font-size:1.2rem;flex-shrink:0}
  .tab-reader-title{font-size:.88rem;font-weight:600;color:var(--text)}
  .tab-reader-sub{font-size:.7rem;color:var(--text-light);margin-top:.1rem}
  .tab-input{width:100%;min-height:90px;border-radius:10px;border:2px solid var(--cream-dark);background:var(--cream);color:var(--text);padding:.7rem .85rem;font-family:'DM Mono',monospace;font-size:.7rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .18s}
  .tab-input:focus{border-color:var(--teal)}
  .tab-input::placeholder{color:var(--text-light)}
  .tab-actions{display:flex;gap:.4rem;margin-top:.5rem;margin-bottom:.75rem}
  .tab-btn{flex:1;padding:.5rem .4rem;border-radius:8px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:center}
  .tab-btn:hover{border-color:var(--blue);color:var(--blue)}
  .tab-btn.primary{background:var(--teal);border-color:var(--teal);color:white;font-weight:600}
  .tab-notes-row{display:flex;gap:.5rem;margin-bottom:.6rem}
  .tab-notes-box{flex:1;background:#0a0a0a;border-radius:8px;padding:.6rem .75rem;min-height:36px}
  .tab-notes-label{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:.3rem}
  .tab-notes-content{font-family:'DM Mono',monospace;font-size:.68rem;color:rgba(255,255,255,0.75);line-height:1.5;word-break:break-all}
  .tab-stepper{display:flex;align-items:center;gap:.5rem;background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.6rem .85rem;margin-bottom:.5rem}
  .tab-step-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--cream-dark);background:var(--white);font-size:1rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tab-step-btn:hover{border-color:var(--blue)}
  .tab-step-btn:disabled{opacity:.35;cursor:not-allowed}
  .tab-step-info{flex:1;text-align:center}
  .tab-step-note{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--text);display:block}
  .tab-step-pos{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text-light);letter-spacing:.06em;text-transform:uppercase}
  .tab-auto-row{display:flex;gap:.5rem;margin-bottom:.5rem}
  .tab-auto-btn{flex:1;padding:.5rem .6rem;border-radius:8px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:center}
  .tab-auto-btn.playing{background:var(--text);border-color:var(--text);color:white}
  .tab-speed-row{display:flex;align-items:center;gap:.5rem}
  .tab-speed-label{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);flex-shrink:0;width:3.5rem}
  .tab-speed-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--cream-dark);outline:none;cursor:pointer}
  .tab-speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--teal);cursor:pointer}
  .tab-speed-val{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text);width:3rem;text-align:right;flex-shrink:0}
  .tab-fret-status{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:.35rem;min-height:1.3em;color:var(--text-light)}
  .tab-divider{border:none;border-top:1.5px solid var(--cream-dark);margin:1rem 0 .75rem}

  /* ── TRIAD SHAPES (Stage 7) ── */
  .triad-section{ margin-bottom:1.2rem; }
  .triad-group-head{
    font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--text-light);
    padding:.45rem 0 .4rem;margin-bottom:.5rem;display:block;
    border-bottom:1.5px solid var(--cream-dark);
  }
  .triad-shape-row{ display:flex;gap:.6rem;margin-bottom:.85rem; }
  .triad-shape-btn{
    flex:1;border:1.5px solid var(--cream-dark);border-radius:12px;
    background:var(--white);cursor:pointer;transition:all .18s;
    padding:14px 8px 10px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .triad-shape-btn:hover{ background:var(--cream); }
  .triad-shape-btn.major{ border-color:rgba(232,160,32,0.5); }
  .triad-shape-btn.major:hover{ border-color:var(--gold); }
  .triad-shape-btn.minor{ border-color:rgba(27,79,138,0.35); }
  .triad-shape-btn.minor:hover{ border-color:var(--blue); }
  .triad-shape-btn.selected-major{ border-color:var(--gold);background:rgba(232,160,32,0.06); }
  .triad-shape-btn.selected-minor{ border-color:var(--blue);background:rgba(27,79,138,0.06); }
  .triad-shape-label{
    font-family:'DM Mono',monospace;font-size:.6rem;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase;
  }
  .triad-shape-btn.major .triad-shape-label{ color:#BA7517; }
  .triad-shape-btn.minor .triad-shape-label{ color:var(--blue); }

</style>
</head>

<script>
  const STAGES = [
    {
      id:'tuning', num:1, label:'Tuning & Setup',
      desc:'Get your guitar in tune and learn how to hold it comfortably before anything else.',
      video:'lesson_tuning_intro.mp4', autoTuner:true,
      tips:[
        "Hold the neck with your thumb low and behind it — not wrapped over the top.",
        "Rest the guitar waist on your right leg and tilt the neck slightly upward — not flat across your lap.",
        "Keep your fretting wrist low and relaxed, away from the neck, so your fingers can curl naturally.",
        "Your strumming elbow should rest lightly on the top edge of the body — not gripping.",
        "Relax your shoulders before you play — tension travels straight to your hands.",
        "Tune from below the note upward — it holds pitch better than tuning down to the note.",
        "New strings stretch a lot the first day — retune every few minutes until they settle.",
        "Your thumb behind the neck should sit roughly behind your middle finger, not sticking out.",
        "Keep your fretting fingertips curved like you are holding a small ball.",
        "A guitar that drifts out of tune mid-session is normal — retune every 10 to 15 minutes."
      ],
      exercises:[]
    },
    {
      id:'warmup', num:2, label:'Warmup with Scales',
      desc:'Learn where notes live on the neck before grouping them into chords. A great way to start every session.',
      video:'lesson_warmup_intro.mp4',
      tips:[
        "Scales are just notes arranged in a pattern — every chord you know is built from scale notes.",
        "The root note is always the starting point of a scale — it gives the scale its name.",
        "The 3rd decides whether a scale (and chord built from it) sounds major or minor.",
        "The 5th is the most stable note — landing on it always sounds resolved.",
        "Whole steps skip a fret, half steps move one fret — that pattern is what makes a scale sound the way it does.",
        "Major scales follow W W H W W W H — two whole steps, a half, three whole, a half.",
        "The minor pentatonic uses only 5 notes — it is easier to stay in key and great for soloing.",
        "Play scales slowly and evenly before building speed — your fingers learn the pattern, not the pace.",
        "Going up and down the scale is a warmup, but trying to make melodies from it is how you really learn it.",
        "Every scale you learn here will help you understand chords, solos, and songs in every other stage."
      ],
      exercises:[]
    },
    {
      id:'open-chords', num:4, label:'Open Chords',
      desc:'Learn the core open chord shapes — G, C, D, A, E and their minors.',
      video:'lesson_open_chords_intro.mp4',
      tips:[
        "Press only as hard as needed to stop the buzz — squeezing harder just tires your hand.",
        "Curl your fretting fingers like you're holding a small ball, not flat across the strings.",
        "Practice forming one chord, releasing fully, and reforming it — that's the real skill.",
        "It's normal for fingertips to hurt the first 1-2 weeks. Calluses build fast after that.",
        "Strum slowly and listen for any muted or buzzing string — that tells you which finger to fix.",
        "Your thumb belongs behind the neck, roughly behind your middle finger.",
        "Learn one chord deeply before adding a second — depth beats breadth early on.",
        "If a chord sounds muddy, check that no finger is accidentally touching a neighboring string.",
        "G and C share a finger position — learning them together speeds up both.",
        "A chord chart's dots show finger position, not pressure — pressure comes from practice."
      ],
      exercises:['Form G major, check each string','Form C major, check each string','Form D major, check each string','Form E minor, check each string']
    },
    {
      id:'chord-theory', num:3, label:'How Chords Are Built',
      desc:'Learn what root, third, and fifth mean — the three notes behind every chord you play.',
      video:'lesson_chord_theory_intro.mp4', theoryMode:true,
      tips:[
        "The root note is what gives a chord its name — a C chord starts on the note C.",
        "Major and minor are decided entirely by the third — everything else can stay the same.",
        "The fifth is the most stable note in a chord — it rarely sounds wrong.",
        "Moving a third down just one fret turns a major chord minor.",
        "Once you can hear a third, you can often tell major from minor with your eyes closed.",
        "A power chord (root + fifth, no third) is neither major nor minor — that's why it works in both.",
        "Every major scale note can serve as a root, third, or fifth depending on the chord built from it.",
        "Try humming just the root, then the third, then the fifth of a chord you know — that's ear training for free.",
        "The same three-note idea applies whether you're playing an open chord or a barre chord.",
        "Understanding root/third/fifth means you can often figure out a new chord without ever looking it up."
      ],
      exercises:[]
    },
    {
      id:'transitions', num:5, label:'Chord Transitions',
      desc:"Move smoothly between chords — this is where most beginners get stuck, and where consistent practice pays off fastest.",

      tips:[
        "Practice just two chords at a time — G to C, then C to G — before adding a third.",
        "Look for a pivot finger that stays on the same string between two chords.",
        "It's fine to stop strumming during a slow change at first — timing comes after accuracy.",
        "Move your fingers as a shape, together, rather than one at a time.",
        "Practice the change in silence first — just the hand motion, no strumming.",
        "Speed comes from smaller finger movements, not faster effort.",
        "A common beginner habit is lifting fingers too high between chords — keep them close to the strings.",
        "Loop a single hard transition 10 times slowly rather than playing the whole song fast.",
        "G-D-Em-C is one of the most common progressions in popular music — worth mastering early.",

      exercises:[]
    },
    {
      id:'strumming', num:6, label:'Strumming Patterns',

        "Keep your strumming arm moving down-up-down-up constantly, even over silent beats.",

        "Muting strings with your fretting hand briefly creates the chunk sound in many patterns.",
        "Strum near the sound hole for warmth, near the bridge for a brighter, twangier tone.",
        "Your pick (or thumb) should brush the strings, not dig into them.",
        "Practice strumming patterns on muted strings first to isolate the rhythm.",
        "Accent the downbeat slightly louder — it gives the pattern a sense of pulse.",
        "Most strumming problems are really chord-transition problems in disguise.",

      exercises:[]
    },
    {
      id:'barre-triads', num:7, label:'Barre Chords & Triads',
      desc:'Move beyond open position with moveable shapes that work anywhere on the neck.',
      video:'lesson_barre_intro.mp4',
      tips:[
        "Roll your barre finger slightly onto its side — flat-on-the-fret rarely works well.",

        "Practice barre chords for short bursts; hand fatigue affects technique fast.",

  function getProgress(){ try{ return JSON.parse(localStorage.getItem('viziProgress')||'{}'); }catch(e){ return {}; } }
  function setProgress(p){ try{ localStorage.setItem('viziProgress',JSON.stringify(p)); }catch(e){} }

  function openStage(id){
    const stage = STAGES.find(s => s.id === id);
    if (!stage) return;
    if (stage.isSong){ window.location.href = 'songs.html'; return; }
    activeStage = stage;

    // Tuning stage: auto-open tuner, show tip
    if (stage.autoTuner){
      catStageTag.textContent = 'Stage ' + stage.num;
      catTitle.textContent = stage.label;
      catDesc.textContent = stage.desc;
      vidWrap.classList.remove('show');
      tunerWrap.classList.add('show');
      exList.innerHTML = '';
      catPanel.classList.add('show');
      catPanel.scrollIntoView({behavior:'smooth',block:'start'});
      showRandomTip();
      return;
    }

    catStageTag.textContent = 'Stage ' + stage.num
      + (stage.theoryMode ? '  —  Fretboard shows root / third / fifth' : '');
    catTitle.textContent = stage.label;
    catDesc.textContent  = stage.desc;

    const p = getProgress();
    const watched = (p[id] && p[id].introWatched) || 0;
    introWatchedNote.textContent = watched > 0
      ? 'Watched ' + watched + 'x — short overview'
      : 'Short overview of this stage';
    introChoice.classList.toggle('watched', watched > 0);
    document.getElementById('exerciseChoice').style.display = CHOICE_PANELS[id] ? 'none' : '';

    vidWrap.classList.remove('show');
    tipCard.classList.remove('show');
    tunerWrap.classList.remove('show');
    introVideo.pause();
    stopTuner();

    tunerChoice.style.display = (id === 'tuning') ? '' : 'none';

    renderExercises(stage);
    catPanel.classList.add('show');
    catPanel.scrollIntoView({behavior:'smooth',block:'start'});
  }

  introChoice.addEventListener('click', () => {
    if (!activeStage) return;
    introVideo.src = activeStage.video;
    vidWrap.classList.add('show');
    tipCard.classList.remove('show');
    tunerWrap.classList.remove('show'); stopTuner();
    introVideo.play().catch(()=>{});
    markIntroWatched(activeStage.id);
  });
  exerciseChoice.addEventListener('click', () => {
    vidWrap.classList.remove('show');
    tunerWrap.classList.remove('show'); stopTuner();
    introVideo.pause();
    showRandomTip();

  function showRandomTip(){
    if (!activeStage || !activeStage.tips || !activeStage.tips.length) return;
    tipText.textContent = activeStage.tips[Math.floor(Math.random()*activeStage.tips.length)];
    tipCard.classList.add('show');

  function buildMiniTriadDiagram(shape, type){
    // shape: array of {str, role, row} for G, B, e strings
    // Standard chord diagram: E A D on left (faded), G B e on right (active)
    // Columns: E=x10, A=x24, D=x38, G=x52, B=x66, e=x80
    // Fret rows: nut=y6, fret1-center=y13, fret2=y28, fret3=y44, fret4=y60
    const roleColor = { root: type==='major'?'#BA7517':'#185FA5', third:'#444', fifth:'#444' };
    const roleLabel = { root:'R', third: type==='major'?'Δ3':'♭3', fifth:'p5' };
    const colX = { G:52, B:66, e:80 };
    const rowY = { 1:13, 2:28, 3:44, 4:60 };

    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('width','88'); svg.setAttribute('height','88');
    svg.setAttribute('viewBox','0 0 88 88');

    function line(x1,y1,x2,y2,stroke,w,op){
      const l=document.createElementNS(ns,'line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y1);
      l.setAttribute('x2',x2);l.setAttribute('y2',y2);
      l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',w||1);
      if(op) l.setAttribute('opacity',op);
      return l;
    }
    function txt(x,y,label,size,fill){
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x);t.setAttribute('y',y);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size',size||8);
      t.setAttribute('font-weight','600');
      t.setAttribute('fill',fill||'white');
      t.textContent=label;
      return t;
    }
    function circle(cx,cy,r,fill){
      const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r||8);
      c.setAttribute('fill',fill);
      return c;
    }

    // Nut
    svg.appendChild(line(4,6,84,6,'#2A2018',3));
    // Fret lines
    [20,36,52,68].forEach(y=>svg.appendChild(line(4,y,84,y,'rgba(42,32,24,0.15)')));
    // Low strings E A D — faded
    [10,24,38].forEach(x=>svg.appendChild(line(x,6,x,72,'rgba(42,32,24,0.2)',1)));
    // Active strings G B e
    [52,66,80].forEach(x=>svg.appendChild(line(x,6,x,72,'rgba(42,32,24,0.45)',1)));

    // Dots
    shape.forEach(dot=>{
      const cx=colX[dot.str], cy=rowY[dot.row];
      const fill=roleColor[dot.role];
      const label=roleLabel[dot.role];
      svg.appendChild(circle(cx,cy,8,fill));
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+4);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','7');
      t.setAttribute('font-weight','600');
      t.setAttribute('fill','white');
      t.textContent=label;
      svg.appendChild(t);
    });

    // String labels
    [['E',10],['A',24],['D',38],['G',52],['B',66],['e',80]].forEach(([lbl,x],i)=>{
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x);t.setAttribute('y',83);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size',i<3?'7':'8');
      t.setAttribute('fill',i<3?'rgba(42,32,24,0.3)':'rgba(42,32,24,0.65)');
      t.setAttribute('font-weight','400');
      t.textContent=lbl;
      svg.appendChild(t);
    });

    return svg;
  }

  const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';

  // Map scale choice names to fretboard SCALE commands
  const SCALE_COMMANDS = {
    'E Minor — Major Scale':        'SCALE E major shape 1',
    'E Minor — E Minor Pentatonic': 'SCALE E minor pentatonic shape 1',
    'A Minor — Major Scale':        'SCALE A major shape 1',

    'C Major — Major Scale':        'SCALE C major shape 1',

  };

  let soloFeedbackEl = null; // set when solo panel is rendered

  async function lightScaleOnFretboard(scaleName){
    const cmd = SCALE_COMMANDS[scaleName];
    if (!cmd){ console.warn('No command for', scaleName); return; }
    if (soloFeedbackEl){
      soloFeedbackEl.textContent = 'Lighting ' + scaleName.split(' — ')[1] + ' on fretboard...';

    try {

        soloFeedbackEl.style.color = 'var(--red)';
      }
    }
  }

  // ════════════════════════════════════════════════════════
  // TUNER — live pitch detection
  // ════════════════════════════════════════════════════════
  const STRINGS_TUNER = [
    {name:'E',label:'Lo E',freq:82.41},{name:'A',label:'A',freq:110.00},
    {name:'D',label:'D',freq:146.83},{name:'G',label:'G',freq:196.00},
    {name:'B',label:'B',freq:246.94},{name:'E',label:'Hi E',freq:329.63}
  ];
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const tunerStatus = document.getElementById('tunerStatus');
  const tunerNote   = document.getElementById('tunerNote');
  const tunerFreq   = document.getElementById('tunerFreq');
  const tunerNeedle = document.getElementById('tunerNeedle');
  const tunerStringsEl = document.getElementById('tunerStrings');
  const tunerMicBtn = document.getElementById('tunerMicBtn');

  STRINGS_TUNER.forEach((s,i) => {
    const el = document.createElement('div'); el.className = 'tuner-string-btn'; el.dataset.idx = i;
    el.innerHTML = '<span class="sname">' + s.label + '</span><div class="sled"></div>';
    tunerStringsEl.appendChild(el);
  });

  let tunerCtx=null, tunerStream=null, tunerAnalyser=null, tunerRAF=null, tunerRunning=false;
  tunerMicBtn.addEventListener('click', () => { tunerRunning ? stopTuner() : startTuner(); });

  async function startTuner(){
    try {
      tunerCtx = new (window.AudioContext||window.webkitAudioContext)();
      tunerStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      const src = tunerCtx.createMediaStreamSource(tunerStream);
      tunerAnalyser = tunerCtx.createAnalyser(); tunerAnalyser.fftSize=2048;
      src.connect(tunerAnalyser);
      tunerRunning=true; tunerMicBtn.textContent='Stop Listening'; tunerMicBtn.classList.add('listening');
      tunerStatus.textContent='Listening… play one string at a time';
      tunerLoop();
    } catch(e){ tunerStatus.textContent='Microphone blocked — allow mic access'; }
  }
  function stopTuner(){
    tunerRunning=false;
    if (tunerRAF) cancelAnimationFrame(tunerRAF);
    if (tunerStream) tunerStream.getTracks().forEach(t=>t.stop());
    if (tunerCtx) tunerCtx.close().catch(()=>{});
    tunerCtx=null; tunerStream=null; tunerAnalyser=null;
    tunerMicBtn.textContent='Start Listening'; tunerMicBtn.classList.remove('listening');
    tunerStatus.textContent='Tap "Start Listening" and play a string';
    tunerNote.textContent='—'; tunerNote.classList.remove('in-tune');
    tunerFreq.innerHTML='&nbsp;';
    tunerNeedle.style.left='50%'; tunerNeedle.classList.remove('in-tune');
    document.querySelectorAll('.tuner-string-btn').forEach(el=>el.classList.remove('target','in-tune'));
  }
  function tunerLoop(){
    if (!tunerRunning) return;
    const buf=new Float32Array(tunerAnalyser.fftSize);
    tunerAnalyser.getFloatTimeDomainData(buf);
    const freq=autoCorrelate(buf,tunerCtx.sampleRate);
    if (freq>0) updateTunerDisplay(freq);
    tunerRAF=requestAnimationFrame(tunerLoop);
  }
  function autoCorrelate(buf,sampleRate){
    const SIZE=buf.length; let rms=0;
    for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/SIZE); if(rms<0.01) return -1;
    let r1=0,r2=SIZE-1,thresh=0.2;
    for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<thresh){r1=i;break;}}
    for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<thresh){r2=SIZE-i;break;}}
    const trimmed=buf.slice(r1,r2); const n=trimmed.length; if(n<2) return -1;
    const c=new Array(n).fill(0);
    for(let lag=0;lag<n;lag++) for(let i=0;i<n-lag;i++) c[lag]+=trimmed[i]*trimmed[i+lag];
    let d=0; while(d<n-1&&c[d]>c[d+1])d++;
    let maxVal=-1,maxPos=-1;
    for(let i=d;i<n;i++){if(c[i]>maxVal){maxVal=c[i];maxPos=i;}}
    let T0=maxPos; if(T0<=0) return -1;
    if(T0>0&&T0<n-1){const x1=c[T0-1],x2=c[T0],x3=c[T0+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a!==0)T0=T0-b/(2*a);}
    return sampleRate/T0;
  }
  function nearestString(freq){
    let best=STRINGS_TUNER[0],bestDiff=Infinity;
    STRINGS_TUNER.forEach(s=>{const d=Math.abs(Math.log2(freq/s.freq));if(d<bestDiff){bestDiff=d;best=s;}});
    return best;
  }
  function updateTunerDisplay(freq){
    if(freq<60||freq>500) return;
    const target=nearestString(freq);
    const cents=1200*Math.log2(freq/target.freq);
    const clamped=Math.max(-50,Math.min(50,cents));
    const pct=50+(clamped/50)*50;
    const inTune=Math.abs(cents)<5;
    tunerNote.textContent=target.label; tunerNote.classList.toggle('in-tune',inTune);
    tunerFreq.textContent=freq.toFixed(1)+' Hz  ·  target '+target.freq.toFixed(2)+' Hz  ·  '+(cents>0?'+':'')+cents.toFixed(0)+'c';
    tunerNeedle.style.left=pct+'%'; tunerNeedle.classList.toggle('in-tune',inTune);
    tunerStatus.textContent=inTune?'In tune!':cents<0?'Tune up':'Tune down';
    document.querySelectorAll('.tuner-string-btn').forEach(el=>{
      const idx=parseInt(el.dataset.idx,10),isTarget=STRINGS_TUNER[idx]===target;
      el.classList.toggle('target',isTarget); el.classList.toggle('in-tune',isTarget&&inTune);
    });
  }

  // ── Tab reader ───────────────────────────────────────────────
  let tabGroups=[],tabStepIdx=0,tabAutoTimer=null,tabAutoPlaying=false,tabSpeedMs=800;

  function buildTabReader(container){
    const sec=document.createElement('div'); sec.className='tab-reader-section';
    sec.innerHTML='<div class="tab-reader-header"><span class="tab-reader-icon">&#127928;</span><div><div class="tab-reader-title">Tab Reader</div><div class="tab-reader-sub">Paste ASCII tab — Vizi lights each note on your fretboard</div></div></div>';
    const ta=document.createElement('textarea'); ta.className='tab-input'; ta.rows=6;
    ta.placeholder='Paste 6-line ASCII tab here...\ne|--0---2-|\nB|--1---3-|\nG|--0---2-|\nD|--------|\nA|--------|\nE|--------|';
    sec.appendChild(ta);
    const acts=document.createElement('div'); acts.className='tab-actions';
    const pBtn=document.createElement('button'); pBtn.className='tab-btn primary'; pBtn.textContent='Parse Tab';
    const cBtn=document.createElement('button'); cBtn.className='tab-btn'; cBtn.textContent='Clear';
    acts.appendChild(pBtn); acts.appendChild(cBtn); sec.appendChild(acts);
    const nr=document.createElement('div'); nr.className='tab-notes-row';
    nr.innerHTML='<div class="tab-notes-box"><div class="tab-notes-label">Fret tokens</div><div class="tab-notes-content" id="tabTokensOut">—</div></div><div class="tab-notes-box"><div class="tab-notes-label">Note names</div><div class="tab-notes-content" id="tabNotesOut">—</div></div>';
    sec.appendChild(nr);
    const sw=document.createElement('div'); sw.id='tabStepperWrap'; sw.style.display='none';
    sw.innerHTML='<div class="tab-stepper"><button class="tab-step-btn" id="tabPrevBtn">&#8249;</button><div class="tab-step-info"><span class="tab-step-note" id="tabStepNote">—</span><span class="tab-step-pos" id="tabStepPos">step 0 of 0</span></div><button class="tab-step-btn" id="tabNextBtn">&#8250;</button></div><div class="tab-auto-row"><button class="tab-auto-btn" id="tabAutoBtn">&#9654; Auto-play</button></div><div class="tab-speed-row"><span class="tab-speed-label">Speed</span><input type="range" class="tab-speed-slider" id="tabSpeedSlider" min="200" max="2000" value="800" step="100"/><span class="tab-speed-val" id="tabSpeedVal">800ms</span></div><div class="tab-fret-status" id="tabFretStatus">Parse a tab to begin</div>';
    sec.appendChild(sw); container.appendChild(sec);

    pBtn.addEventListener('click',()=>{
      const raw=ta.value.trim(); if(!raw)return;
      tabGroups=parseAsciiTab(raw);
      if(!tabGroups.length){document.getElementById('tabTokensOut').textContent='No notes found';return;}
      document.getElementById('tabTokensOut').textContent=tabGroups.map(a=>a.length===1?a[0]:'('+a.join(',')+')').join('  ');
      document.getElementById('tabNotesOut').textContent=tabGroups.map(a=>a.map(tokenToNote).join('+')).join('  ');
      tabStepIdx=0; stopTabAuto(); sw.style.display='block'; updateTabStepper(); sendTabStep();
    });
    cBtn.addEventListener('click',()=>{
      ta.value=''; tabGroups=[]; tabStepIdx=0; stopTabAuto();
      document.getElementById('tabTokensOut').textContent='—';
      document.getElementById('tabNotesOut').textContent='—';
      sw.style.display='none';
    });
    sw.querySelector('#tabPrevBtn').addEventListener('click',()=>{if(tabStepIdx>0){tabStepIdx--;updateTabStepper();sendTabStep();}});
    sw.querySelector('#tabNextBtn').addEventListener('click',()=>{if(tabStepIdx<tabGroups.length-1){tabStepIdx++;updateTabStepper();sendTabStep();}});
    sw.querySelector('#tabAutoBtn').addEventListener('click',()=>{tabAutoPlaying?stopTabAuto():startTabAuto();});
    sw.querySelector('#tabSpeedSlider').addEventListener('input',e=>{tabSpeedMs=parseInt(e.target.value);sw.querySelector('#tabSpeedVal').textContent=tabSpeedMs+'ms';if(tabAutoPlaying){stopTabAuto();startTabAuto();}});
  }

  function updateTabStepper(){
    if(!tabGroups.length)return;
    const g=tabGroups[tabStepIdx];
    const el=document.getElementById('tabStepNote'),pos=document.getElementById('tabStepPos');
    const prev=document.getElementById('tabPrevBtn'),next=document.getElementById('tabNextBtn');
    if(el)el.textContent=g.map(tokenToNote).join(', ');
    if(pos)pos.textContent='step '+(tabStepIdx+1)+' of '+tabGroups.length;
    if(prev)prev.disabled=(tabStepIdx===0);
    if(next)next.disabled=(tabStepIdx===tabGroups.length-1);
  }

  async function sendTabStep(){
    if(!tabGroups.length)return;
    const g=tabGroups[tabStepIdx];
    const sEl=document.getElementById('tabFretStatus');
    const strMap={He:'HiE',B:'B',G:'G',D:'D',A:'A',Le:'LoE'};
    // Build pipe-delimited command for all simultaneous notes
    const cmds=g.map(t=>{
      const m=t.match(/^S(He|B|G|D|A|Le)(\d+)$/);
      if(!m)return null;
      return 'SF '+strMap[m[1]]+' '+m[2];
    }).filter(Boolean);
    if(!cmds.length)return;
    const cmd=cmds.join(' | ');
    const noteNames=g.map(tokenToNote).join('+');
    if(sEl){sEl.textContent='Sending...';sEl.style.color='var(--gold)';}
    try{
      const res=await fetch(RAILWAY_URL+'/fretboard-command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
      if(res.ok){if(sEl){sEl.textContent=noteNames+' — lit';sEl.style.color='var(--green)';}}
      else{if(sEl){sEl.textContent='Could not reach fretboard';sEl.style.color='var(--red)';}}
    }catch(e){if(sEl){sEl.textContent='Could not reach fretboard';sEl.style.color='var(--red)';}}
  }

  function startTabAuto(){
    if(!tabGroups.length)return;
    tabAutoPlaying=true;
    const btn=document.getElementById('tabAutoBtn');
    if(btn){btn.textContent='■ Stop';btn.classList.add('playing');}
    function step(){
      if(!tabAutoPlaying)return;
      updateTabStepper();sendTabStep();
      if(tabStepIdx<tabGroups.length-1){tabStepIdx++;tabAutoTimer=setTimeout(step,tabSpeedMs);}
      else{stopTabAuto();}
    }
    step();
  }
  function stopTabAuto(){
    tabAutoPlaying=false;clearTimeout(tabAutoTimer);
    const btn=document.getElementById('tabAutoBtn');
    if(btn){btn.textContent='▶ Auto-play';btn.classList.remove('playing');}
  }

  // ── Tab parser ───────────────────────────────────────────────
  const LABEL_TO_CODE_TAB={'e':'He','b':'B','g':'G','d':'D','a':'A','E':'Le'};
  const OPEN_SEMI={'He':4,'B':11,'G':7,'D':2,'A':9,'Le':4};
  const NOTE_NAMES_TAB=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function tokenToNote(t){const m=t.match(/^S(He|B|G|D|A|Le)(\d+)$/);if(!m)return'?';return NOTE_NAMES_TAB[(OPEN_SEMI[m[1]]+parseInt(m[2]))%12];}
  function parseAsciiTab(text){
    const lines=text.replace(/\r\n/g,'\n').split('\n');
    const blocks=[];let i=0;
    function isStr(l){return /^[eEbBgGdDaA]\s*\|/.test(l);}
    while(i<lines.length){
      const block=[];let j=i;const exp=['e','B','G','D','A','E'];
      for(let k=0;k<exp.length&&j<lines.length;){
        const l=lines[j];if(!isStr(l)){j++;continue;}
        if(l.trim().slice(0,1).toUpperCase()===exp[k].toUpperCase()){block.push(l);k++;}j++;
      }
      if(block.length===6){blocks.push(block);i=j;}else{i++;}
    }
    const all=[];
    for(const blk of blocks){
      const rows=blk.map(l=>{const ix=l.indexOf('|');return{label:l.slice(0,ix).trim(),content:l.slice(ix+1)};});
      const maxLen=Math.max(...rows.map(r=>r.content.length));
      let col=0;
      while(col<maxLen){
        const notes=[];
        for(let r=0;r<rows.length;r++){
          const row=rows[r],c1=row.content[col]||'-',c2=row.content[col+1]||'',c3=row.content[col+2]||'';
          if(/\d/.test(c1)){
            let n=c1;if(/\d/.test(c2))n+=c2;if(/\d/.test(c3)&&n.length<3)n+=c3;
            const fret=parseInt(n,10),raw=row.label.slice(0,1);
            const code=raw==='e'?'He':raw==='E'?'Le':LABEL_TO_CODE_TAB[raw]||raw;
            notes.push({code,fret});
          }
        }
        if(notes.length>0){
          const ord={He:0,B:1,G:2,D:3,A:4,Le:5};
          notes.sort((a,b)=>ord[a.code]-ord[b.code]);
          all.push(notes.map(n=>'S'+n.code+n.fret));
          col+=Math.max(1,Math.max(...notes.map(n=>String(n.fret).length)));
        }else{col++;}
      }
    }
    return all;
  }

let currentTS = '44';
let currentPatternIdx = 0;
let slots = [];
let bpm = 70;
let subdivisions = 2;
let isPlaying = false;
let currentSlot = -1;
let schedulerTimer = null;
let audioCtx = null;
let nextNoteTime = 0;
let currentSlotIndex = 0;
const SCHEDULE_AHEAD = 0.1;
const TICK_INTERVAL = 25;

function isCustom(){ return !!TIME_SIGS[currentTS].patterns[currentPatternIdx].custom; }

// ═══════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════
function getAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playStrum(time, type, isDownbeat){
  const ctx = getAudioCtx();
  const freqs = type==='D' ? [82,110,147,196,247,330] : [330,247,196,147,110,82];
  freqs.forEach((freq,i)=>{
    const delay = (i/freqs.length)*0.018;
    const osc = ctx.createOscillator();
    const bpf = ctx.createBiquadFilter();
    const g   = ctx.createGain();
    osc.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, time+delay);
    osc.detune.setValueAtTime((Math.random()-.5)*10, time+delay);
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(freq*1.6, time+delay);
    bpf.Q.setValueAtTime(2.8, time+delay);
    const vel = isDownbeat ? 0.26 : (type==='D' ? 0.17 : 0.13);
    g.gain.setValueAtTime(0, time+delay);
    g.gain.linearRampToValueAtTime(vel, time+delay+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, time+delay+0.3);
    osc.start(time+delay); osc.stop(time+delay+0.35);
  });
}

// ═══════════════════════════════════════════════════
// SCHEDULER
// ═══════════════════════════════════════════════════
function secPerSlot(){
  if (currentTS==='68') return 60/bpm/3;
  return 60/bpm/subdivisions;
}

function scheduleNotes(){
  const ctx = getAudioCtx();
  while (nextNoteTime < ctx.currentTime+SCHEDULE_AHEAD){
    const idx = currentSlotIndex % slots.length;
    const val = slots[idx];
    const isDownbeat = currentTS==='68' ? (idx===0||idx===3) : (idx===0);
    if (val==='D'||val==='U') playStrum(nextNoteTime, val, isDownbeat);
    const cap = idx, capT = nextNoteTime;
    const delay = Math.max(0,(capT-ctx.currentTime)*1000);
    setTimeout(()=>{ if (!isPlaying) return; currentSlot=cap; updateHighlights(); }, delay);
    nextNoteTime += secPerSlot();
    currentSlotIndex++;
  }
}

function startScheduler(){
  const ctx = getAudioCtx();
  nextNoteTime = ctx.currentTime+0.05;
  currentSlotIndex = 0;
  schedulerTimer = setInterval(scheduleNotes, TICK_INTERVAL);
}

function stopScheduler(){
  clearInterval(schedulerTimer); schedulerTimer=null;
  currentSlot=-1; updateHighlights();
}

function stopPlayback(){
  if (!isPlaying) return;
  isPlaying=false; stopScheduler();
  const btn = document.getElementById('playBtn');
  btn.textContent='▶'; btn.classList.remove('playing'); btn.disabled=false;
}

// ═══════════════════════════════════════════════════
// HIGHLIGHTS
// ═══════════════════════════════════════════════════
function updateHighlights(){
  document.querySelectorAll('.stroke-slot').forEach(el=>{
    el.classList.toggle('active-beat', parseInt(el.dataset.idx)===currentSlot);
  });
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach((dot,i)=>{
    dot.classList.remove('active','downbeat');
    const beatIdx = currentTS==='68' ? (currentSlot<3?0:1) : Math.floor(currentSlot/subdivisions);
    if (i===beatIdx) dot.classList.add(beatIdx===0?'downbeat':'active');
  });
  const taps = document.querySelectorAll('.foot-tap');
  taps.forEach(t=>t.classList.remove('active','downbeat'));
  if (currentSlot>=0){
    const ti = currentTS==='68' ? (currentSlot<3?0:1) : Math.floor(currentSlot/subdivisions);
    if (taps[ti]) taps[ti].classList.add(ti===0?'downbeat':'active');
  }
}

function renderStaticDiagram(){
  const ts = TIME_SIGS[currentTS];
  const pat = ts.patterns[currentPatternIdx];
  const container = document.getElementById('staticDiagram');
  container.innerHTML = '';

  if (currentTS==='68'){
    const groups = pat.groups||[[0,1,2],[3,4,5]];
    ['ONE – and – a','TWO – and – a'].forEach((lbl,gi)=>{
      const grp = document.createElement('div'); grp.className='group-bracket';
      const lblEl = document.createElement('div'); lblEl.className='bracket-label'; lblEl.textContent=lbl;
      grp.appendChild(lblEl);
      const strokes = document.createElement('div'); strokes.className='bracket-strokes';
      groups[gi].forEach(idx=>strokes.appendChild(makeStaticStroke(slots[idx]||' ')));
      grp.appendChild(strokes); container.appendChild(grp);
      if (gi<1){ const div=document.createElement('div'); div.className='static-divider'; container.appendChild(div); }
    });
  } else {
    for (let b=0; b<ts.beats; b++){
      const cell=document.createElement('div'); cell.className='static-beat';
      const num=document.createElement('div'); num.className='static-beat-num'; num.textContent=b+1;
      cell.appendChild(num);
      const grp=document.createElement('div'); grp.className='static-beat-group';
      for (let s=0; s<subdivisions; s++) grp.appendChild(makeStaticStroke(slots[b*subdivisions+s]||' '));
      cell.appendChild(grp); container.appendChild(cell);
      if (b<ts.beats-1){ const div=document.createElement('div'); div.className='static-divider'; container.appendChild(div); }
    }
  }
}

function buildGrid(){
  const ts = TIME_SIGS[currentTS];
  const grid = document.getElementById('beatGrid');
  grid.innerHTML = '';
  const editable = isCustom();

  function makeSlot(idx){
    const val = slots[idx]||' ';
    const slot = document.createElement('div');
    const cls = val==='D'?'down':val==='U'?'up':'';
    slot.className = 'stroke-slot'+(cls?' '+cls:'')+(editable?' editable':' locked');
    slot.dataset.idx = idx;
    slot.textContent = val==='D'?'↓':val==='U'?'↑':' ';
    if (editable){
      slot.addEventListener('click',()=>{
        const cur=slots[idx]||' ';
        slots[idx]=cur===' '?'D':cur==='D'?'U':' ';
        const v=slots[idx];
        slot.className='stroke-slot'+(v==='D'?' down':v==='U'?' up':'')+' editable';
        slot.textContent=v==='D'?'↓':v==='U'?'↑':' ';
        renderStaticDiagram();
        updatePlayBtn();
      });
    }
    return slot;
  }

  if (currentTS==='68'){
    [[0,1,2],[3,4,5]].forEach((grpIndices,gi)=>{
      const cell=document.createElement('div'); cell.className='beat-cell';
      const num=document.createElement('div'); num.className='beat-number';
      num.textContent=gi===0?'ONE – and – a':'TWO – and – a'; num.style.fontSize='.44rem';
      cell.appendChild(num);
      const strokes=document.createElement('div'); strokes.className='beat-strokes';
      grpIndices.forEach(idx=>strokes.appendChild(makeSlot(idx)));
      cell.appendChild(strokes); grid.appendChild(cell);
    });
  } else {
    for (let b=0; b<ts.beats; b++){
      const cell=document.createElement('div'); cell.className='beat-cell';
      const num=document.createElement('div'); num.className='beat-number'; num.textContent=b+1;
      cell.appendChild(num);
      const strokes=document.createElement('div'); strokes.className='beat-strokes';
      for (let s=0; s<subdivisions; s++) strokes.appendChild(makeSlot(b*subdivisions+s));
      cell.appendChild(strokes); grid.appendChild(cell);
    }
  }
  buildBeatIndicator();
}

function buildBeatIndicator(){
  const container = document.getElementById('beatIndicator');
  container.innerHTML = '';
  const count = currentTS==='68' ? 2 : TIME_SIGS[currentTS].beats;
  for (let i=0; i<count; i++){
    const dot=document.createElement('div'); dot.className='beat-dot'; container.appendChild(dot);
  }
}

function updatePlayBtn(){
  const btn = document.getElementById('playBtn');
  if (isCustom()){
    btn.disabled = !slots.some(s=>s==='D'||s==='U');
  } else {
    btn.disabled = false;
  }
}

function syncSlotsLength(){
  const needed = currentTS==='68' ? 6 : TIME_SIGS[currentTS].beats*subdivisions;
  while (slots.length<needed) slots.push(' ');
  while (slots.length>needed) slots.pop();
}

function renderAll(){
  slots = [...TIME_SIGS[currentTS].patterns[currentPatternIdx].slots];
  syncSlotsLength();
  renderExplainer();
  renderFootTaps();
  renderPatternTabs();
  renderCustomHint();
  renderStaticDiagram();
  buildGrid();
  updatePlayBtn();
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
document.querySelectorAll('.ts-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    stopPlayback();
    document.querySelectorAll('.ts-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTS=tab.dataset.ts; currentPatternIdx=0;
    renderAll();
  });
});

document.getElementById('playBtn').addEventListener('click',()=>{
  if (isPlaying){ stopPlayback(); }
  else {
    isPlaying=true; startScheduler();
    const btn=document.getElementById('playBtn');
    btn.textContent='■'; btn.classList.add('playing');
  }
});

document.getElementById('bpmSlider').addEventListener('input',e=>{
  bpm=parseInt(e.target.value);
  document.getElementById('bpmValue').textContent=bpm+' BPM';
});

document.querySelectorAll('[data-feel]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const feel = parseInt(btn.dataset.feel);
    const prevSubdiv = subdivisions;
    // Sixteenth notes on custom — keep custom, scale slots
    // Sixteenth on preset — scale the preset pattern to fill 16 slots
    if (feel===4 && !isCustom()){
      // Scale current preset slots from 8 to 16 by doubling each slot
      const scaled=[];
      slots.forEach(s=>{ scaled.push(s); scaled.push(' '); });
      slots=scaled;
    } else if (feel===2 && prevSubdiv===4 && !isCustom()){
      // Scale down from 16 to 8 — take every other slot (the originals)
      slots=slots.filter((_,i)=>i%2===0);
    } else if (feel===1 && !isCustom()){
      // Quarter — one slot per beat, use only the downbeats (every subdiv*beat)
      const ts=TIME_SIGS[currentTS];
      const quarterSlots=[];
      for(let b=0;b<ts.beats;b++){
        const idx=b*(prevSubdiv);
        quarterSlots.push(slots[idx]||'D');
        // pad to 1 per beat
      }
      slots=quarterSlots;
    } else if (feel===2 && prevSubdiv===1 && !isCustom()){
      // Quarter to eighth — double each slot
      const doubled=[];
      slots.forEach(s=>{ doubled.push(s); doubled.push(' '); });
      slots=doubled;
    }
    document.querySelectorAll('[data-feel]').forEach(b=>b.classList.remove('active-feel'));
    btn.classList.add('active-feel');
    subdivisions=feel;
    syncSlotsLength(); renderPatternTabs(); renderCustomHint();
    renderStaticDiagram(); buildGrid(); updatePlayBtn();
  });
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();

  renderAll();
} // end initStrumPlayer

</script>
</body>
</html>
