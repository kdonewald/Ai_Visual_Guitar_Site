<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lessons — Ai Visual Guitar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F0E8; --cream-dark:#EDE6D6; --cream-mid:#E0D5C0;
    --red:#D94025; --red-dark:#B83320; --blue:#1B4F8A;
    --gold:#E8A020; --teal:#2AACB8; --green:#4CAF50;
    --text:#2A2018; --text-mid:#5A4A38; --text-light:#8A7A68;
    --white:#FFFFFF; --shadow:rgba(42,32,24,0.10); --shadow-lg:rgba(42,32,24,0.18);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--cream); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; padding-bottom:3rem;
  }

  /* nav */
  nav{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 2rem; background:rgba(245,240,232,0.95);
    backdrop-filter:blur(12px); border-bottom:2px solid var(--cream-dark);
  }
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;color:var(--text)}
  .nav-link{font-size:.82rem;font-weight:500;color:var(--text-mid);text-decoration:none;padding:7px 16px;border-radius:6px;border:2px solid var(--cream-dark);transition:all .2s;}
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}

  /* panel */
  .panel-wrap{ max-width:920px; margin:1rem auto 0; padding:0 1.5rem; }
  .cat-panel{display:none;background:var(--white);border:2px solid var(--cream-dark);border-radius:16px;box-shadow:0 8px 28px var(--shadow);overflow:hidden;animation:fade-up .35s ease both;}
  .cat-panel.show{display:block}
  @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .cat-head{padding:1.6rem 2rem 1.4rem;border-bottom:2px solid var(--cream-dark);background:linear-gradient(135deg,var(--white) 0%,var(--cream) 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .cat-stage-tag{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;}
  .cat-title{font-family:'Playfair Display',serif;font-weight:900;font-size:1.7rem;letter-spacing:-.01em;}
  .cat-desc{color:var(--text-mid);font-size:.86rem;margin-top:.4rem;max-width:480px;line-height:1.55}
  .cat-close{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;width:34px;height:34px;flex-shrink:0;cursor:pointer;font-size:1rem;color:var(--text-mid);transition:all .2s;}
  .cat-close:hover{border-color:var(--red);color:var(--red)}
  .cat-body{padding:1.6rem 2rem 2rem;}

  /* choice row */
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.6rem;}
  .choice-card{background:var(--cream);border:2px solid var(--cream-dark);border-radius:12px;padding:1.1rem 1.2rem;cursor:pointer;transition:all .2s;text-align:left;}
  .choice-card:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .choice-card .ci{font-size:1.4rem;margin-bottom:.4rem;display:block}
  .choice-card .ct{font-weight:600;font-size:.92rem;margin-bottom:.2rem}
  .choice-card .cs{font-size:.74rem;color:var(--text-light);line-height:1.4}
  .choice-card.watched .cs{color:var(--green)}

  /* video */
  .vid-wrap{display:none;margin-bottom:1.6rem;}
  .vid-wrap.show{display:block}
  .vid-wrap video{width:100%;max-height:420px;border-radius:12px;background:#0a0a0a;display:block;box-shadow:0 6px 20px var(--shadow);}
  .vid-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);}
  .vid-meta button{background:none;border:none;color:var(--blue);cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;}

  /* tip */
  .tip-card{display:none;align-items:flex-start;gap:.8rem;background:rgba(232,160,32,0.08);border:2px solid rgba(232,160,32,0.3);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.6rem;}
  .tip-card.show{display:flex}
  .tip-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
  .tip-text{font-size:.86rem;line-height:1.55;color:var(--text)}
  .tip-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.25rem;}

  /* exercise list */
  .ex-list{display:flex;flex-direction:column;gap:.6rem;}
  .ex-item{display:flex;align-items:center;gap:.85rem;background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.85rem 1.1rem;cursor:pointer;transition:all .18s;}
  .ex-item:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .ex-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--cream-dark);color:var(--text-mid);font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;display:flex;align-items:center;justify-content:center;}
  .ex-item.done .ex-num{background:var(--green);color:white}
  .ex-name{font-size:.88rem;font-weight:500;flex:1}
  .ex-arrow{color:var(--text-light);font-size:.9rem}

  /* choice panel */
  .choice-panel-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-light);margin-bottom:.75rem;display:block;}
  .choice-grid{display:grid;gap:.55rem;margin-bottom:1rem;}
  .choice-grid.cols-2{grid-template-columns:1fr 1fr}
  .choice-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .choice-btn{background:var(--cream);border:2px solid var(--cream-dark);border-radius:10px;padding:.75rem .85rem;cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;gap:.6rem;}
  .choice-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04);transform:translateY(-1px)}
  .choice-btn .cb-icon{font-size:1.1rem;flex-shrink:0}
  .choice-btn .cb-name{font-size:.88rem;font-weight:600;color:var(--text);display:block}
  .choice-btn .cb-desc{font-size:.72rem;color:var(--text-light);line-height:1.35;margin-top:.1rem}
  .choice-btn .cb-arrow{margin-left:auto;color:var(--text-light);font-size:.8rem;flex-shrink:0}
  .choice-hint{font-size:.78rem;color:var(--text-mid);line-height:1.5;background:rgba(27,79,138,0.05);border:1.5px solid rgba(27,79,138,0.12);border-radius:8px;padding:.7rem .9rem;margin-bottom:1rem;}

  /* tuner */
  .choice-card.tuner-card{background:rgba(76,175,80,0.06);border-color:rgba(76,175,80,0.3)}
  .choice-card.tuner-card:hover{border-color:var(--green);background:rgba(76,175,80,0.1)}
  .tuner-wrap{display:none;margin-bottom:1.6rem;}
  .tuner-wrap.show{display:block}
  .tuner-box{background:linear-gradient(180deg,#2a1d12,#1c130c);border-radius:14px;padding:1.6rem 1.4rem 1.4rem;box-shadow:0 10px 28px var(--shadow-lg);}
  .tuner-status{text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:1rem;}
  .tuner-note{text-align:center;font-family:'Playfair Display',serif;font-weight:900;font-size:3.2rem;color:#fff;line-height:1;margin-bottom:.3rem;transition:color .15s;}
  .tuner-note.in-tune{color:var(--green)}
  .tuner-freq{text-align:center;font-family:'DM Mono',monospace;font-size:.7rem;color:rgba(255,255,255,0.4);margin-bottom:1.2rem;}
  .tuner-gauge{position:relative;height:54px;margin-bottom:1.3rem;}
  .tuner-track{position:absolute;left:0;right:0;top:24px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red) 38%,var(--green) 46%,var(--green) 54%,var(--red) 62%,var(--red) 100%);opacity:.85;}
  .tuner-center-mark{position:absolute;left:50%;top:14px;width:2px;height:24px;background:rgba(255,255,255,0.5);transform:translateX(-50%);}
  .tuner-needle{position:absolute;top:0;width:3px;height:54px;background:#fff;left:50%;transform:translateX(-50%);border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,0.6);transition:left .08s linear;}
  .tuner-needle.in-tune{background:var(--green);box-shadow:0 0 10px var(--green)}
  .tuner-strings{display:flex;gap:.4rem;justify-content:center;}
  .tuner-string-btn{flex:1;max-width:64px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:.5rem .3rem;cursor:default;text-align:center;transition:all .15s;}
  .tuner-string-btn .sname{font-family:'DM Mono',monospace;font-size:.7rem;color:rgba(255,255,255,0.55);display:block}
  .tuner-string-btn .sled{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);margin:.3rem auto 0;}
  .tuner-string-btn.target{border-color:var(--gold);background:rgba(232,160,32,0.12)}
  .tuner-string-btn.target .sname{color:var(--gold)}
  .tuner-string-btn.in-tune .sled{background:var(--green);box-shadow:0 0 6px var(--green)}
  .tuner-mic-btn{display:block;margin:1.2rem auto 0;background:var(--white);border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;}
  .tuner-mic-btn:hover{background:var(--cream)}
  .tuner-mic-btn.listening{background:var(--red);color:white}

  /* warmup: scale sub-panels and reference */
  .scale-subpanel{margin-top:.5rem}
  .scale-key-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:.75rem}
  .scale-key-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.65rem .5rem;cursor:pointer;transition:all .18s;text-align:center;}
  .scale-key-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .scale-key-btn .skb-key{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;color:var(--text);display:block}
  .scale-key-btn .skb-desc{font-size:.62rem;color:var(--text-light);margin-top:.15rem}
  .scale-back-btn{background:none;border:1.5px solid var(--cream-dark);border-radius:6px;padding:.35rem .75rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:.85rem;transition:all .2s;}
  .scale-back-btn:hover{border-color:var(--blue);color:var(--blue)}
  .scale-ref-card{background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;}
  .scale-ref-name{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:.35rem;}
  .scale-ref-pattern{display:flex;align-items:center;gap:.25rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .step-pill{padding:.2rem .45rem;border-radius:4px;font-family:'DM Mono',monospace;font-size:.62rem;font-weight:600;}
  .step-pill.W{background:rgba(27,79,138,0.12);color:var(--blue)}
  .step-pill.H{background:rgba(217,64,37,0.12);color:var(--red)}
  .step-pill.arrow{color:var(--text-light);font-size:.55rem;padding:0}
  .scale-ref-notes{display:flex;gap:.3rem;flex-wrap:wrap}
  .scale-note{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.3rem .45rem;border-radius:6px;border:1.5px solid var(--cream-dark);background:var(--cream);min-width:2rem;}
  .scale-note .sn-name{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;color:var(--text)}
  .scale-note .sn-label{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--text-light)}
  .scale-note.root{background:rgba(217,64,37,0.1);border-color:var(--red)}
  .scale-note.root .sn-name{color:var(--red)}
  .scale-note.third{background:rgba(76,175,80,0.1);border-color:var(--green)}
  .scale-note.third .sn-name{color:var(--green)}
  .scale-note.fifth{background:rgba(27,79,138,0.1);border-color:var(--blue)}
  .scale-note.fifth .sn-name{color:var(--blue)}
  .scale-note.seventh{background:rgba(232,160,32,0.1);border-color:var(--gold)}
  .scale-note.seventh .sn-name{color:var(--gold)}

  /* soloing: bandcamp + grouped */
  .bt-link{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1da0c3,#1a7fa0);border:none;border-radius:10px;padding:.85rem 1.1rem;text-decoration:none;color:white;margin-bottom:1.25rem;cursor:pointer;transition:all .2s;}
  .bt-link:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .bt-link .bt-left{display:flex;align-items:center;gap:.7rem}
  .bt-link .bt-icon{font-size:1.3rem}
  .bt-link .bt-name{font-size:.9rem;font-weight:600;display:block}
  .bt-link .bt-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-top:1px;display:block}
  .bt-link .bt-arrow{font-size:1rem;opacity:.8}
  .solo-group{margin-bottom:1rem}
  .solo-group-head{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:8px;background:var(--cream);border:2px solid var(--cream-dark);margin-bottom:.4rem;}
  .solo-key{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;color:var(--text);letter-spacing:.04em}
  .solo-key-desc{font-size:.72rem;color:var(--text-light)}
  .solo-scale-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;padding-left:.5rem}
  .solo-scale-btn{background:var(--white);border:2px solid var(--cream-dark);border-radius:8px;padding:.6rem .75rem;cursor:pointer;transition:all .18s;text-align:left;}
  .solo-scale-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .solo-scale-btn .ssb-name{font-size:.78rem;font-weight:600;color:var(--text);display:block;margin-bottom:.15rem}
  .solo-scale-btn .ssb-desc{font-size:.65rem;color:var(--text-light)}

  @media(max-width:640px){
    nav{padding:.85rem 1.2rem}
    .choice-row{grid-template-columns:1fr}
    .cat-head,.cat-body{padding-left:1.3rem;padding-right:1.3rem}
    .scale-key-grid{grid-template-columns:1fr 1fr}
    .solo-scale-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
    <div class="logo-name">Visual Guitar</div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
  </div>
</nav>

<div class="panel-wrap">
  <div class="cat-panel" id="catPanel">
    <div class="cat-head">
      <div>
        <div class="cat-stage-tag" id="catStageTag">Stage 1</div>
        <div class="cat-title" id="catTitle">Tuning &amp; Setup</div>
        <div class="cat-desc" id="catDesc"></div>
      </div>
      <button class="cat-close" id="catClose">✕</button>
    </div>
    <div class="cat-body">
      <div class="choice-row" id="choiceRow">
        <button class="choice-card" id="introChoice">
          <span class="ci">&#127916;</span>
          <div class="ct">Watch Intro Video</div>
          <div class="cs" id="introWatchedNote">Short overview of this stage</div>
        </button>
        <button class="choice-card" id="exerciseChoice" style="display:none">
          <span class="ci">&#127928;</span>
          <div class="ct">Jump to Exercises</div>
          <div class="cs">Skip the video, start practicing</div>
        </button>
        <button class="choice-card tuner-card" id="tunerChoice" style="display:none">
          <span class="ci">&#127925;</span>
          <div class="ct">Open Tuner</div>
          <div class="cs">Tune up before you start</div>
        </button>
      </div>

      <div class="tuner-wrap" id="tunerWrap">
        <div class="tuner-box">
          <div class="tuner-status" id="tunerStatus">Tap "Start Listening" and play a string</div>
          <div class="tuner-note" id="tunerNote">&#8212;</div>
          <div class="tuner-freq" id="tunerFreq">&nbsp;</div>
          <div class="tuner-gauge">
            <div class="tuner-track"></div>
            <div class="tuner-center-mark"></div>
            <div class="tuner-needle" id="tunerNeedle" style="left:50%"></div>
          </div>
          <div class="tuner-strings" id="tunerStrings"></div>
          <button class="tuner-mic-btn" id="tunerMicBtn">&#127908; Start Listening</button>
        </div>
      </div>

      <div class="vid-wrap" id="vidWrap">
        <video id="introVideo" controls playsinline></video>
        <div class="vid-meta">
          <span id="vidLabel">Intro video</span>
          <button id="vidToExercises">Go to exercises &rarr;</button>
        </div>
      </div>

      <div class="tip-card" id="tipCard">
        <span class="tip-icon">&#128161;</span>
        <div>
          <span class="tip-label">Tip</span>
          <span class="tip-text" id="tipText"></span>
        </div>
      </div>

      <div class="ex-list" id="exList"></div>
    </div>
  </div>
</div>

<script>
  const STAGES = [
    {
      id:'tuning', num:1, label:'Tuning & Setup',
      desc:'Get your guitar in tune and learn how to hold it comfortably before anything else.',
      video:'lesson_tuning_intro.mp4', autoTuner:true,
      tips:[
        "Hold the neck with your thumb low and behind it — not wrapped over the top.",
        "Rest the guitar waist on your right leg and tilt the neck slightly upward — not flat across your lap.",
        "Keep your fretting wrist low and relaxed, away from the neck, so your fingers can curl naturally.",
        "Your strumming elbow should rest lightly on the top edge of the body — not gripping.",
        "Relax your shoulders before you play — tension travels straight to your hands.",
        "Tune from below the note upward — it holds pitch better than tuning down to the note.",
        "New strings stretch a lot the first day — retune every few minutes until they settle.",
        "Your thumb behind the neck should sit roughly behind your middle finger, not sticking out.",
        "Keep your fretting fingertips curved like you are holding a small ball.",
        "A guitar that drifts out of tune mid-session is normal — retune every 10 to 15 minutes."
      ],
      exercises:[]
    },
    {
      id:'warmup', num:2, label:'Warmup with Scales',
      desc:'Learn where notes live on the neck before grouping them into chords. A great way to start every session.',
      video:'lesson_warmup_intro.mp4',
      tips:[
        "Scales are just notes arranged in a pattern — every chord you know is built from scale notes.",
        "The root note is always the starting point of a scale — it gives the scale its name.",
        "The 3rd decides whether a scale (and chord built from it) sounds major or minor.",
        "The 5th is the most stable note — landing on it always sounds resolved.",
        "Whole steps skip a fret, half steps move one fret — that pattern is what makes a scale sound the way it does.",
        "Major scales follow W W H W W W H — two whole steps, a half, three whole, a half.",
        "The minor pentatonic uses only 5 notes — it is easier to stay in key and great for soloing.",
        "Play scales slowly and evenly before building speed — your fingers learn the pattern, not the pace.",
        "Going up and down the scale is a warmup, but trying to make melodies from it is how you really learn it.",
        "Every scale you learn here will help you understand chords, solos, and songs in every other stage."
      ],
      exercises:[]
    },
    {
      id:'open-chords', num:3, label:'Open Chords',
      desc:'Learn the core open chord shapes — G, C, D, A, E and their minors.',
      video:'lesson_open_chords_intro.mp4',
      tips:[
        "Press only as hard as needed to stop the buzz — squeezing harder just tires your hand.",
        "Curl your fretting fingers like you're holding a small ball, not flat across the strings.",
        "Practice forming one chord, releasing fully, and reforming it — that's the real skill.",
        "It's normal for fingertips to hurt the first 1-2 weeks. Calluses build fast after that.",
        "Strum slowly and listen for any muted or buzzing string — that tells you which finger to fix.",
        "Your thumb belongs behind the neck, roughly behind your middle finger.",
        "Learn one chord deeply before adding a second — depth beats breadth early on.",
        "If a chord sounds muddy, check that no finger is accidentally touching a neighboring string.",
        "G and C share a finger position — learning them together speeds up both.",
        "A chord chart's dots show finger position, not pressure — pressure comes from practice."
      ],
      exercises:['Form G major, check each string','Form C major, check each string','Form D major, check each string','Form E minor, check each string']
    },
    {
      id:'chord-theory', num:4, label:'How Chords Are Built',
      desc:'Learn what root, third, and fifth mean — the three notes behind every chord you play.',
      video:'lesson_chord_theory_intro.mp4', theoryMode:true,
      tips:[
        "The root note is what gives a chord its name — a C chord starts on the note C.",
        "Major and minor are decided entirely by the third — everything else can stay the same.",
        "The fifth is the most stable note in a chord — it rarely sounds wrong.",
        "Moving a third down just one fret turns a major chord minor.",
        "Once you can hear a third, you can often tell major from minor with your eyes closed.",
        "A power chord (root + fifth, no third) is neither major nor minor — that's why it works in both.",
        "Every major scale note can serve as a root, third, or fifth depending on the chord built from it.",
        "Try humming just the root, then the third, then the fifth of a chord you know — that's ear training for free.",
        "The same three-note idea applies whether you're playing an open chord or a barre chord.",
        "Understanding root/third/fifth means you can often figure out a new chord without ever looking it up."

  function getProgress(){ try{ return JSON.parse(localStorage.getItem('viziProgress')||'{}'); }catch(e){ return {}; } }
  function setProgress(p){ try{ localStorage.setItem('viziProgress',JSON.stringify(p)); }catch(e){} }

  function openStage(id){
    const stage = STAGES.find(s => s.id === id);
    if (!stage) return;
    if (stage.isSong){ window.location.href = 'songs.html'; return; }
    activeStage = stage;

    // Tuning stage: auto-open tuner, show tip
    if (stage.autoTuner){
      catStageTag.textContent = 'Stage ' + stage.num;
      catTitle.textContent = stage.label;
      catDesc.textContent = stage.desc;
      vidWrap.classList.remove('show');
      tunerWrap.classList.add('show');
      exList.innerHTML = '';
      catPanel.classList.add('show');
      catPanel.scrollIntoView({behavior:'smooth',block:'start'});
      showRandomTip();
      return;
    }

    catStageTag.textContent = 'Stage ' + stage.num
      + (stage.theoryMode ? '  —  Fretboard shows root / third / fifth' : '');
    catTitle.textContent = stage.label;
    catDesc.textContent  = stage.desc;

    const p = getProgress();
    const watched = (p[id] && p[id].introWatched) || 0;
    introWatchedNote.textContent = watched > 0
      ? 'Watched ' + watched + 'x — short overview'
      : 'Short overview of this stage';
    introChoice.classList.toggle('watched', watched > 0);
    document.getElementById('exerciseChoice').style.display = CHOICE_PANELS[id] ? 'none' : '';

    vidWrap.classList.remove('show');
    tipCard.classList.remove('show');
    tunerWrap.classList.remove('show');
    introVideo.pause();
    stopTuner();

    tunerChoice.style.display = (id === 'tuning') ? '' : 'none';

    renderExercises(stage);
    catPanel.classList.add('show');
    catPanel.scrollIntoView({behavior:'smooth',block:'start'});
  }

  introChoice.addEventListener('click', () => {
    if (!activeStage) return;
    introVideo.src = activeStage.video;
    vidWrap.classList.add('show');
    tipCard.classList.remove('show');
    tunerWrap.classList.remove('show'); stopTuner();
    introVideo.play().catch(()=>{});
    markIntroWatched(activeStage.id);
  });
  exerciseChoice.addEventListener('click', () => {
    vidWrap.classList.remove('show');
    tunerWrap.classList.remove('show'); stopTuner();

    tunerWrap.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  vidToExercises.addEventListener('click', () => {
    vidWrap.classList.remove('show');
    introVideo.pause();
    showRandomTip();
    exList.scrollIntoView({behavior:'smooth',block:'nearest'});
  });

  function showRandomTip(){
    if (!activeStage || !activeStage.tips || !activeStage.tips.length) return;
    tipText.textContent = activeStage.tips[Math.floor(Math.random()*activeStage.tips.length)];
    tipCard.classList.add('show');
  }

  // ── Choice panel rendering ─────────────────────────────────
  function renderChoicePanel(stage){
    const def = CHOICE_PANELS[stage.id];
    exList.innerHTML = '';
    const label = document.createElement('span');
    label.className = 'choice-panel-label';
    label.textContent = def.label;
    exList.appendChild(label);
    if (def.hint){
      const hint = document.createElement('div');
      hint.className = 'choice-hint';
      hint.textContent = def.hint;
      exList.appendChild(hint);
    }

    // Soloing: Bandcamp + grouped key/scale
    if (def.bandcamp){
      const btLink = document.createElement('a');
      btLink.href = def.bandcamp; btLink.target = '_blank'; btLink.rel = 'noopener';
      btLink.className = 'bt-link';
      btLink.innerHTML = '<div class="bt-left"><span class="bt-icon">&#127925;</span><span><span class="bt-name">Open Backing Tracks</span><span class="bt-tag">Easy Backing Tracks &middot; Opens in new window</span></span></div><span class="bt-arrow">&#8599;</span>';
      exList.appendChild(btLink);
      const step2 = document.createElement('span');
      step2.className = 'choice-panel-label'; step2.style.marginTop = '.5rem';
      step2.textContent = 'Step 2 — Pick your key and scale';
      exList.appendChild(step2);
      def.groups.forEach(group => {
        const grpEl = document.createElement('div'); grpEl.className = 'solo-group';
        const head = document.createElement('div'); head.className = 'solo-group-head';
        head.innerHTML = '<span class="solo-key">' + group.key + '</span><span class="solo-key-desc">' + group.desc + '</span>';
        grpEl.appendChild(head);
        const row = document.createElement('div'); row.className = 'solo-scale-row';
        group.choices.forEach(ch => {
          const btn = document.createElement('button'); btn.className = 'solo-scale-btn';
          const scaleName = ch.name.split(' — ')[1] || ch.name;
          btn.innerHTML = '<span class="ssb-name">' + scaleName + '</span><span class="ssb-desc">' + ch.desc + '</span>';
          btn.addEventListener('click', () => {
            const p = new URLSearchParams({stage:stage.id, exercise:ch.name});
            window.location.href = 'vizi.html?' + p.toString();
          });
          row.appendChild(btn);
        });
        grpEl.appendChild(row); exList.appendChild(grpEl);
      });
      return;
    }

    // Standard choice grid
    const grid = document.createElement('div');
    grid.className = 'choice-grid cols-' + def.cols;
    def.choices.forEach(ch => {
      const btn = document.createElement('button'); btn.className = 'choice-btn';
      btn.innerHTML = '<span class="cb-icon">' + ch.icon + '</span><span><span class="cb-name">' + ch.name + '</span><span class="cb-desc">' + ch.desc + '</span></span><span class="cb-arrow">&#8594;</span>';
      btn.addEventListener('click', () => {
        if (ch.name === 'All Scales — Reference'){ renderAllScalesRef(); return; }
        if (stage.id === 'warmup' && SCALE_KEYS[ch.name]){ renderScaleSubPanel(stage.id, ch.name); return; }
        const ex = ch.name + ' — ' + ch.desc;
        const p = new URLSearchParams({stage:stage.id, exercise:ex});
        window.location.href = 'vizi.html?' + p.toString();
      });
      grid.appendChild(btn);
    });
    exList.appendChild(grid);
  }

  function renderScaleSubPanel(stageId, scaleType){
    exList.innerHTML = '';
    const back = document.createElement('button'); back.className = 'scale-back-btn'; back.textContent = '← Back';
    back.addEventListener('click', () => renderChoicePanel(STAGES.find(s => s.id === stageId)));
    exList.appendChild(back);
    const label = document.createElement('span'); label.className = 'choice-panel-label';
    label.textContent = 'Choose a key for ' + scaleType; exList.appendChild(label);
    const pat = SCALE_PATTERNS[scaleType];
    if (pat){
      const h = document.createElement('div'); h.className = 'choice-hint';
      h.textContent = pat.desc + ' — pattern: ' + pat.steps.join(' – '); exList.appendChild(h);
    }
    const grid = document.createElement('div'); grid.className = 'scale-key-grid';
    SCALE_KEYS[scaleType].forEach(k => {
      const btn = document.createElement('button'); btn.className = 'scale-key-btn';
      btn.innerHTML = '<span class="skb-key">' + k.key + '</span><span class="skb-desc">' + k.notes.map(n=>n.n).join(' – ') + '</span>';
      btn.addEventListener('click', () => {
        const p = new URLSearchParams({stage:stageId, exercise:k.key});
        window.location.href = 'vizi.html?' + p.toString();
      });
      grid.appendChild(btn);
    });
    exList.appendChild(grid);
  }

  function renderAllScalesRef(){
    exList.innerHTML = '';
    const back = document.createElement('button'); back.className = 'scale-back-btn'; back.textContent = '← Back';
    back.addEventListener('click', () => renderChoicePanel(STAGES.find(s => s.id === 'warmup')));
    exList.appendChild(back);
    const label = document.createElement('span'); label.className = 'choice-panel-label';
    label.textContent = 'Scale Reference — Intervals & Notes'; exList.appendChild(label);
    const hint = document.createElement('div'); hint.className = 'choice-hint';
    hint.textContent = 'W = whole step (2 frets)  H = half step (1 fret)  1.5 = 3 frets.  Root = red  3rd = green  5th = blue  7th = gold.';
    exList.appendChild(hint);
    ALL_SCALES_REF.forEach(scale => {
      const card = document.createElement('div'); card.className = 'scale-ref-card';
      const nm = document.createElement('div'); nm.className = 'scale-ref-name'; nm.textContent = scale.name; card.appendChild(nm);
      const pat = document.createElement('div'); pat.className = 'scale-ref-pattern';
      scale.pattern.forEach((step,i) => {
        const pill = document.createElement('span'); pill.className = 'step-pill ' + (step==='H'?'H':'W'); pill.textContent = step; pat.appendChild(pill);
        if (i < scale.pattern.length-1){ const arr = document.createElement('span'); arr.className='step-pill arrow'; arr.textContent='→'; pat.appendChild(arr); }
      });
      card.appendChild(pat);
      const notesRow = document.createElement('div'); notesRow.className = 'scale-ref-notes';
      scale.notes.forEach(note => {
        const el = document.createElement('div'); el.className = 'scale-note ' + (note.cls||'');
        el.innerHTML = '<span class="sn-name">' + note.n + '</span><span class="sn-label">' + note.l + '</span>';
        notesRow.appendChild(el);
      });
      card.appendChild(notesRow); exList.appendChild(card);
    });
  }

  function renderExercises(stage){
    if (CHOICE_PANELS[stage.id]){ renderChoicePanel(stage); return; }
    const p = getProgress();
    const done = (p[stage.id] && p[stage.id].exercisesDone) || [];
    exList.innerHTML = '';
    stage.exercises.forEach((ex,i) => {
      const item = document.createElement('div');
      item.className = 'ex-item' + (done.includes(ex) ? ' done' : '');
      item.innerHTML = '<div class="ex-num">' + (done.includes(ex)?'&#10003;':i+1) + '</div><div class="ex-name">' + ex + '</div><div class="ex-arrow">&#8594;</div>';
      item.addEventListener('click', () => {
        const params = new URLSearchParams({stage:stage.id, exercise:ex});
        window.location.href = 'vizi.html?' + params.toString();
      });
      exList.appendChild(item);
    });
  }

  document.getElementById('catClose').addEventListener('click', () => {
    catPanel.classList.remove('show');
    stopTuner();
  });

  // Auto-open from sessionStorage or hash
  function arriveAtStage(stageId){ setTimeout(() => openStage(stageId), 80); }
  try {
    const returnStage = sessionStorage.getItem('viziReturnStage');
    if (returnStage && STAGES.find(s => s.id === returnStage)){
      sessionStorage.removeItem('viziReturnStage'); arriveAtStage(returnStage);
    } else if (window.location.hash){
      const hashId = window.location.hash.slice(1);
      if (STAGES.find(s => s.id === hashId)){
        history.replaceState(null,'',window.location.pathname); arriveAtStage(hashId);
      }
    }
  } catch(e){}

  // ════════════════════════════════════════════════════════
  // TUNER — live pitch detection
  // ════════════════════════════════════════════════════════
  const STRINGS_TUNER = [
    {name:'E',label:'Lo E',freq:82.41},{name:'A',label:'A',freq:110.00},
    {name:'D',label:'D',freq:146.83},{name:'G',label:'G',freq:196.00},
    {name:'B',label:'B',freq:246.94},{name:'E',label:'Hi E',freq:329.63}
  ];
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const tunerStatus = document.getElementById('tunerStatus');
  const tunerNote   = document.getElementById('tunerNote');
  const tunerFreq   = document.getElementById('tunerFreq');
  const tunerNeedle = document.getElementById('tunerNeedle');
  const tunerStringsEl = document.getElementById('tunerStrings');
  const tunerMicBtn = document.getElementById('tunerMicBtn');

  STRINGS_TUNER.forEach((s,i) => {
    const el = document.createElement('div'); el.className = 'tuner-string-btn'; el.dataset.idx = i;
    el.innerHTML = '<span class="sname">' + s.label + '</span><div class="sled"></div>';
    tunerStringsEl.appendChild(el);
  });

  let tunerCtx=null, tunerStream=null, tunerAnalyser=null, tunerRAF=null, tunerRunning=false;
  tunerMicBtn.addEventListener('click', () => { tunerRunning ? stopTuner() : startTuner(); });

  async function startTuner(){
    try {
      tunerCtx = new (window.AudioContext||window.webkitAudioContext)();
      tunerStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      const src = tunerCtx.createMediaStreamSource(tunerStream);
      tunerAnalyser = tunerCtx.createAnalyser(); tunerAnalyser.fftSize=2048;
      src.connect(tunerAnalyser);
      tunerRunning=true; tunerMicBtn.textContent='Stop Listening'; tunerMicBtn.classList.add('listening');
      tunerStatus.textContent='Listening… play one string at a time';
      tunerLoop();
    } catch(e){ tunerStatus.textContent='Microphone blocked — allow mic access'; }
  }
  function stopTuner(){
    tunerRunning=false;
    if (tunerRAF) cancelAnimationFrame(tunerRAF);
    if (tunerStream) tunerStream.getTracks().forEach(t=>t.stop());
    if (tunerCtx) tunerCtx.close().catch(()=>{});
    tunerCtx=null; tunerStream=null; tunerAnalyser=null;
    tunerMicBtn.textContent='Start Listening'; tunerMicBtn.classList.remove('listening');
    tunerStatus.textContent='Tap "Start Listening" and play a string';
    tunerNote.textContent='—'; tunerNote.classList.remove('in-tune');
    tunerFreq.innerHTML='&nbsp;';
    tunerNeedle.style.left='50%'; tunerNeedle.classList.remove('in-tune');
    document.querySelectorAll('.tuner-string-btn').forEach(el=>el.classList.remove('target','in-tune'));
  }
  function tunerLoop(){
    if (!tunerRunning) return;
    const buf=new Float32Array(tunerAnalyser.fftSize);
    tunerAnalyser.getFloatTimeDomainData(buf);
    const freq=autoCorrelate(buf,tunerCtx.sampleRate);
    if (freq>0) updateTunerDisplay(freq);
    tunerRAF=requestAnimationFrame(tunerLoop);
  }
  function autoCorrelate(buf,sampleRate){
    const SIZE=buf.length; let rms=0;
    for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/SIZE); if(rms<0.01) return -1;
    let r1=0,r2=SIZE-1,thresh=0.2;
    for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<thresh){r1=i;break;}}
    for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<thresh){r2=SIZE-i;break;}}
    const trimmed=buf.slice(r1,r2); const n=trimmed.length; if(n<2) return -1;
    const c=new Array(n).fill(0);
    for(let lag=0;lag<n;lag++) for(let i=0;i<n-lag;i++) c[lag]+=trimmed[i]*trimmed[i+lag];
    let d=0; while(d<n-1&&c[d]>c[d+1])d++;
    let maxVal=-1,maxPos=-1;
    for(let i=d;i<n;i++){if(c[i]>maxVal){maxVal=c[i];maxPos=i;}}
    let T0=maxPos; if(T0<=0) return -1;
    if(T0>0&&T0<n-1){const x1=c[T0-1],x2=c[T0],x3=c[T0+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a!==0)T0=T0-b/(2*a);}
    return sampleRate/T0;
  }
  function nearestString(freq){
    let best=STRINGS_TUNER[0],bestDiff=Infinity;
    STRINGS_TUNER.forEach(s=>{const d=Math.abs(Math.log2(freq/s.freq));if(d<bestDiff){bestDiff=d;best=s;}});
    return best;
  }
  function updateTunerDisplay(freq){
    if(freq<60||freq>500) return;
    const target=nearestString(freq);
    const cents=1200*Math.log2(freq/target.freq);
    const clamped=Math.max(-50,Math.min(50,cents));
    const pct=50+(clamped/50)*50;
    const inTune=Math.abs(cents)<5;
    tunerNote.textContent=target.label; tunerNote.classList.toggle('in-tune',inTune);
    tunerFreq.textContent=freq.toFixed(1)+' Hz  ·  target '+target.freq.toFixed(2)+' Hz  ·  '+(cents>0?'+':'')+cents.toFixed(0)+'c';
    tunerNeedle.style.left=pct+'%'; tunerNeedle.classList.toggle('in-tune',inTune);
    tunerStatus.textContent=inTune?'In tune!':cents<0?'Tune up':'Tune down';
    document.querySelectorAll('.tuner-string-btn').forEach(el=>{
      const idx=parseInt(el.dataset.idx,10),isTarget=STRINGS_TUNER[idx]===target;
      el.classList.toggle('target',isTarget); el.classList.toggle('in-tune',isTarget&&inTune);
    });
  }
</script>
