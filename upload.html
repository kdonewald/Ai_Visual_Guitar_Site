<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Song — AI Visual Guitar</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #1e1e24;
      --amber: #f5a623;
      --amber-dim: #c47d0e;
      --amber-glow: rgba(245,166,35,0.10);
      --text: #e8e4d9;
      --muted: #6b6860;
      --success: #5ce07a;
      --error: #e05c5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 40%, rgba(245,166,35,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .card-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }
    .card-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--amber);
      margin-bottom: 0.25rem;
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .card-body { padding: 2rem; }

    /* SESSION ID */
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .session-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .session-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--amber);
      background: var(--amber-glow);
      border: 1px solid rgba(245,166,35,0.2);
      padding: 0.25rem 0.6rem;
      letter-spacing: 0.05em;
    }
    .session-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
      margin-left: auto;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* DROP ZONE */
    .drop-zone {
      border: 1px dashed var(--border);
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 1.5rem;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--amber);
      background: var(--amber-glow);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon {
      width: 2.5rem;
      height: 2.5rem;
      margin: 0 auto 1rem;
      color: var(--muted);
    }
    .drop-zone:hover .drop-icon,
    .drop-zone.drag-over .drop-icon { color: var(--amber); }
    .drop-main {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .drop-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* FILE SELECTED STATE */
    .file-chosen {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--amber-glow);
      border: 1px solid rgba(245,166,35,0.25);
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
    .file-chosen.visible { display: flex; }
    .file-icon { color: var(--amber); flex-shrink: 0; }
    .file-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.2rem;
      transition: color 0.2s;
    }
    .file-clear:hover { color: var(--error); }

    /* TEXT INPUT */
    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.5rem;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      padding: 0.875rem;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }
    textarea:focus { border-color: var(--amber); }
    textarea::placeholder { color: var(--muted); }

    /* SUBMIT */
    .btn-submit {
      width: 100%;
      background: var(--amber);
      color: #0a0a0b;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .btn-submit:hover:not(:disabled) { background: #ffc043; transform: translateY(-1px); }
    .btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    /* STATUS */
    .status {
      display: none;
      margin-top: 1.25rem;
      padding: 0.875rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      border: 1px solid;
    }
    .status.visible { display: block; }
    .status.success { border-color: rgba(92,224,122,0.3); background: rgba(92,224,122,0.05); color: var(--success); }
    .status.error { border-color: rgba(224,92,92,0.3); background: rgba(224,92,92,0.05); color: var(--error); }
    .status.loading { border-color: rgba(245,166,35,0.3); background: var(--amber-glow); color: var(--amber); }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(10,10,11,0.3);
      border-top-color: #0a0a0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* FADE IN */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fade-up 0.5s ease both; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <a href="index.html" class="back-link">← Home</a>
      <div class="card-logo">AIVisualGuitar</div>
      <div class="card-title">Upload Song</div>
    </div>

    <div class="card-body">

      <div class="session-row">
        <span class="session-label">Session</span>
        <span class="session-val" id="sessionVal">—</span>
        <span class="session-dot"></span>
      </div>

      <!-- FILE DROP ZONE -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf,.txt,.png,.jpg,.jpeg" />
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3v13M7 8l5-5 5 5M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
        </svg>
        <div class="drop-main">Drop chord sheet here</div>
        <div class="drop-sub">PDF · TXT · JPG · PNG</div>
      </div>

      <div class="file-chosen" id="fileChosen">
        <svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="file-name" id="fileName">—</span>
        <button class="file-clear" id="fileClear" title="Remove">✕</button>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or paste chords</div>
        <div class="divider-line"></div>
      </div>

      <label class="input-label" for="chordsText">Chord Sheet Text</label>
      <textarea id="chordsText" placeholder="e.g. Verse: G  Em  C  D&#10;Chorus: C  G  Am  F"></textarea>

      <button class="btn-submit" id="submitBtn" disabled>
        <span id="btnLabel">Select a file or paste chords</span>
      </button>

      <div class="status" id="status"></div>

    </div>
  </div>

  <script>
    // --- Session ID from URL or generate one ---
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session') || 'LOCAL-' + Math.random().toString(36).slice(2,8).toUpperCase();
    document.getElementById('sessionVal').textContent = sessionId;

    // --- Railway endpoint (update this to your Railway URL) ---
    const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';

    // --- Elements ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileChosen = document.getElementById('fileChosen');
    const fileName = document.getElementById('fileName');
    const fileClear = document.getElementById('fileClear');
    const chordsText = document.getElementById('chordsText');
    const submitBtn = document.getElementById('submitBtn');
    const btnLabel = document.getElementById('btnLabel');
    const status = document.getElementById('status');

    let selectedFile = null;

    function updateSubmitState() {
      const hasContent = selectedFile || chordsText.value.trim().length > 0;
      submitBtn.disabled = !hasContent;
      btnLabel.textContent = hasContent ? 'Send to Vizi' : 'Select a file or paste chords';
    }

    // Drag over styling
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(f) {
      selectedFile = f;
      fileName.textContent = f.name;
      fileChosen.classList.add('visible');
      updateSubmitState();
    }

    fileClear.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileChosen.classList.remove('visible');
      updateSubmitState();
    });

    chordsText.addEventListener('input', updateSubmitState);

    // --- Submit ---
    submitBtn.addEventListener('click', async () => {
      showStatus('loading', 'Sending to Vizi...');
      submitBtn.disabled = true;
      btnLabel.innerHTML = '<div class="spinner"></div> Sending…';

      try {
        let body;
        let headers = {};

        if (selectedFile) {
          // File upload via FormData
          const fd = new FormData();
          fd.append('file', selectedFile);
          fd.append('session', sessionId);
          if (chordsText.value.trim()) fd.append('text', chordsText.value.trim());
          body = fd;
        } else {
          // Text only
          headers['Content-Type'] = 'application/json';
          body = JSON.stringify({ session: sessionId, text: chordsText.value.trim() });
        }

        const res = await fetch(`${RAILWAY_URL}/song-upload`, {
          method: 'POST',
          headers,
          body
        });

        if (res.ok) {
          showStatus('success', '✓ Song received! Vizi is ready — ask about any chord.');
          btnLabel.textContent = 'Sent!';
        } else {
          const err = await res.text();
          showStatus('error', `Error ${res.status}: ${err}`);
          resetBtn();
        }
      } catch (e) {
        showStatus('error', 'Could not reach Vizi server. Check your connection.');
        resetBtn();
      }
    });

    function showStatus(type, msg) {
      status.className = `status visible ${type}`;
      status.textContent = msg;
    }

    function resetBtn() {
      submitBtn.disabled = false;
      btnLabel.textContent = 'Send to Vizi';
    }
  </script>

</body>
</html>
