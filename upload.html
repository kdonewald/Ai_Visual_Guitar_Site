<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Song — AI Visual Guitar</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #1e1e24;
      --amber: #f5a623;
      --amber-dim: #c47d0e;
      --amber-glow: rgba(245,166,35,0.10);
      --text: #e8e4d9;
      --muted: #6b6860;
      --success: #5ce07a;
      --error: #e05c5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 40%, rgba(245,166,35,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .card-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }
    .card-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--amber);
      margin-bottom: 0.25rem;
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .card-body { padding: 2rem; }

    /* SESSION */
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .session-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .session-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--amber);
      background: var(--amber-glow);
      border: 1px solid rgba(245,166,35,0.2);
      padding: 0.25rem 0.6rem;
      letter-spacing: 0.05em;
    }
    .session-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
      margin-left: auto;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* TABS */
    .method-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-bottom: 1.75rem;
    }
    .method-tab {
      background: var(--bg);
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 0.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s, color 0.15s;
    }
    .method-tab svg { width: 1.1rem; height: 1.1rem; }
    .method-tab:hover { background: var(--surface); color: var(--text); }
    .method-tab.active {
      background: var(--amber-glow);
      color: var(--amber);
      border-bottom: 2px solid var(--amber);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* DROP ZONE */
    .drop-zone {
      border: 1px dashed var(--border);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 1rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--amber);
      background: var(--amber-glow);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon { width: 2.2rem; height: 2.2rem; margin: 0 auto 0.75rem; color: var(--muted); transition: color 0.2s; }
    .drop-zone:hover .drop-icon, .drop-zone.drag-over .drop-icon { color: var(--amber); }
    .drop-main { font-size: 0.9rem; color: var(--text); margin-bottom: 0.35rem; }
    .drop-sub { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

    /* CAMERA */
    .camera-preview-wrap {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 4/3;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }
    #cameraVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
    #cameraCanvas { display: none; }
    .camera-placeholder { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: var(--muted); }
    .camera-placeholder svg { width: 2.5rem; height: 2.5rem; }
    .camera-placeholder span { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }
    #capturedPreview { width: 100%; height: 100%; object-fit: contain; display: none; }

    .viewfinder { position: absolute; inset: 0; pointer-events: none; }
    .vf-corner { position: absolute; width: 20px; height: 20px; border-color: var(--amber); border-style: solid; opacity: 0.6; }
    .vf-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    .vf-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
    .vf-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
    .vf-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

    .camera-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .camera-buttons.single { grid-template-columns: 1fr; }

    .btn-cam {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-cam svg { width: 0.9rem; height: 0.9rem; }
    .btn-cam:hover { border-color: var(--amber); color: var(--amber); }
    .btn-cam.primary { background: var(--amber); border-color: var(--amber); color: #0a0a0b; }
    .btn-cam.primary:hover { background: #ffc043; }
    .btn-cam.danger { border-color: rgba(224,92,92,0.4); color: var(--error); }
    .btn-cam.danger:hover { background: rgba(224,92,92,0.08); }

    .camera-tip { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.08em; color: var(--muted); text-align: center; margin-top: 0.75rem; }

    /* FILE CHOSEN */
    .file-chosen {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--amber-glow);
      border: 1px solid rgba(245,166,35,0.25);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
    }
    .file-chosen.visible { display: flex; }
    .file-icon { color: var(--amber); flex-shrink: 0; }
    .file-name { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 0.2rem; transition: color 0.2s; }
    .file-clear:hover { color: var(--error); }

    /* TEXT */
    .input-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.5rem; }
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem;
      line-height: 1.6; padding: 0.875rem; resize: vertical; min-height: 120px;
      outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--amber); }
    textarea::placeholder { color: var(--muted); }

    /* SUBMIT */
    .btn-submit {
      width: 100%; background: var(--amber); color: #0a0a0b; border: none;
      font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase; padding: 1rem; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      margin-top: 1.5rem;
    }
    .btn-submit:hover:not(:disabled) { background: #ffc043; transform: translateY(-1px); }
    .btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .status { display: none; margin-top: 1.25rem; padding: 0.875rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.05em; border: 1px solid; }
    .status.visible { display: block; }
    .status.success { border-color: rgba(92,224,122,0.3); background: rgba(92,224,122,0.05); color: var(--success); }
    .status.error { border-color: rgba(224,92,92,0.3); background: rgba(224,92,92,0.05); color: var(--error); }
    .status.loading { border-color: rgba(245,166,35,0.3); background: var(--amber-glow); color: var(--amber); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(10,10,11,0.3); border-top-color: #0a0a0b; border-radius: 50%; animation: spin 0.7s linear infinite; }

    @keyframes fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fade-up 0.5s ease both; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <a href="index.html" class="back-link">← Home</a>
      <div class="card-logo">AIVisualGuitar</div>
      <div class="card-title">Upload Song</div>
    </div>

    <div class="card-body">

      <div class="session-row">
        <span class="session-label">Session</span>
        <span class="session-val" id="sessionVal">—</span>
        <span class="session-dot"></span>
      </div>

      <div class="method-tabs">
        <button class="method-tab active" data-panel="file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          File
        </button>
        <button class="method-tab" data-panel="camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Camera
        </button>
        <button class="method-tab" data-panel="text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="17" y1="10" x2="3" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="21" y1="14" x2="3" y2="14"/>
            <line x1="14" y1="18" x2="3" y2="18"/>
          </svg>
          Text
        </button>
      </div>

      <!-- FILE PANEL -->
      <div class="panel active" id="panel-file">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".pdf,.txt,.png,.jpg,.jpeg" />
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 3v13M7 8l5-5 5 5M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
          </svg>
          <div class="drop-main">Drop chord sheet here</div>
          <div class="drop-sub">PDF · TXT · JPG · PNG</div>
        </div>
        <div class="file-chosen" id="fileChosen">
          <svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="file-name" id="fileName">—</span>
          <button class="file-clear" id="fileClear">✕</button>
        </div>
      </div>

      <!-- CAMERA PANEL -->
      <div class="panel" id="panel-camera">
        <div class="camera-preview-wrap">
          <div class="camera-placeholder" id="cameraPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span>Camera not started</span>
          </div>
          <video id="cameraVideo" autoplay playsinline></video>
          <canvas id="cameraCanvas"></canvas>
          <img id="capturedPreview" alt="Captured sheet music" />
          <div class="viewfinder">
            <div class="vf-corner vf-tl"></div>
            <div class="vf-corner vf-tr"></div>
            <div class="vf-corner vf-bl"></div>
            <div class="vf-corner vf-br"></div>
          </div>
        </div>

        <div class="camera-buttons" id="cameraButtons">
          <button class="btn-cam primary" id="btnStartCamera" style="grid-column:1/-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/>
            </svg>
            Start Camera
          </button>
        </div>

        <div class="file-chosen" id="captureChosen" style="margin-top:0.75rem;margin-bottom:0">
          <svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="file-name">Photo captured ✓</span>
          <button class="file-clear" id="captureClear">✕</button>
        </div>

        <div class="camera-tip" id="cameraTip">Point camera at your sheet music or chord chart</div>
      </div>

      <!-- TEXT PANEL -->
      <div class="panel" id="panel-text">
        <label class="input-label" for="chordsText">Paste Chord Sheet</label>
        <textarea id="chordsText" placeholder="e.g. Verse: G  Em  C  D&#10;Chorus: C  G  Am  F&#10;&#10;Or paste any chord chart text here..."></textarea>
      </div>

      <button class="btn-submit" id="submitBtn" disabled>
        <span id="btnLabel">Choose a song source above</span>
      </button>

      <div class="status" id="status"></div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session') || 'LOCAL-' + Math.random().toString(36).slice(2,8).toUpperCase();
    document.getElementById('sessionVal').textContent = sessionId;

    const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';

    let selectedFile = null;
    let capturedBlob = null;
    let activePanel = 'file';
    let cameraStream = null;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileChosen = document.getElementById('fileChosen');
    const fileName = document.getElementById('fileName');
    const fileClear = document.getElementById('fileClear');
    const chordsText = document.getElementById('chordsText');
    const submitBtn = document.getElementById('submitBtn');
    const btnLabel = document.getElementById('btnLabel');
    const status = document.getElementById('status');
    const cameraVideo = document.getElementById('cameraVideo');
    const cameraCanvas = document.getElementById('cameraCanvas');
    const capturedPreview = document.getElementById('capturedPreview');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const captureChosen = document.getElementById('captureChosen');
    const cameraButtons = document.getElementById('cameraButtons');
    const cameraTip = document.getElementById('cameraTip');

    // TABS
    document.querySelectorAll('.method-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        activePanel = tab.dataset.panel;
        document.getElementById('panel-' + activePanel).classList.add('active');
        if (activePanel !== 'camera' && cameraStream) stopCamera();
        updateSubmitState();
      });
    });

    // FILE
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    function setFile(f) { selectedFile = f; fileName.textContent = f.name; fileChosen.classList.add('visible'); updateSubmitState(); }
    fileClear.addEventListener('click', () => { selectedFile = null; fileInput.value = ''; fileChosen.classList.remove('visible'); updateSubmitState(); });

    // CAMERA
    function bindStartBtn() {
      const btn = document.getElementById('btnStartCamera');
      if (btn) btn.addEventListener('click', startCamera);
    }
    bindStartBtn();

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        cameraVideo.srcObject = cameraStream;
        cameraVideo.style.display = 'block';
        cameraPlaceholder.style.display = 'none';
        capturedPreview.style.display = 'none';
        cameraTip.textContent = 'Hold steady — tap Capture when ready';
        cameraButtons.innerHTML = `
          <button class="btn-cam primary" id="btnCapture">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
            Capture
          </button>
          <button class="btn-cam danger" id="btnStopCamera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Cancel
          </button>`;
        document.getElementById('btnCapture').addEventListener('click', capturePhoto);
        document.getElementById('btnStopCamera').addEventListener('click', () => stopCamera(false));
      } catch(e) {
        showStatus('error', 'Camera access denied. Check browser permissions.');
      }
    }

    function capturePhoto() {
      const w = cameraVideo.videoWidth, h = cameraVideo.videoHeight;
      cameraCanvas.width = w; cameraCanvas.height = h;
      cameraCanvas.getContext('2d').drawImage(cameraVideo, 0, 0, w, h);
      cameraCanvas.toBlob(blob => {
        capturedBlob = blob;
        capturedPreview.src = URL.createObjectURL(blob);
        capturedPreview.style.display = 'block';
        cameraVideo.style.display = 'none';
        stopCamera(true);
        captureChosen.classList.add('visible');
        cameraTip.textContent = 'Looking good! Hit Send to Vizi below.';
        cameraButtons.innerHTML = `
          <button class="btn-cam" id="btnRetake" style="grid-column:1/-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            Retake
          </button>`;
        document.getElementById('btnRetake').addEventListener('click', retakePhoto);
        updateSubmitState();
      }, 'image/jpeg', 0.92);
    }

    function retakePhoto() {
      capturedBlob = null;
      capturedPreview.style.display = 'none';
      captureChosen.classList.remove('visible');
      cameraPlaceholder.style.display = 'flex';
      cameraTip.textContent = 'Point camera at your sheet music or chord chart';
      cameraButtons.innerHTML = `<button class="btn-cam primary" id="btnStartCamera" style="grid-column:1/-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        Start Camera</button>`;
      bindStartBtn();
      updateSubmitState();
    }

    function stopCamera(keepPreview = false) {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      if (!keepPreview) {
        cameraVideo.style.display = 'none';
        cameraPlaceholder.style.display = 'flex';
        capturedPreview.style.display = 'none';
        captureChosen.classList.remove('visible');
        capturedBlob = null;
        cameraTip.textContent = 'Point camera at your sheet music or chord chart';
        cameraButtons.innerHTML = `<button class="btn-cam primary" id="btnStartCamera" style="grid-column:1/-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          Start Camera</button>`;
        bindStartBtn();
      }
    }

    document.getElementById('captureClear').addEventListener('click', () => retakePhoto());

    // TEXT
    chordsText.addEventListener('input', updateSubmitState);

    function updateSubmitState() {
      let ready = (activePanel === 'file' && selectedFile) ||
                  (activePanel === 'camera' && capturedBlob) ||
                  (activePanel === 'text' && chordsText.value.trim().length > 0);
      submitBtn.disabled = !ready;
      btnLabel.textContent = ready ? 'Send to Vizi' : 'Choose a song source above';
    }

    // SUBMIT
    submitBtn.addEventListener('click', async () => {
      showStatus('loading', 'Sending to Vizi...');
      submitBtn.disabled = true;
      btnLabel.innerHTML = '<div class="spinner"></div> Sending…';
      try {
        const fd = new FormData();
        fd.append('session', sessionId);
        if (activePanel === 'file' && selectedFile) fd.append('file', selectedFile);
        else if (activePanel === 'camera' && capturedBlob) fd.append('file', capturedBlob, 'sheet-music-photo.jpg');
        else if (activePanel === 'text') fd.append('text', chordsText.value.trim());

        const res = await fetch(`${RAILWAY_URL}/song-upload`, { method: 'POST', body: fd });
        if (res.ok) {
          showStatus('success', '✓ Song received! Vizi is ready — ask about any chord.');
          btnLabel.textContent = 'Sent!';
        } else {
          showStatus('error', `Error ${res.status}: ${await res.text()}`);
          resetBtn();
        }
      } catch(e) {
        showStatus('error', 'Could not reach Vizi server. Check your connection.');
        resetBtn();
      }
    });

    function showStatus(type, msg) { status.className = `status visible ${type}`; status.textContent = msg; }
    function resetBtn() { updateSubmitState(); btnLabel.textContent = 'Send to Vizi'; }
    window.addEventListener('beforeunload', () => { if (cameraStream) stopCamera(); });
  </script>

</body>
</html>
