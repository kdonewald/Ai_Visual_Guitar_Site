<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload Music — Ai Visual Guitar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F0E8; --cream-dark:#EDE6D6;
    --red:#D94025; --red-dark:#B83320; --blue:#1B4F8A;
    --text:#2A2018; --text-mid:#5A4A38; --text-light:#8A7A68;
    --white:#FFFFFF; --shadow:rgba(42,32,24,0.10);
    --green:#2E7D32; --green-bg:#E8F5E9; --green-bd:#A5D6A7;
    --err:#C62828; --err-bg:#FFEBEE; --err-bd:#FFCDD2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--cream); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:2rem 1.25rem;
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:repeating-linear-gradient(90deg,transparent 0px,transparent 79px,rgba(42,32,24,0.04) 80px,rgba(42,32,24,0.04) 81px);
  }
  .card{
    position:relative; z-index:1; width:100%; max-width:480px;
    background:var(--white); border:2px solid var(--cream-dark);
    border-radius:16px; box-shadow:0 8px 32px var(--shadow);
    animation:fade-up .45s ease both;
  }
  @keyframes fade-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .card-head{
    padding:1.75rem 2rem 1.5rem;
    border-bottom:2px solid var(--cream-dark);
    background:linear-gradient(135deg,var(--white) 0%,var(--cream) 100%);
    border-radius:14px 14px 0 0;
  }
  .back{
    display:inline-flex; align-items:center; gap:.4rem;
    font-size:.82rem; font-weight:500; color:var(--text-mid);
    text-decoration:none; padding:5px 12px; border-radius:6px;
    border:1.5px solid var(--cream-dark); background:var(--white);
    transition:all .2s; margin-bottom:1.25rem;
  }
  .back:hover{border-color:var(--blue);color:var(--blue)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:.35rem}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700}
  .card-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;letter-spacing:-.02em;line-height:1}

  .card-body{padding:1.75rem 2rem 2rem}

  .step{display:flex;align-items:center;gap:.75rem;margin-bottom:.7rem}
  .step-num{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    background:var(--blue);color:white;
    font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;
    display:flex;align-items:center;justify-content:center;
  }
  .step-label{font-size:.9rem;font-weight:500;color:var(--text)}

  .ug-btn{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:.9rem 1.1rem;
    background:var(--cream);border:2px solid var(--cream-dark);
    border-radius:10px;text-decoration:none;color:var(--text);
    font-size:.88rem;font-weight:500;transition:all .2s;margin-bottom:1.75rem;
  }
  .ug-btn:hover{border-color:var(--blue);background:rgba(27,79,138,0.04);color:var(--blue)}
  .ug-left{display:flex;align-items:center;gap:.65rem}
  .ug-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);display:block;margin-top:2px}

  .drop-zone{
    border:2px dashed var(--cream-dark);border-radius:10px;
    padding:2rem 1.25rem;text-align:center;cursor:pointer;
    background:var(--cream);position:relative;
    transition:border-color .2s,background .2s;margin-bottom:.85rem;
  }
  .drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:rgba(27,79,138,0.04)}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-icon{width:2rem;height:2rem;margin:0 auto .6rem;color:var(--text-light)}
  .drop-zone:hover .drop-icon,.drop-zone.over .drop-icon{color:var(--blue)}
  .drop-main{font-size:.88rem;color:var(--text);margin-bottom:.25rem}
  .drop-sub{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light)}

  .file-chosen{
    display:none;align-items:center;gap:.75rem;
    background:rgba(27,79,138,0.06);border:1px solid rgba(27,79,138,0.2);
    border-radius:8px;padding:.7rem 1rem;margin-bottom:.85rem;
  }
  .file-chosen.show{display:flex}
  .file-name{font-family:'DM Mono',monospace;font-size:.75rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-clear{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;transition:color .2s;padding:0 .2rem}
  .file-clear:hover{color:var(--red)}

  .text-toggle{
    font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
    color:var(--blue);cursor:pointer;text-align:center;display:block;
    margin-bottom:1rem;padding:.4rem;border-radius:4px;border:none;background:none;width:100%;transition:background .15s;
  }
  .text-toggle:hover{background:rgba(27,79,138,0.06)}
  .text-area-wrap{display:none;margin-bottom:1rem}
  .text-area-wrap.show{display:block}
  textarea{
    width:100%;background:var(--cream);border:2px solid var(--cream-dark);
    border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;
    font-size:.75rem;line-height:1.6;padding:.875rem;resize:vertical;
    min-height:100px;outline:none;transition:border-color .2s;
  }
  textarea:focus{border-color:var(--blue);background:white}
  textarea::placeholder{color:var(--text-light)}

  .btn-send{
    width:100%;background:var(--red);color:white;border:none;
    border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;
    padding:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;
    transition:all .2s;
  }
  .btn-send:hover:not(:disabled){background:var(--red-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(217,64,37,.3)}
  .btn-send:disabled{background:var(--cream-dark);color:var(--text-light);cursor:not-allowed}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

  .status{display:none;margin-top:1rem;padding:.875rem 1rem;border-radius:8px;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.04em;border:1px solid}
  .status.show{display:block}
  .status.ok{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
  .status.err{border-color:var(--err-bd);background:var(--err-bg);color:var(--err)}
  .status.loading{border-color:rgba(27,79,138,.2);background:rgba(27,79,138,.06);color:var(--blue)}

  @media(max-width:520px){.card-head,.card-body{padding-left:1.25rem;padding-right:1.25rem}}
</style>
</head>
<body>
<div class="card">

  <div class="card-head">
    <a href="index.html" class="back">← Home</a>
    <div class="logo">
      <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
      <div class="logo-name">Visual Guitar</div>
    </div>
    <div class="card-title">Upload Music</div>
  </div>

  <div class="card-body">

    <!-- Step 1 -->
    <div class="step" style="margin-bottom:.75rem">
      <div class="step-num">1</div>
      <div class="step-label">Don't have a song sheet? Get one free</div>
    </div>

    <a class="ug-btn" href="https://www.ultimate-guitar.com/explore?order=rating_desc&type[]=Chords&level[]=beginner" target="_blank" rel="noopener">
      <div class="ug-left">
        <span style="font-size:1.3rem">🎸</span>
        <div>
          Find beginner songs on Ultimate Guitar
          <span class="ug-tag">Free chord sheets · Opens in new tab</span>
        </div>
      </div>
      <span style="font-size:1rem;color:var(--text-light)">↗</span>
    </a>

    <!-- Step 2 -->
    <div class="step" style="margin-bottom:.75rem">
      <div class="step-num">2</div>
      <div class="step-label">Upload your song sheet</div>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,.txt,.png,.jpg,.jpeg,image/*" />
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 3v13M7 8l5-5 5 5M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
      </svg>
      <div class="drop-main">Tap to choose file or take photo</div>
      <div class="drop-sub">PDF · Image · Screenshot</div>
    </div>

    <div class="file-chosen" id="fileChosen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="file-name" id="fileName">—</span>
      <button class="file-clear" id="fileClear">✕</button>
    </div>

    <button class="text-toggle" id="textToggle">Or type / paste chords instead ▾</button>
    <div class="text-area-wrap" id="textWrap">
      <textarea id="chordsText" placeholder="e.g. Verse: G  Em  C  D&#10;Chorus: C  G  Am  F&#10;&#10;Or paste any chord sheet text here..."></textarea>
    </div>

    <!-- Step 3 -->
    <div class="step" style="margin-bottom:.85rem">
      <div class="step-num">3</div>
      <div class="step-label">Send to Vizi</div>
    </div>

    <button class="btn-send" id="submitBtn" disabled>
      <span id="btnLabel">Choose a file or paste chords first</span>
    </button>

    <div class="status" id="status"></div>

  </div>
</div>

<script>
  const RAILWAY = 'https://vizi-tts-proxy-production.up.railway.app';

  let sessionId = null;
  let selectedFile = null;
  let textMode = false;

  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const fileChosen = document.getElementById('fileChosen');
  const fileName   = document.getElementById('fileName');
  const fileClear  = document.getElementById('fileClear');
  const textToggle = document.getElementById('textToggle');
  const textWrap   = document.getElementById('textWrap');
  const chordsText = document.getElementById('chordsText');
  const submitBtn  = document.getElementById('submitBtn');
  const btnLabel   = document.getElementById('btnLabel');
  const statusEl   = document.getElementById('status');

  // ── Get or create a real Railway session on page load ──
  async function initSession() {
    const params = new URLSearchParams(window.location.search);
    const urlSession = params.get('session');
    if (urlSession) {
      // Session was passed in the URL by Vizi — use it directly
      sessionId = urlSession;
    } else {
      // No session in URL — create one now so Railway knows about it
      try {
        const res = await fetch(`${RAILWAY}/session-create`);
        const data = await res.json();
        sessionId = data.sessionId;
      } catch(e) {
        // Fallback — will show a server error on upload, but at least page loads
        sessionId = 'LOCAL-' + Math.random().toString(36).slice(2,8).toUpperCase();
        showStatus('err', 'Could not connect to Vizi server — check your connection');
      }
    }
  }

  initSession();

  // ── File handling ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f) {
    selectedFile = f;
    fileName.textContent = f.name;
    fileChosen.classList.add('show');
    sync();
  }
  fileClear.addEventListener('click', () => {
    selectedFile = null; fileInput.value = '';
    fileChosen.classList.remove('show'); sync();
  });

  // ── Text toggle ──
  textToggle.addEventListener('click', () => {
    textMode = !textMode;
    textWrap.classList.toggle('show', textMode);
    textToggle.textContent = textMode ? 'Hide text input ▴' : 'Or type / paste chords instead ▾';
    sync();
  });
  chordsText.addEventListener('input', sync);

  function sync() {
    const ready = selectedFile || (textMode && chordsText.value.trim().length > 0);
    submitBtn.disabled = !ready;
    btnLabel.textContent = ready ? 'Send to Vizi 🎸' : 'Choose a file or paste chords first';
  }

  function showStatus(type, msg) {
    statusEl.className = 'status show ' + type;
    statusEl.textContent = msg;
  }

  // ── Upload ──
  submitBtn.addEventListener('click', async () => {
    if (!sessionId) {
      showStatus('err', 'No session — reload the page and try again');
      return;
    }
    showStatus('loading', 'Sending to Vizi…');
    submitBtn.disabled = true;
    btnLabel.innerHTML = '<span class="spinner"></span> Sending…';

    try {
      const fd = new FormData();
      fd.append('session', sessionId);
      if (selectedFile) {
        fd.append('file', selectedFile);
      } else {
        fd.append('text', chordsText.value.trim());
      }

      const res = await fetch(`${RAILWAY}/song-upload`, { method: 'POST', body: fd });

      if (res.ok) {
        showStatus('ok', '✓ Song sheet received! Go back to Vizi and ask about any chord.');
        btnLabel.textContent = '✓ Sent to Vizi!';
      } else {
        const txt = await res.text();
        showStatus('err', `Upload failed (${res.status}) — ${txt}`);
        submitBtn.disabled = false;
        btnLabel.textContent = 'Send to Vizi 🎸';
      }
    } catch(e) {
      showStatus('err', 'Could not reach Vizi — check your connection');
      submitBtn.disabled = false;
      btnLabel.textContent = 'Send to Vizi 🎸';
    }
  });
</script>
</body>
</html>
