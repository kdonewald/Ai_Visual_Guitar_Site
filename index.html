<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ai Visual Guitar — Learn Guitar With Vizi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d2e; --surface2:#22263a;
    --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.06);
    --red:#e05540; --red-dark:#c44432; --blue:#4f8ef7;
    --gold:#e8a020; --teal:#2dd4bf; --green:#3dba72;
    --vizi:#3dba72; --vizi-dark:#2e9658;
    --text:#f0ede8; --text-mid:#a89f94; --text-dim:#6b6560;
    --white:#ffffff; --shadow:rgba(0,0,0,0.35); --shadow-lg:rgba(0,0,0,0.55);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:400;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding-bottom:5rem;
  }

  /* ── nav ── */
  nav{
    width:100%; position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:.75rem 1.5rem; background:rgba(15,17,23,0.96);
    backdrop-filter:blur(12px); border-bottom:1.5px solid var(--border);
  }
  .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;color:var(--text)}
  .nav-links{display:flex;gap:.4rem;align-items:center}
  .nav-link{
    font-size:.86rem;font-weight:500;color:var(--text-mid);text-decoration:none;
    padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);transition:all .2s;
  }
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}
  .nav-link.active{border-color:var(--red);color:var(--red);background:rgba(224,85,64,0.10)}

  /* ── vizi avatar ── */
  .stage-wrap{position:relative;margin-top:1.75rem;margin-bottom:1rem}
  .stage{
    position:relative;width:200px;height:200px;border-radius:50%;overflow:hidden;
    border:3px solid var(--border);background:#0a0a0a;
    box-shadow:0 10px 30px var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .stage img,.stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stage img{object-position:center top}
  .stage video{object-position:center 12%;opacity:0;transition:opacity .3s ease}
  .stage.talking video{opacity:1}
  .stage-wrap .ring{position:absolute;inset:-4px;border-radius:50%;border:3px solid var(--blue);
    opacity:0;pointer-events:none}
  .stage-wrap.listening .ring{animation:ring 1.15s ease-out infinite}
  @keyframes ring{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.28);opacity:0}}

  /* ── talk button ── */
  .talk{
    width:130px;height:130px;border-radius:50%;
    background:var(--red);color:var(--white);border:none;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
    cursor:pointer;box-shadow:0 8px 24px rgba(224,85,64,0.38);
    transition:transform .12s,background .2s;
    display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
    touch-action:none;user-select:none;-webkit-user-select:none;
    margin-bottom:.75rem;
  }
  .talk:active{background:var(--red-dark)}
  .talk.listening{background:var(--blue);transform:scale(0.96)}
  .talk.thinking{background:var(--gold)}
  .talk.intro{background:var(--blue);animation:intro-pulse 1.2s ease-in-out infinite}
  @keyframes intro-pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,142,247,0.5)}60%{box-shadow:0 0 0 18px rgba(79,142,247,0)}}

  .status{
    font-family:'DM Mono',monospace;font-size:.87rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--text-mid);min-height:1.1em;font-weight:600;
    margin-bottom:1rem;text-align:center;
  }

  /* ── welcome button ── */
  .welcome-btn{
    background:var(--vizi);color:white;
    border:none;border-radius:12px;
    padding:.85rem 2rem;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
    cursor:pointer;transition:all .18s;
    margin-bottom:.75rem;
    box-shadow:0 4px 16px rgba(61,186,114,0.30);
    display:flex;align-items:center;gap:.6rem;
  }
  .welcome-btn:hover{background:var(--vizi-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,186,114,0.40);}
  .welcome-btn.active{background:var(--vizi-dark);}
  .welcome-btn .wb-icon{font-size:1.1rem;}

  /* ── welcome video ── */
  .welcome-wrap{
    display:none;
    position:relative;
    width:280px;margin:.5rem auto;
    animation:fade-up .25s ease both;
  }
  .welcome-wrap.show{display:block;}
  .welcome-video-box{
    position:relative;border-radius:12px;overflow:hidden;
    background:#0a0a0a;box-shadow:0 6px 18px var(--shadow-lg);
  }
  .welcome-video-box iframe{width:100%;aspect-ratio:9/16;border:none;display:block;}
  .welcome-close{
    position:absolute;top:6px;right:6px;z-index:10;
    width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,0.7);border:1px solid var(--border);color:var(--text-mid);
    font-size:.85rem;cursor:pointer;display:flex;
    align-items:center;justify-content:center;
    transition:background .15s;
  }
  .welcome-close:hover{background:var(--red);color:white;}

  /* ── interactive fretboard ── */
  .fretboard-section{
    width:100%;max-width:960px;padding:0 1.25rem 1rem;
    margin-top:1.2rem;
  }
  .fretboard-label{
    font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--text-mid);text-align:center;margin-bottom:.65rem;font-weight:600;font-size:.80rem;letter-spacing:.12em;
  }
  .fretboard{
    background:linear-gradient(180deg,#2a1f14,#1a1208);
    border-radius:14px;padding:1.4rem 1rem 1.2rem;
    box-shadow:0 12px 36px var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,0.06);
    overflow-x:auto;border:1px solid rgba(255,255,255,0.06);
  }
  .frets-row{display:flex;gap:.45rem;position:relative;min-width:680px}
  .fret-stage{
    flex:1;min-width:72px;
    background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);
    border-radius:8px;padding:.65rem .4rem .6rem;text-align:center;
    cursor:pointer;transition:all .18s;
  }
  .fret-stage:hover{background:rgba(255,255,255,0.09);transform:translateY(-2px);border-color:rgba(255,255,255,0.18)}
  .fret-stage.active{
    background:rgba(232,160,32,0.16);border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold),0 0 18px rgba(232,160,32,0.30);
  }
  .fret-num{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--gold);margin-bottom:.3rem;letter-spacing:.06em;font-weight:800}
  .fret-led{width:9px;height:9px;border-radius:50%;margin:0 auto .38rem;background:rgba(255,255,255,0.12);transition:all .2s}
  .fret-stage.active .fret-led{background:var(--gold);box-shadow:0 0 10px var(--gold)}
  .fret-stage.song-stage .fret-led{background:var(--teal);box-shadow:0 0 8px var(--teal)}
  .fret-stage.song-stage{border-color:rgba(45,212,191,0.30)}
  .fret-stage.song-stage .fret-label{color:var(--teal)}
  .fret-label{font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;color:#ffffff;line-height:1.25}
  .fret-stage.active .fret-label{color:#fff}

  /* response panels */
  .panels{width:100%;max-width:500px;padding:0 1.25rem;display:flex;flex-direction:column;gap:.7rem;margin-top:.5rem}
  .panel{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
         padding:.85rem 1.1rem;opacity:0;transform:translateY(8px);transition:all .3s}
  .panel.show{opacity:1;transform:none}
  .panel .label{font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.14em;
                text-transform:uppercase;color:var(--text-mid);margin-bottom:.3rem}
  .panel.you{border-left:3px solid var(--blue)}
  .panel.vizi-p{border-left:3px solid var(--red)}
  .panel .body{font-size:.95rem;line-height:1.55;color:var(--text);font-weight:400}

  @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
    <div class="logo-name">Visual Guitar</div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Home</a>
  </div>
</nav>

<!-- Interactive fretboard — top of page -->
<div class="fretboard-section">
  <div class="fretboard-label">Tap a stage to begin</div>
  <div class="fretboard">
    <div class="frets-row" id="fretsRow"></div>
  </div>
</div>

<!-- Vizi avatar -->
<div class="stage-wrap" id="stageWrap">
  <div class="stage" id="stage">
    <img id="viziStill" src="ViziWhiteBack.png?v=2" alt="Vizi" />
    <video id="viziVid" src="VIZI%20MUTETALK.mp4" muted loop playsinline preload="auto"></video>
    <video id="stageIntroVid" playsinline preload="none"
      style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;border-radius:50%;"></video>
  </div>
  <div class="ring"></div>
</div>

<!-- Talk button -->
<button class="talk" id="talkBtn">Hold<br>to Talk</button>
<div class="status" id="status">Ready</div>

<!-- Welcome video button + window -->
<button class="welcome-btn" id="welcomeBtn"><span class="wb-icon">▶</span> Watch Welcome Video</button>

<div class="welcome-wrap" id="welcomeWrap">
  <div class="welcome-video-box">
    <button class="welcome-close" id="welcomeClose" title="Close video">✕</button>
    <iframe id="welcomeIframe"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</div>

<!-- Response panels -->
<div class="panels">
  <div class="panel you"    id="pYou"><div class="label">You said</div><div class="body" id="bYou"></div></div>
  <div class="panel vizi-p" id="pVizi"><div class="label">Vizi</div><div class="body" id="bVizi"></div></div>
</div>

<!-- Floating metronome widget — loaded last so DOM is ready -->
<script src="metronome-widget.js?v=1782766283"></script>

<script>
  const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';
  const TARGET_RATE = 16000;

  // ── Fretboard stages ──
  const STAGES = [
    { id:'tuning',       num:'01', label:'Tuning & Setup',       song:false },
    { id:'warmup',       num:'02', label:'Warmup with Scales',   song:false },
    { id:'chord-theory', num:'03', label:'How Chords Are Built', song:false },
    { id:'chords',       num:'04', label:'Chords',               song:false },
    { id:'strumming',    num:'05', label:'Strumming Patterns',   song:false },
    { id:'soloing',      num:'06', label:'Soloing',     song:false },
    { id:'song',         num:'07', label:'Play a Song',          song:true  },
    { id:'tab',          num:'08', label:'Read & Play Tab',      song:false },
  ];

  const fretsRow = document.getElementById('fretsRow');
  STAGES.forEach(s => {
    const el = document.createElement('div');
    el.className = 'fret-stage' + (s.song ? ' song-stage' : '');
    el.innerHTML = `<div class="fret-num" style="color:var(--gold);font-weight:800">${s.num}</div><div class="fret-led"></div><div class="fret-label">${s.label}</div>`;
    el.addEventListener('click', () => {
      if (s.song) { window.location.href = 'songs.html'; return; }
      window.location.href = `lessons.html#${s.id}`;
    });
    fretsRow.appendChild(el);
  });

  // ── Vizi voice loop ──
  const btn       = document.getElementById('talkBtn');
  const statusEl  = document.getElementById('status');
  const stageWrap = document.getElementById('stageWrap');
  const stage     = document.getElementById('stage');
  const viziVid   = document.getElementById('viziVid');

  let pendingIntroBlob = null;
  let audioCtx, stream, source, processor, sink;
  let micReady = false, recording = false;
  let chunks = [], preroll = [];
  const PREROLL_FRAMES = 6;

  function setStatus(t){ statusEl.textContent = t; }
  function setBtn(cls){ btn.className = 'talk' + (cls ? ' '+cls : ''); }
  function setListening(on){ stageWrap.classList.toggle('listening', on); }
  function showTalking(){ stage.classList.add('talking'); try{ viziVid.currentTime=0; viziVid.play(); }catch(e){} }
  function showIdle(){ stage.classList.remove('talking'); try{ viziVid.pause(); }catch(e){} }
  function showPanel(id, bodyId, text){
    document.getElementById(bodyId).textContent = text;
    document.getElementById(id).classList.add('show');
  }
  function dec(v){ try{ return v ? decodeURIComponent(v) : ''; }catch(_){ return v||''; } }

  async function ensureAudioCtx(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
  }
  async function ensureMic(){
    if (micReady) return;
    await ensureAudioCtx();
    stream = await navigator.mediaDevices.getUserMedia({ audio:{ channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096,1,1);
    sink = audioCtx.createGain(); sink.gain.value=0;
    processor.onaudioprocess = e => {
      const frame = new Float32Array(e.inputBuffer.getChannelData(0));
      preroll.push(frame); if(preroll.length>PREROLL_FRAMES) preroll.shift();
      if(recording) chunks.push(frame);
    };
    source.connect(processor); processor.connect(sink); sink.connect(audioCtx.destination);
    micReady = true;
  }
  async function startCapture(){ await ensureMic(); chunks=preroll.slice(); recording=true; }
  function stopCapture(){
    if(!recording) return null; recording=false;
    const len=chunks.reduce((a,c)=>a+c.length,0); if(!len) return null;
    const merged=new Float32Array(len); let off=0;
    for(const c of chunks){ merged.set(c,off); off+=c.length; }
    return bytesToBase64(floatToPCM16(downsample(merged, audioCtx.sampleRate, TARGET_RATE)));
  }
  function downsample(buf,srcRate,dstRate){
    if(dstRate>=srcRate) return buf;
    const ratio=srcRate/dstRate, outLen=Math.round(buf.length/ratio);
    const out=new Float32Array(outLen); let pos=0;
    for(let i=0;i<outLen;i++){
      const next=Math.round((i+1)*ratio); let sum=0,cnt=0;
      for(let j=pos;j<next&&j<buf.length;j++){sum+=buf[j];cnt++;}
      out[i]=cnt?sum/cnt:0; pos=next;
    }
    return out;
  }
  function floatToPCM16(f32){
    const dv=new DataView(new ArrayBuffer(f32.length*2));
    for(let i=0;i<f32.length;i++){
      let s=Math.max(-1,Math.min(1,f32[i]));
      dv.setInt16(i*2,s<0?s*0x8000:s*0x7FFF,true);
    }
    return new Uint8Array(dv.buffer);
  }
  function bytesToBase64(bytes){
    let bin=''; const chunk=0x8000;
    for(let i=0;i<bytes.length;i+=chunk)
      bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
    return btoa(bin);
  }
  async function playBlob(blob){
    try{
      await ensureAudioCtx();
      const arr=await blob.arrayBuffer();
      const buf=await audioCtx.decodeAudioData(arr);
      const src=audioCtx.createBufferSource();
      src.buffer=buf; src.connect(audioCtx.destination);
      showTalking(); src.start();
      await new Promise(r=>{src.onended=r;});
    }catch(e){}
    finally{ showIdle(); }
  }
  async function sendToVizi(b64){
    setBtn('thinking'); setStatus('Vizi is thinking…');
    try{
      const res=await fetch(RAILWAY_URL+'/stt-claude-tts',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({audio:b64,sampleRate:TARGET_RATE,mode:'talk'})
      });
      const ct=(res.headers.get('content-type')||'');
      if(ct.includes('application/json')){
        const j=await res.json();
        setBtn(''); setStatus(j.empty?"Didn't catch that — try again":'Error: '+(j.error||'unknown'));
        return;
      }
      const transcript=dec(res.headers.get('X-Vizi-Transcript'));
      const text=dec(res.headers.get('X-Vizi-Text'));
      const commands=dec(res.headers.get('X-Vizi-Commands'));
      if(transcript) showPanel('pYou','bYou',transcript);
      if(text)       showPanel('pVizi','bVizi',text);
      // Apply METRONOME command to the floating widget
      if(commands){
        const m = commands.match(/METRONOME:(\d+)/i);
        if(m && window.viziMetro) window.viziMetro.setBpm(parseInt(m[1],10));
      }
      const blob=await res.blob();
      setBtn(''); setStatus('');
      await playBlob(blob);
      setStatus('Ready');
    }catch(e){ setBtn(''); setStatus('Could not reach Vizi — check connection'); }
  }

  async function press(e){
    e.preventDefault();
    if(pendingIntroBlob){
      const blob=pendingIntroBlob; pendingIntroBlob=null;
      btn.innerHTML='Hold<br>to Talk'; setBtn('');
      await playBlob(blob); setStatus('Ready'); return;
    }
    if(recording) return;
    setBtn('listening'); setStatus('Starting mic…');
    try{ await startCapture(); setListening(true); setStatus('Listening…'); }
    catch(err){ setBtn(''); setListening(false); setStatus('Microphone blocked — allow mic access'); }
  }
  function release(e){
    e.preventDefault();
    if(pendingIntroBlob) return;
    if(!recording) return;
    setListening(false);
    const b64=stopCapture();
    if(!b64){ setBtn(''); setStatus('Nothing recorded — hold a moment longer'); return; }
    sendToVizi(b64);
  }
  btn.addEventListener('pointerdown',press);
  btn.addEventListener('pointerup',release);
  btn.addEventListener('pointercancel',release);
  btn.addEventListener('pointerleave',e=>{ if(recording&&!pendingIntroBlob) release(e); });

  // Welcome video
  const welcomeBtn   = document.getElementById('welcomeBtn');
  const welcomeWrap  = document.getElementById('welcomeWrap');
  const welcomeIframe = document.getElementById('welcomeIframe');
  const welcomeClose  = document.getElementById('welcomeClose');
  const WELCOME_URL   = 'https://www.youtube.com/embed/A9n5GdYfTZw?rel=0&modestbranding=1&autoplay=1';

  function openWelcome(){
    welcomeIframe.src = WELCOME_URL;
    welcomeWrap.classList.add('show');
    welcomeBtn.classList.add('active');
    welcomeWrap.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function closeWelcome(){
    welcomeIframe.src='';
    welcomeWrap.classList.remove('show');
    welcomeBtn.classList.remove('active');
  }
  welcomeBtn.addEventListener('click',()=>{
    welcomeWrap.classList.contains('show') ? closeWelcome() : openWelcome();
  });
  welcomeClose.addEventListener('click', closeWelcome);
</script>
</body>
</html>
