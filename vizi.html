<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vizi — Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d2e; --surface2:#22263a;
    --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.06);
    --red:#e05540; --red-dark:#c44432; --blue:#4f8ef7;
    --gold:#e8a020; --teal:#2dd4bf; --green:#3dba72;
    --text:#f0ede8; --text-mid:#a89f94; --text-dim:#6b6560;
    --white:#ffffff; --shadow:rgba(0,0,0,0.35); --shadow-lg:rgba(0,0,0,0.55);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:400;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:0 1.25rem 5rem;
  }

  /* ── nav ── */
  .site-nav{
    width:100%; position:sticky; top:0; z-index:60;
    display:flex; align-items:center; justify-content:space-between;
    padding:.7rem 1.25rem; background:rgba(15,17,23,0.96);
    backdrop-filter:blur(12px); border-bottom:1.5px solid var(--border);
    margin-bottom:.75rem;
  }
  .site-nav .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;color:var(--text)}
  .nav-links{display:flex;gap:.4rem;align-items:center}
  .nav-link{
    font-size:.85rem;font-weight:500;color:var(--text-mid);text-decoration:none;
    padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);
    transition:all .2s;white-space:nowrap;
  }
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}
  .nav-link.active{border-color:var(--red);color:var(--red);background:rgba(224,85,64,0.10)}

  .tag{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--text-mid);text-align:center;margin:.25rem 0 1.5rem;
  }

  /* ── vizi avatar ── */
  .stage-wrap{position:relative;margin-bottom:1.25rem}
  .stage{
    position:relative;width:220px;height:220px;border-radius:50%;overflow:hidden;
    border:3px solid var(--border);background:#0a0a0a;
    box-shadow:0 10px 30px var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .stage img,.stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stage img{object-position:center top}
  .stage video{object-position:center 12%;opacity:0;transition:opacity .3s ease}
  .stage.talking video{opacity:1}
  .stage-wrap .ring{position:absolute;inset:-4px;border-radius:50%;border:3px solid var(--blue);
    opacity:0;pointer-events:none}
  .stage-wrap.listening .ring{animation:ring 1.15s ease-out infinite}
  @keyframes ring{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.28);opacity:0}}

  /* ── talk button ── */
  .talk{
    width:140px;height:140px;border-radius:50%;
    background:var(--red);color:#fff;border:none;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
    cursor:pointer;box-shadow:0 8px 24px rgba(224,85,64,0.38);
    transition:transform .12s, background .2s, box-shadow .2s;
    display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    margin-bottom:1rem;
  }
  .talk:active{background:var(--red-dark)}
  .talk.listening{background:var(--blue);transform:scale(0.96)}
  .talk.thinking{background:var(--gold)}
  .talk.intro{background:var(--blue);animation:intro-pulse 1.2s ease-in-out infinite}
  @keyframes intro-pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,142,247,0.5)}60%{box-shadow:0 0 0 18px rgba(79,142,247,0)}}

  .status{
    font-family:'DM Mono',monospace;font-size:.82rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--text-mid);min-height:1.2em;margin-bottom:1rem;text-align:center;font-weight:600;
  }

  /* ── upload btn ── */
  .upload-btn{
    display:flex;align-items:center;justify-content:center;gap:.5rem;
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:10px;padding:.65rem 1.4rem;
    font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .2s;
    margin-bottom:1.25rem;text-decoration:none;
    box-shadow:0 2px 8px var(--shadow);
  }
  .upload-btn:hover{border-color:var(--blue);color:var(--blue)}
  .upload-btn.waiting{border-color:var(--gold);color:var(--gold);animation:pulse-btn 1.4s ease-in-out infinite}
  @keyframes pulse-btn{0%,100%{opacity:1}50%{opacity:.6}}

  /* ── song banner ── */
  .song-banner{
    display:none;width:100%;max-width:440px;
    background:rgba(79,142,247,0.10);border:1.5px solid rgba(79,142,247,0.25);
    border-radius:10px;padding:.7rem 1rem;margin-bottom:1.1rem;
    font-family:'DM Mono',monospace;font-size:.83rem;letter-spacing:.04em;
    color:var(--blue);text-align:center;cursor:pointer;transition:background .2s;
  }
  .song-banner.show{display:block}
  .song-banner:hover{background:rgba(79,142,247,0.16)}

  /* ── panels ── */
  .panels{width:100%;max-width:440px;display:flex;flex-direction:column;gap:.85rem}
  .panel{
    background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
    padding:.9rem 1.1rem;opacity:0;transform:translateY(8px);transition:all .3s;
  }
  .panel.show{opacity:1;transform:none}
  .panel .label{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--text-mid);margin-bottom:.35rem;
  }
  .panel.you{border-left:3px solid var(--blue)}
  .panel.vizi{border-left:3px solid var(--red)}
  .panel.cmd{border-left:3px solid var(--gold);background:rgba(232,160,32,0.06)}
  .panel .body{font-size:.95rem;line-height:1.55;color:var(--text);font-weight:400}
  .panel.cmd .body{font-family:'DM Mono',monospace;font-size:.86rem;color:var(--text-mid);word-break:break-word}

  /* ── song sheet floating panel ── */
  .sheet-float{
    position:fixed; z-index:999;
    top:60px; right:16px;
    width:min(440px, calc(100vw - 32px));
    height:min(580px, calc(100vh - 80px));
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:14px;
    box-shadow:0 12px 40px var(--shadow-lg);
    display:none; flex-direction:column;
    overflow:hidden;
    min-width:200px; min-height:160px;
  }
  .sheet-float.show{display:flex}
  .sheet-resize-handle{
    position:absolute; right:0; bottom:0;
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:1.1rem;
    cursor:nwse-resize; touch-action:none;
    border-radius:8px 0 14px 0;
    background:rgba(0,0,0,0.15);
    transition:color .15s, background .15s;
    z-index:20;
  }
  .sheet-resize-handle:hover, .sheet-resize-handle:active{
    color:var(--blue); background:rgba(79,142,247,0.18);
  }
  .sheet-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.55rem .75rem;background:var(--surface2);
    border-bottom:1.5px solid var(--border);
    cursor:grab; flex-shrink:0; user-select:none; gap:.5rem;
    touch-action:none;
  }
  .sheet-head:active{cursor:grabbing}
  .sheet-title{
    font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-mid);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;
  }
  .sheet-controls{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
  .sheet-btn{
    background:var(--surface);border:1px solid var(--border);cursor:pointer;
    font-size:.8rem;font-weight:600;color:var(--text-mid);
    width:22px;height:22px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;line-height:1;
  }
  .sheet-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
  .sheet-close{
    background:none;border:none;cursor:pointer;font-size:1rem;
    color:var(--text-dim);padding:0 .15rem;line-height:1;transition:color .2s;
  }
  .sheet-close:hover{color:var(--red)}
  .sheet-zoom-val{
    font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text-dim);
    min-width:2.8rem;text-align:center;
  }
  .sheet-page-row{
    display:flex;align-items:center;justify-content:center;gap:.6rem;
    padding:.4rem .75rem;background:var(--surface2);
    border-bottom:1.5px solid var(--border);flex-shrink:0;
  }
  .sheet-page-val{
    font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text-mid);
    min-width:7rem;text-align:center;
  }
  .sheet-body{flex:1;overflow:auto;position:relative;}
  .sheet-content{transform-origin:top left;transition:transform .15s;width:100%;}
  .sheet-body iframe{width:100%;height:100%;border:none;display:block;min-height:400px}
  .sheet-body img{width:100%;height:auto;display:block}
  .sheet-body pre{
    padding:1rem;font-family:'DM Mono',monospace;font-size:.85rem;
    line-height:1.6;white-space:pre-wrap;color:var(--text);
  }

  .sheet-show-btn{
    display:none;align-items:center;gap:.4rem;
    background:var(--surface);border:1.5px solid var(--blue);
    border-radius:8px;padding:.45rem .9rem;
    font-family:'DM Mono',monospace;font-size:.86rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--blue);cursor:pointer;transition:all .2s;margin-bottom:.75rem;
  }
  .sheet-show-btn.show{display:flex}
  .sheet-show-btn:hover{background:var(--blue);color:white}
</style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
      <div class="logo-name">Visual Guitar</div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
    </div>
  </nav>
  <div class="tag">Hold to talk · Release to send</div>

  <div class="stage-wrap" id="stageWrap">
    <div class="stage" id="stage">
      <img id="viziStill" src="ViziWhiteBack.png?v=2" alt="Vizi" />
      <video id="viziVid" src="VIZI%20MUTETALK.mp4" muted loop playsinline preload="auto"></video>
    </div>
    <div class="ring"></div>
  </div>

  <button class="talk" id="talkBtn">Hold<br>to Talk</button>
  <div class="status" id="status">Ready</div>

  <button class="upload-btn" id="uploadBtn" style="display:none">🎵 Upload a Song</button>
  <div class="song-banner" id="songBanner"></div>

  <button class="sheet-show-btn" id="sheetShowBtn">📄 Show Song Sheet</button>

  <div class="panels">
    <div class="panel you"  id="pYou"><div class="label">You said</div><div class="body" id="bYou"></div></div>
    <div class="panel vizi" id="pVizi"><div class="label">Vizi</div><div class="body" id="bVizi"></div></div>
    <div class="panel cmd"  id="pCmd"><div class="label">Fretboard commands</div><div class="body" id="bCmd"></div></div>
  </div>

  <!-- Floating song sheet panel -->
  <div class="sheet-float" id="sheetWrap">
    <div class="sheet-head" id="sheetDragHandle">
      <span class="sheet-title" id="sheetTitle">Song Sheet</span>
      <div class="sheet-controls">
        <button class="sheet-btn" id="zoomOut">−</button>
        <span class="sheet-zoom-val" id="zoomVal">100%</span>
        <button class="sheet-btn" id="zoomIn">+</button>
        <button class="sheet-btn" id="zoomReset" title="Reset zoom">⟳</button>
        <button class="sheet-close" id="sheetClose">✕</button>
      </div>
    </div>
    <div class="sheet-page-row" id="sheetPageRow" style="display:none">
      <button class="sheet-btn" id="sheetPrevPage">◀</button>
      <span class="sheet-page-val" id="sheetPageVal">Page 1 of 1</span>
      <button class="sheet-btn" id="sheetNextPage">▶</button>
    </div>
    <div class="sheet-body" id="sheetBody">
      <div class="sheet-content" id="sheetContent"></div>
    </div>
    <div class="sheet-resize-handle" id="sheetResizeHandle">⤡</div>
  </div>

<!-- Shared floating metronome widget -->


<script>
  const RAILWAY_URL  = 'https://vizi-tts-proxy-production.up.railway.app';
  const TARGET_RATE  = 16000;
  const POLL_SONG_MS = 2000;

  const btn        = document.getElementById('talkBtn');
  const statusEl   = document.getElementById('status');
  const stageWrap  = document.getElementById('stageWrap');
  const stage      = document.getElementById('stage');
  const viziVid    = document.getElementById('viziVid');
  const uploadBtn  = document.getElementById('uploadBtn');
  const songBanner = document.getElementById('songBanner');

  let currentMode   = 'talk';
  let songSessionId = null;
  let songPollTimer = null;
  let songLoaded    = false;

  let pendingIntroBlob = null;
  let pendingIntroText = null;
  let pendingIntroCmd  = null;

  let audioCtx, stream, source, processor, sink;
  let micReady = false, recording = false;
  let chunks = [], preroll = [];
  const PREROLL_FRAMES = 6;

  function setStatus(t){ statusEl.textContent = t; }
  function setBtn(cls){ btn.className = 'talk' + (cls ? ' ' + cls : ''); }
  function setListening(on){ stageWrap.classList.toggle('listening', on); }
  function showTalking(){ stage.classList.add('talking'); try{ viziVid.currentTime=0; viziVid.play(); }catch(e){} }
  function showIdle(){ stage.classList.remove('talking'); try{ viziVid.pause(); }catch(e){} }
  function showPanel(id, bodyId, text){
    document.getElementById(bodyId).textContent = text;
    document.getElementById(id).classList.add('show');
  }

  // Route METRONOME:BPM commands to the shared floating widget
  function applyMetronomeCommand(commandsStr){
    if (!commandsStr) return;
    const m = commandsStr.match(/METRONOME:(\d+)/i);
    if (m && window.viziMetro) {
      window.viziMetro.setBpm(parseInt(m[1], 10));
    }
  }

  async function ensureAudioCtx(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
  }

  async function ensureMic(){
    if (micReady) return;
    await ensureAudioCtx();
    stream    = await navigator.mediaDevices.getUserMedia({
      audio:{ channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true }
    });
    source    = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    sink      = audioCtx.createGain(); sink.gain.value = 0;
    processor.onaudioprocess = e => {
      const frame = new Float32Array(e.inputBuffer.getChannelData(0));
      preroll.push(frame);
      if (preroll.length > PREROLL_FRAMES) preroll.shift();
      if (recording) chunks.push(frame);
    };
    source.connect(processor); processor.connect(sink); sink.connect(audioCtx.destination);
    micReady = true;
  }

  async function startCapture(){ await ensureMic(); chunks = preroll.slice(); recording = true; }

  function stopCapture(){
    if (!recording) return null;
    recording = false;
    const len = chunks.reduce((a,c)=>a+c.length, 0);
    if (len === 0) return null;
    const merged = new Float32Array(len);
    let off = 0; for (const c of chunks){ merged.set(c, off); off += c.length; }
    return bytesToBase64(floatToPCM16(downsample(merged, audioCtx.sampleRate, TARGET_RATE)));
  }

  function downsample(buf, srcRate, dstRate){
    if (dstRate >= srcRate) return buf;
    const ratio = srcRate / dstRate, outLen = Math.round(buf.length / ratio);
    const out = new Float32Array(outLen); let pos = 0;
    for (let i=0; i<outLen; i++){
      const next = Math.round((i+1)*ratio); let sum=0, cnt=0;
      for (let j=pos; j<next && j<buf.length; j++){ sum+=buf[j]; cnt++; }
      out[i] = cnt ? sum/cnt : 0; pos = next;
    }
    return out;
  }
  function floatToPCM16(f32){
    const dv = new DataView(new ArrayBuffer(f32.length*2));
    for (let i=0; i<f32.length; i++){
      let s=Math.max(-1,Math.min(1,f32[i]));
      dv.setInt16(i*2, s<0?s*0x8000:s*0x7FFF, true);
    }
    return new Uint8Array(dv.buffer);
  }
  function bytesToBase64(bytes){
    let bin=''; const chunk=0x8000;
    for (let i=0; i<bytes.length; i+=chunk)
      bin += String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
    return btoa(bin);
  }
  function dec(v){ try { return v ? decodeURIComponent(v) : ''; } catch(_){ return v||''; } }

  async function playBlob(blob){
    try {
      await ensureAudioCtx();
      const arr = await blob.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(arr);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.connect(audioCtx.destination);
      showTalking(); src.start();
      await new Promise(r => { src.onended = r; });
    } catch(e){}
    finally { showIdle(); }
  }

  async function sendToVizi(b64){
    setBtn('thinking'); btn.innerHTML = 'Vizi is<br>Thinking'; setStatus('Vizi is thinking…');
    try {
      const res = await fetch(RAILWAY_URL + '/stt-claude-tts', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ audio:b64, sampleRate:TARGET_RATE, mode:currentMode })
      });
      const ct = (res.headers.get('content-type') || '');
      if (ct.includes('application/json')){
        const j = await res.json();
        setBtn(''); btn.innerHTML = 'Hold<br>to Talk'; setStatus(j.empty ? "Didn't catch that — try again" : 'Error: ' + (j.error||'unknown'));
        return;
      }
      const transcript = dec(res.headers.get('X-Vizi-Transcript'));
      const text       = dec(res.headers.get('X-Vizi-Text'));
      const commands   = dec(res.headers.get('X-Vizi-Commands'));
      if (transcript) showPanel('pYou','bYou', transcript);
      if (text)       showPanel('pVizi','bVizi', text);
      if (commands)   { showPanel('pCmd','bCmd', commands); applyMetronomeCommand(commands); }
      const blob = await res.blob();
      setBtn(''); btn.innerHTML = 'Hold<br>to Talk'; setStatus('');
      await playBlob(blob);
      if (currentMode === 'song') currentMode = 'talk';
      if (!pendingIntroBlob) setStatus('Ready');
    } catch(e){ setBtn(''); btn.innerHTML = 'Hold<br>to Talk'; setStatus('Could not reach Vizi — check connection'); }
  }

  async function playPendingIntro(){
    if (!pendingIntroBlob) return;
    const blob = pendingIntroBlob;
    const text = pendingIntroText;
    const cmd  = pendingIntroCmd;
    pendingIntroBlob = null; pendingIntroText = null; pendingIntroCmd = null;
    setBtn('');
    if (text) showPanel('pVizi','bVizi', text);
    if (cmd)  { showPanel('pCmd','bCmd', cmd); applyMetronomeCommand(cmd); }
    setStatus('');
    await playBlob(blob);
    // If this tab was opened from the Soloing panel (window.open, not a same-tab
    // navigation), tell that tab Vizi's spoken intro is done so it can resume
    // any backing track it paused while she was talking.
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'vizi-intro-done' }, '*');
      }
    } catch(e){}
    currentMode = 'talk';
    setStatus('Ready');
  }

  // ── Song upload flow ──
  uploadBtn.addEventListener('click', async () => {
    if (songPollTimer) return;
    uploadBtn.textContent = '⏳ Creating session…';
    uploadBtn.disabled = true;
    try {
      const res  = await fetch(RAILWAY_URL + '/session-create');
      const data = await res.json();
      songSessionId = data.sessionId;
      sessionStorage.setItem('viziSongSession', songSessionId);
      window.location.href = `songs.html?session=${songSessionId}`;
    } catch(e){
      uploadBtn.textContent = '🎵 Upload a Song';
      uploadBtn.disabled = false;
      setStatus('Could not create session — check connection');
    }
  });

  function startSongPoll(){
    if (songPollTimer) clearInterval(songPollTimer);
    songPollTimer = setInterval(checkSongReady, POLL_SONG_MS);
  }

  async function checkSongReady(){
    if (!songSessionId) return;
    try {
      const res  = await fetch(`${RAILWAY_URL}/session-status/${songSessionId}`);
      const data = await res.json();

      if (data.status === 'ready' && !songLoaded){
        clearInterval(songPollTimer); songPollTimer = null; songLoaded = true;
        sessionStorage.removeItem('viziSongSession');

        const title = data.songTitle || 'song';
        songBanner.textContent = `🎵 "${title}" loaded`;
        const ub = document.getElementById('uploadBtn'); if (ub) ub.style.display = '';
        songBanner.classList.add('show');
        uploadBtn.className = 'upload-btn';
        uploadBtn.textContent = '🎵 Upload Another Song';
        uploadBtn.disabled = false;

        const promptRes  = await fetch(`${RAILWAY_URL}/session-prompt/${songSessionId}`);
        const promptData = await promptRes.json();

        if (promptData.ready && promptData.message){
          currentMode = 'song';
          const ttsRes = await fetch(RAILWAY_URL + '/claude-tts', {
            method:'POST', headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ message: promptData.message, mode: 'song' })
          });
          if (ttsRes.ok){
            const ct = ttsRes.headers.get('content-type') || '';
            if (!ct.includes('application/json')){
              pendingIntroText = dec(ttsRes.headers.get('X-Vizi-Text'));
              pendingIntroCmd  = dec(ttsRes.headers.get('X-Vizi-Commands'));
              pendingIntroBlob = await ttsRes.blob();
              setBtn('intro');
              btn.innerHTML = 'Tap to hear<br>Vizi intro';
              setStatus('Song ready — tap the button to hear Vizi');
              songBanner.textContent += ' — tap button to hear intro';
            }
          }
        }
      } else if (data.status === 'error'){
        clearInterval(songPollTimer); songPollTimer = null;
        uploadBtn.className = 'upload-btn';
        uploadBtn.textContent = '🎵 Upload a Song';
        uploadBtn.disabled = false;
        setStatus('Upload failed — try again');
      }
    } catch(e){ /* poll quietly */ }
  }

  // ── Talk button ──
  async function press(e){
    e.preventDefault();
    if (pendingIntroBlob){
      btn.innerHTML = 'Hold<br>to Talk';
      await playPendingIntro();
      return;
    }
    if (recording) return;
    setBtn('listening'); setStatus('Starting mic…');
    try {
      await startCapture();
      setListening(true); setStatus('Listening…');
    } catch(err){
      setBtn(''); setListening(false); setStatus('Microphone blocked — allow mic access');
    }
  }
  function release(e){
    e.preventDefault();
    if (pendingIntroBlob) return;
    if (!recording) return;
    setListening(false);
    const b64 = stopCapture();
    if (!b64){ setBtn(''); setStatus('Nothing recorded — hold a moment longer'); return; }
    sendToVizi(b64);
  }

  btn.addEventListener('pointerdown', press);
  btn.addEventListener('pointerup',   release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', e => { if (recording && !pendingIntroBlob) release(e); });

  // ── Song sheet floating panel ──
  const sheetWrap    = document.getElementById('sheetWrap');
  const sheetTitle   = document.getElementById('sheetTitle');
  const sheetContent = document.getElementById('sheetContent');
  const sheetClose   = document.getElementById('sheetClose');
  const sheetShowBtn = document.getElementById('sheetShowBtn');
  const dragHandle   = document.getElementById('sheetDragHandle');
  const zoomIn       = document.getElementById('zoomIn');
  const zoomOut      = document.getElementById('zoomOut');
  const zoomReset    = document.getElementById('zoomReset');
  const zoomValEl    = document.getElementById('zoomVal');

  let zoomLevel = 1.0;
  const ZOOM_STEP = 0.15, ZOOM_MIN = 0.4, ZOOM_MAX = 3.0;

  function applyZoom(){
    const iframe = sheetContent.querySelector('iframe');
    const img    = sheetContent.querySelector('img');
    const pre    = sheetContent.querySelector('pre');
    if (iframe){
      iframe.style.transform = `scale(${zoomLevel})`;
      iframe.style.transformOrigin = 'top left';
      iframe.style.width  = (100 / zoomLevel) + '%';
      iframe.style.height = (580 / zoomLevel) + 'px';
    } else if (img){
      img.style.width = (zoomLevel * 100) + '%';
    } else if (pre){
      pre.style.fontSize = (0.75 * zoomLevel) + 'rem';
    }
    zoomValEl.textContent = Math.round(zoomLevel * 100) + '%';
  }

  zoomIn.addEventListener('click',    e => { e.stopPropagation(); zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP); applyZoom(); });
  zoomOut.addEventListener('click',   e => { e.stopPropagation(); zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP); applyZoom(); });
  zoomReset.addEventListener('click', e => { e.stopPropagation(); zoomLevel = 1.0; applyZoom(); });

  let songPages = [];
  let songPageIdx = 0;

  function renderSongPage(){
    sheetContent.innerHTML = '';
    if (!songPages.length) return;
    const img = document.createElement('img');
    img.src = songPages[songPageIdx];
    img.alt = 'Song sheet page ' + (songPageIdx + 1);
    sheetContent.appendChild(img);
    sheetPageVal.textContent = 'Page ' + (songPageIdx + 1) + ' of ' + songPages.length;
    applyZoom();
  }

  function loadSongSheet(){
    const pagesJson = sessionStorage.getItem('viziSongPages');
    const dataUrl    = sessionStorage.getItem('viziSongFile');
    const name       = sessionStorage.getItem('viziSongName') || 'Song Sheet';
    const type       = sessionStorage.getItem('viziSongType') || '';
    if (!pagesJson && !dataUrl) return;

    sheetTitle.textContent = name;
    sheetContent.innerHTML = '';
    zoomLevel = 1.0;

    if (pagesJson){
      // Pre-converted PDF pages (or any multi-page image set) — no iframe needed
      try { songPages = JSON.parse(pagesJson); } catch(e){ songPages = []; }
      songPageIdx = 0;
      sheetPageRow.style.display = songPages.length > 1 ? 'flex' : 'none';
      renderSongPage();
    } else if (dataUrl.startsWith('text:')){
      songPages = [];
      sheetPageRow.style.display = 'none';
      const pre = document.createElement('pre');
      pre.textContent = dataUrl.slice(5);
      sheetContent.appendChild(pre);
      applyZoom();
    } else if (type.startsWith('image/')){
      songPages = [];
      sheetPageRow.style.display = 'none';
      const img = document.createElement('img');
      img.src = dataUrl; img.alt = name;
      sheetContent.appendChild(img);
      applyZoom();
    } else {
      // Fallback when PDF→image conversion failed — render the PDF directly
      // inside the panel using <object>, which mobile browsers handle better
      // than an iframe with a data: URI. The panel itself stays draggable
      // and resizable regardless of how this content renders.
      songPages = [];
      sheetPageRow.style.display = 'none';

      const obj = document.createElement('object');
      obj.data = dataUrl;
      obj.type = 'application/pdf';
      obj.style.width = '100%';
      obj.style.height = '100%';
      obj.style.minHeight = '500px';
      obj.style.border = 'none';

      // <object> shows its inner content only if the data itself fails to render
      const pdfErr = sessionStorage.getItem('viziSongPdfError') || '';
      const fallbackMsg = document.createElement('div');
      fallbackMsg.style.cssText = 'padding:2rem 1.25rem;text-align:center;color:var(--text-mid);font-family:DM Sans,sans-serif;';
      fallbackMsg.innerHTML = `
        <p style="margin-bottom:1rem;line-height:1.5;">This PDF can't be previewed on this device, but Vizi has already read it and knows the chords.</p>
        ${pdfErr ? `<p style="margin-bottom:1rem;font-family:DM Mono,monospace;font-size:.72rem;color:var(--red);word-break:break-word;">${pdfErr}</p>` : ''}
        <a href="${dataUrl}" download="${name}" style="display:inline-block;padding:.6rem 1.2rem;background:var(--blue);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">Download PDF</a>
      `;
      obj.appendChild(fallbackMsg);

      sheetContent.appendChild(obj);
      applyZoom();
    }

    // Content is ready, but don't auto-open the panel — student taps
    // "Show Song Sheet" if and when they want to see it.
    sheetShowBtn.classList.add('show');
  }

  const sheetPageRow  = document.getElementById('sheetPageRow');
  const sheetPageVal  = document.getElementById('sheetPageVal');
  const sheetPrevPage = document.getElementById('sheetPrevPage');
  const sheetNextPage = document.getElementById('sheetNextPage');
  sheetPrevPage.addEventListener('click', () => {
    if (songPageIdx > 0){ songPageIdx--; renderSongPage(); }
  });
  sheetNextPage.addEventListener('click', () => {
    if (songPageIdx < songPages.length - 1){ songPageIdx++; renderSongPage(); }
  });

  sheetClose.addEventListener('click', () => {
    sheetWrap.classList.remove('show');
    if (sessionStorage.getItem('viziSongPages') || sessionStorage.getItem('viziSongFile')) sheetShowBtn.classList.add('show');
  });
  sheetShowBtn.addEventListener('click', () => {
    sheetWrap.classList.add('show');
    sheetShowBtn.classList.remove('show');
  });

  let dragOffX=0, dragOffY=0, dragging=false;
  dragHandle.addEventListener('pointerdown', e => {
    const t = e.target;
    if (t===sheetClose||t===zoomIn||t===zoomOut||t===zoomReset) return;
    dragging=true;
    const r=sheetWrap.getBoundingClientRect();
    dragOffX=e.clientX-r.left; dragOffY=e.clientY-r.top; e.preventDefault();
  });
  document.addEventListener('pointermove', e => {
    if (!dragging) return;
    // Allow dragging well past the viewport edges (even mostly off-screen)
    // so the talk button underneath stays reachable. Keep a small sliver
    // on-screen so the panel is never fully lost.
    const margin = 40;
    const x = Math.max(-sheetWrap.offsetWidth + margin, Math.min(window.innerWidth - margin,  e.clientX-dragOffX));
    const y = Math.max(-sheetWrap.offsetHeight + margin, Math.min(window.innerHeight - margin, e.clientY-dragOffY));
    sheetWrap.style.left=x+'px'; sheetWrap.style.top=y+'px'; sheetWrap.style.right='auto';
  });
  document.addEventListener('pointerup',    ()=>{ dragging=false; });
  document.addEventListener('pointercancel',()=>{ dragging=false; });

  // ── Manual resize (touch-friendly, unlike native CSS resize) ──
  const resizeHandle = document.getElementById('sheetResizeHandle');
  let resizing=false, resizeStartX=0, resizeStartY=0, resizeStartW=0, resizeStartH=0;
  resizeHandle.addEventListener('pointerdown', e => {
    resizing = true;
    resizeStartX = e.clientX; resizeStartY = e.clientY;
    const r = sheetWrap.getBoundingClientRect();
    resizeStartW = r.width; resizeStartH = r.height;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('pointermove', e => {
    if (!resizing) return;
    const dw = e.clientX - resizeStartX;
    const dh = e.clientY - resizeStartY;
    const newW = Math.max(200, Math.min(window.innerWidth  - 20, resizeStartW + dw));
    const newH = Math.max(160, Math.min(window.innerHeight - 20, resizeStartH + dh));
    sheetWrap.style.width  = newW + 'px';
    sheetWrap.style.height = newH + 'px';
    e.preventDefault();
  });
  document.addEventListener('pointerup',     ()=>{ resizing=false; });
  document.addEventListener('pointercancel', ()=>{ resizing=false; });

  const storedSession = sessionStorage.getItem('viziSongSession');
  if (storedSession && !songLoaded){
    songSessionId = storedSession;
    uploadBtn.className = 'upload-btn waiting';
    uploadBtn.textContent = '⏳ Waiting for song upload…';
    setStatus('Checking for uploaded song…');
    startSongPoll();
  }

  // ── Tab Builder hand-off from lessons.html ──
  ;(async function checkTabMsg(){
    const msg = sessionStorage.getItem('viziTabMsg');
    if (!msg) return;
    sessionStorage.removeItem('viziTabMsg');

    setBtn('thinking');
    btn.innerHTML = 'Vizi is<br>preparing…';
    setStatus('Loading your tab exercise…');

    songBanner.textContent = '📐 Tab Exercise — tap button to hear Vizi';
    songBanner.classList.add('show');

    pendingIntroBlob = null;
    pendingIntroText = null;
    pendingIntroCmd  = null;

    try {
      const res = await fetch(RAILWAY_URL + '/claude-tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, mode: 'talk' })
      });
      if (res.ok && !(res.headers.get('content-type')||'').includes('application/json')){
        pendingIntroText = dec(res.headers.get('X-Vizi-Text'));
        pendingIntroCmd  = dec(res.headers.get('X-Vizi-Commands'));
        pendingIntroBlob = await res.blob();
        setBtn('intro');
        btn.innerHTML = 'Tap to<br>hear Vizi';
        setStatus('Tab exercise ready — tap to hear Vizi');
      } else {
        setBtn('');
        btn.innerHTML = 'Hold<br>to Talk';
        setStatus('Ready — ask Vizi about your tab');
      }
    } catch(e){
      setBtn('');
      btn.innerHTML = 'Hold<br>to Talk';
      setStatus('Ready — ask Vizi about your tab');
    }
  })();

  // ── Exercise hand-off from lessons.html ──
  ;(async function checkExerciseParams(){
    const urlParams    = new URLSearchParams(window.location.search);
    const stageId      = urlParams.get('stage');
    const exerciseName = urlParams.get('exercise');
    if (!stageId || !exerciseName) return;

    setBtn('thinking');
    btn.innerHTML = 'Vizi is<br>preparing…';
    setStatus('Getting your exercise ready…');

    if (stageId === 'song') {
      const ub = document.getElementById('uploadBtn');
      if (ub) ub.style.display = '';
    }

    const STAGE_LABELS = {
      'tuning':       'Tuning & Setup',
      'warmup':       'Warmup with Scales',
      'rhythm':       'Rhythm Foundations',
      'chords':       'Chords',
      'chord-theory': 'Build Scales & Chords',
      'strumming':    'Strumming Patterns',
      'soloing':      'Soloing',
      'song':         'Play a Song'
    };
    const stageLabel = STAGE_LABELS[stageId] || stageId;

    songBanner.textContent = `📚 ${stageLabel} — ${exerciseName}`;
    songBanner.classList.add('show');

    window.addEventListener('beforeunload', () => {
      try {
        const p = JSON.parse(localStorage.getItem('viziProgress') || '{}');
        p[stageId] = p[stageId] || {};
        p[stageId].exercisesDone = p[stageId].exercisesDone || [];
        if (!p[stageId].exercisesDone.includes(exerciseName))
          p[stageId].exercisesDone.push(exerciseName);
        localStorage.setItem('viziProgress', JSON.stringify(p));
      } catch(e){}
    }, { once: true });

    const stageInstructions = {
      'chords': (()=>{
        const isArpeggio = exerciseName.includes('Arpeggio');
        const isProgression = exerciseName.startsWith('Progression:') || exerciseName.startsWith('Progression step:');
        const isTriad = exerciseName.includes('Triad');
        const isBarre = exerciseName.includes('Shape)');

        if(isProgression){
          const progStr = exerciseName.replace('Progression:','').replace('Progression step:','').trim();
          const isSingleStep = exerciseName.startsWith('Progression step:');
          if(isSingleStep){
            const chordPart = progStr.replace(' — Chord','').replace(' — Arpeggio','').trim();
            const cleanCmd = chordPart.replace(/ \(.*\)/,'').replace('/','').split('/')[0];
            return 'Light the chord on the fretboard: CHORD '+cleanCmd+'. Say the chord name and one note — keep it to one sentence.';
          }
          return 'The student built this chord progression: '+progStr+'. Walk through each chord one at a time — light each with a CHORD command, name it, and give one tip about the transition to the next chord. Tell them which scale this progression comes from if you recognise it. Keep each chord description to one sentence.';
        }

        if(isTriad){
          const isMajor = exerciseName.includes('Major');
          const isArpTriad = isArpeggio;
          const grpMatch = exerciseName.match(/\((\w+)\)/);
          const grp = grpMatch ? grpMatch[1].toUpperCase() : 'HIE';
          const rootMatch = exerciseName.match(/^(\w+(?:#\/\w+)?)\s/);
          const root = rootMatch ? rootMatch[1].replace('/','').split('/')[0] : 'G';
          const quality = isMajor?'major':'minor';
          const qualityM = isMajor?'':'M';
          if(isArpTriad){
            return 'The student wants to arpeggiate a '+root+' '+quality+' triad on the '+grp+' string group. Light the triad: TRIAD '+grp+' '+root+qualityM+'. Then pick through Root, 3rd, 5th one at a time using SF commands, naming each note. Keep to 2 sentences.';
          }
          return 'The student chose the '+root+' '+quality+' triad on the '+grp+' string group. Light it: TRIAD '+grp+' '+root+qualityM+'. Name the three notes (Root, '+(isMajor?'major third':'minor third')+', fifth) and tell them to slide the shape up two frets to hear a new root. Keep to 2 sentences.';
        }

        if(isBarre){
          const shapeMatch = exerciseName.match(/\((.+Shape)\)/);
          const shapeName = shapeMatch ? shapeMatch[1] : 'E Shape';
          const chordRoot = exerciseName.split(' ')[0].replace('/','').split('/')[0];
          const isArpBarre = isArpeggio;
          const chordCmd = 'CHORD '+chordRoot;
          if(isArpBarre){
            return 'The student wants to arpeggiate a '+chordRoot+' barre chord ('+shapeName+'). Light it: '+chordCmd+'. Pick through Root, 3rd, 5th using SF commands from low to high, naming each note. Remind them this is the best way to check every note in a barre chord rings clean. Keep to 2 sentences.';
          }
          return 'The student chose '+chordRoot+' ('+shapeName+'). Light it: '+chordCmd+'. Say the chord name and shape, then ask them to strum slowly and report any buzzing. Keep to one sentence — the fretboard already shows the fingering.';
        }

        const chordName = exerciseName.replace(' — Chord','').replace(' — Arpeggio','').trim();
        const chordCmd = 'CHORD '+chordName.replace('/','').split('/')[0];
        if(isArpeggio){
          return 'The student wants to arpeggiate '+chordName+'. Light the shape: '+chordCmd+'. Pick through the chord tones low to high using SF commands, naming Root, 3rd, and 5th as you light each one. Tell them buzzing notes reveal exactly which finger needs adjusting. Keep to 3 sentences.';
        }
        return 'The student chose '+chordName+'. Light it immediately: '+chordCmd+'. Say the chord name and ask them to strum slowly and tell you if anything buzzes. Keep to one sentence — the fretboard already shows the fingering.';
      })(),
      'strumming': exerciseName.includes('Mixed')
        ? 'The student chose Mixed string groups. Give them a chord progression that moves between different string groups: G chord (6 strings), D chord (4 strings), C chord (5 strings). Show the string range for each chord using STRING commands, explain why the aim changes, and give a strumming exercise that practices the switch.'
        : 'The student chose "' + exerciseName + '". Explain which chords use this string range, show one example chord with a STRING command, then verbally suggest a BPM for the strumming exercise — do not send a METRONOME command.',
      'chord-theory': (()=>{
        if(exerciseName.includes('Chord Construction')){
          const parts = exerciseName.replace(' — Chord Construction','').split(' ');
          const root = parts[0] || 'C';
          const type = parts.slice(1).join(' ') || 'Major';
          const isMajor = type.includes('Major') && !type.includes('Minor') && !type.includes('7');
          const isMinor = type.includes('Minor') && !type.includes('7');
          const is7th   = type.includes('7');
          const isDim   = type.includes('Dim');
          const chordCmd = 'CHORD '+root+(isMajor?'':isMinor?'m':is7th&&!isMinor?'7':isDim?'dim':'');
          return 'The student just built a '+root+' '+type+' chord using the chord builder. Light it on the fretboard now using '+chordCmd+'. Say only: "Here is your '+root+' '+type+' chord — Root is '+root+', '+(isMajor?'Major 3rd':isMinor?'Minor 3rd':'3rd')+' is the '+(isDim||isMinor?'flat ':'')+'third, and the 5th completes it. Hold the talk button and ask me anything about it." Keep your entire response to 2 sentences plus the CHORD command. Do not explain further unless asked.';
        } else if(exerciseName.includes('Construct')){
          return 'Pick a random chord (not C major — make it interesting) and walk the student through constructing it from scratch: name the root, then apply the scale formula step by step, then identify the chord tones. Light each chord tone individually using SF commands as you name it.';
        } else if(exerciseName.includes('Mixed')){
          return 'Pick a random chord type (major, minor, 7th, or diminished) without telling the student which type it is. Name a random chord of that type, light it with a CHORD command, and ask the student to identify the root, third, and fifth. Confirm or correct their answer.';
        } else {
          return 'The student wants to identify the 1, 3, 5 of ' + exerciseName.replace('Identify 1, 3, 5 — ','') + ' chords. Pick a random chord of that type, name it, light it with a CHORD command, and ask the student to identify which note is the root, which is the third, and which is the fifth. Wait for their answer and confirm or correct it.';
        }
      })(),
      'transitions': 'The student wants to practice a ' + exerciseName + '. Suggest a specific well-known chord progression of that length (e.g. for 4-chord: G D Em C), light the first chord with a CHORD command, verbally suggest a slow tempo BPM — do not send a METRONOME command — and guide them through each change one at a time.',
      'warmup': (()=>{
        // exerciseName is e.g. "G Major" or "A Minor"
        const parts = exerciseName.trim().split(' ');
        const root = parts[0] || 'G';
        const quality = (parts[1]||'Major').toLowerCase();
        const isMinor = quality === 'minor';
        const isPent = quality === 'pentatonic' || exerciseName.toLowerCase().includes('pent');
        const scaleType = isMinor ? 'minor' : 'major';
        const scaleCmd = 'SCALE ' + root + (isMinor ? 'm' : '') + (isPent ? ' pent' : ' ' + scaleType) + ' all';
        return 'The student wants to warm up with the ' + exerciseName + ' scale. ' +
          'Light all 5 CAGED shapes now: ' + scaleCmd + '. ' +
          'Tell them: each color is a separate shape — Blue is shape 1, Green shape 2, Gold shape 3, Purple shape 4, Cyan shape 5. White notes are shared between shapes. ' +
          'Ask them to start with shape 1 (the blue notes), play every blue note from the lowest string to the highest, then move to shape 2 (green) and do the same, continuing up the neck through all 5 shapes. Then reverse back down. ' +
          'Suggest 60 BPM — do not send a METRONOME command. ' +
          'Keep your spoken response to 3 sentences.'
      })(),
      'soloing': (()=>{
        // exerciseName format: "Key | Scale Label | scale cmd | Track Title (BPM)"
        const parts = exerciseName.split('|').map(s => s.trim());
        const keyPart = parts[0] || 'the selected key';
        const scaleLabel = parts[1] || 'the selected scale';
        const scaleCmdRaw = parts[2] || '';
        const trackPart = parts[3] || '';
        const scaleCmd = scaleCmdRaw ? ('SCALE ' + scaleCmdRaw + ' ALL') : '';
        const bpmMatch = trackPart.match(/\((\d+)\s*BPM\)/i);
        const bpm = bpmMatch ? bpmMatch[1] : null;

        let instr = 'The student is soloing in ' + keyPart + ' using the ' + scaleLabel + '. ';
        if (scaleCmd) instr += 'Light it now: ' + scaleCmd + '. ';
        instr += 'Briefly explain which notes to target (especially the root and fifth), suggest a simple starting phrase like root-third-fifth, and remind them there are no wrong notes in this scale. ';
        if (trackPart && trackPart !== 'no backing track selected') {
          instr += 'They are playing along with "' + trackPart + '". ';
        }
        if (bpm) {
          instr += 'Tell them to set the metronome in the nav bar to ' + bpm + ' BPM to stay in sync with the track — do not send a METRONOME command. ';
        }
        instr += 'Keep your spoken response to 2-3 sentences.';
        return instr;
      })()
    };

    const specificInstruction = stageInstructions[stageId] ||
      (stageId === 'tuning'
        ? 'Welcome the student to the tuning and setup stage. Share one practical tip about holding the guitar, hand position, or posture — pick a different tip each time. Keep it to 2 sentences. The tuner is already open on screen for them to use.'
        : `The student selected "${exerciseName}". Tell them exactly what to do and give one clear starting instruction.`);

    const message = [
      `LESSON EXERCISE START.`,
      `Stage: "${stageLabel}".`,
      `Student's choice: "${exerciseName}".`,
      specificInstruction,
      `Greet the student warmly and keep your spoken response to 2–3 sentences.`,
      `Always include the relevant fretboard command (CHORD, CHORDS, SCALE, etc.) — do not send METRONOME commands, suggest BPM verbally instead.`,
    `If the student asks you to speed up or slow down the fretboard animation, or says it's going too fast or too slow, send a FASTER or SLOWER command (no other arguments) as a pipe command — these are the only two speed commands, there is no NORMAL, so to return to default speed use RESET or call FASTER while already on the slowest tier.`,
      `as a pipe command at the end of your response in the standard format.`,
      `End by inviting them to hold the talk button when they have a question or are ready for the next step.`
    ].join(' ');

    pendingIntroBlob = null;
    pendingIntroText = null;
    pendingIntroCmd  = null;

    try {
      setStatus('Loading your exercise…');
      const res = await fetch(RAILWAY_URL + '/claude-tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, mode: 'talk' })
      });
      if (res.ok && !(res.headers.get('content-type')||'').includes('application/json')){
        pendingIntroText = dec(res.headers.get('X-Vizi-Text'));
        pendingIntroCmd  = dec(res.headers.get('X-Vizi-Commands'));
        pendingIntroBlob = await res.blob();
        setBtn('intro');
        btn.innerHTML = 'Tap to<br>start';
        const shortName = exerciseName.split(' \u2014')[0].split(' \u2013')[0];
        setStatus(shortName + ' ready \u2014 tap to hear Vizi');
        applyMetronomeCommand(pendingIntroCmd || '');
      } else {
        setStatus('Ready — ask Vizi about this exercise');
      }
    } catch(e){
      setStatus('Ready — ask Vizi about this exercise');
    }

    const cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);
  })();

  loadSongSheet();
</script>
