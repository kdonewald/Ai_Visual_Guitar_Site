<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vizi — Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F0E8; --cream-dark:#EDE6D6; --cream-mid:#E0D5C0;
    --red:#D94025; --red-dark:#B83320; --blue:#1B4F8A;
    --gold:#E8A020; --teal:#2AACB8; --green:#4CAF50;
    --text:#2A2018; --text-mid:#5A4A38; --text-light:#8A7A68;
    --white:#FFFFFF; --shadow:rgba(42,32,24,0.10); --shadow-lg:rgba(42,32,24,0.18);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--cream); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:1.5rem 1.25rem 2.5rem;
  }

  /* header */
  .head{display:flex;align-items:center;gap:10px;margin-top:1rem;margin-bottom:0.25rem}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
  .tag{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.16em;
       text-transform:uppercase;color:var(--text-light);text-align:center;margin-bottom:2rem}

  /* led accent */
  .led-row{display:flex;gap:6px;margin-bottom:2.5rem}
  .led{width:8px;height:8px;border-radius:50%;background:var(--cream-mid);transition:all .25s}
  .led.on.red{background:var(--red);box-shadow:0 0 8px var(--red)}
  .led.on.gold{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .led.on.blue{background:var(--blue);box-shadow:0 0 8px var(--blue)}
  .led.on.green{background:var(--green);box-shadow:0 0 8px var(--green)}
  .led.on.teal{background:var(--teal);box-shadow:0 0 8px var(--teal)}

  /* talk button */
  .talk-wrap{position:relative;margin-bottom:1.5rem}
  .talk{
    width:160px;height:160px;border-radius:50%;
    background:var(--red);color:var(--white);border:none;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
    cursor:pointer;box-shadow:0 8px 28px rgba(217,64,37,0.32);
    transition:transform .12s, background .2s, box-shadow .2s;
    display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  }
  .talk:active{background:var(--red-dark)}
  .talk.listening{background:var(--blue);transform:scale(0.96);box-shadow:0 6px 20px rgba(27,79,138,0.4)}
  .talk.thinking{background:var(--gold)}
  /* listening ring pulse */
  .ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--blue);
        opacity:0;pointer-events:none}
  .listening + .ring{animation:ring 1.1s ease-out infinite}
  @keyframes ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}

  .status{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.08em;
          text-transform:uppercase;color:var(--text-light);min-height:1.2em;margin-bottom:2rem;text-align:center}

  /* transcript panels */
  .panels{width:100%;max-width:440px;display:flex;flex-direction:column;gap:0.85rem}
  .panel{background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;
         padding:0.9rem 1.1rem;opacity:0;transform:translateY(8px);transition:all .3s}
  .panel.show{opacity:1;transform:none}
  .panel .label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;
                text-transform:uppercase;color:var(--text-light);margin-bottom:0.3rem}
  .panel.you{border-left:4px solid var(--blue)}
  .panel.vizi{border-left:4px solid var(--red)}
  .panel.cmd{border-left:4px solid var(--gold);background:var(--cream)}
  .panel .body{font-size:0.95rem;line-height:1.55;color:var(--text)}
  .panel.cmd .body{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text-mid);word-break:break-word}

  .hint{margin-top:auto;padding-top:2rem;max-width:440px;font-size:0.72rem;line-height:1.6;
        color:var(--text-light);text-align:center}
  .hint code{font-family:'DM Mono',monospace;background:var(--cream-dark);padding:1px 5px;border-radius:3px}
</style>
</head>
<body>

  <div class="head">
    <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
    <div class="logo-name">Vizi</div>
  </div>
  <div class="tag">Hold to talk · Release to send</div>

  <div class="led-row" id="ledRow">
    <div class="led"></div><div class="led"></div><div class="led"></div>
    <div class="led"></div><div class="led"></div><div class="led"></div>
    <div class="led"></div><div class="led"></div>
  </div>

  <div class="talk-wrap">
    <button class="talk" id="talkBtn">Hold<br>to Talk</button>
    <div class="ring"></div>
  </div>
  <div class="status" id="status">Ready</div>

  <div class="panels">
    <div class="panel you" id="pYou"><div class="label">You said</div><div class="body" id="bYou"></div></div>
    <div class="panel vizi" id="pVizi"><div class="label">Vizi</div><div class="body" id="bVizi"></div></div>
    <div class="panel cmd" id="pCmd"><div class="label">Fretboard commands</div><div class="body" id="bCmd"></div></div>
  </div>

  <div class="hint" id="hint">
    Tip: if Vizi’s text and commands stay blank, add the
    <code>Access-Control-Expose-Headers</code> line to your server’s CORS block — audio will play either way.
  </div>

<script>
  // ─── Config ───────────────────────────────────────────────
  const RAILWAY_URL = 'https://vizi-tts-proxy-production.up.railway.app';
  const TARGET_RATE = 16000;   // sample rate sent to /stt-claude-tts
  const MODE        = 'talk';  // 'talk' (adds your REMINDER_PROMPT) | 'general' | 'song'

  // ─── Elements ─────────────────────────────────────────────
  const btn    = document.getElementById('talkBtn');
  const statusEl = document.getElementById('status');
  const leds   = [...document.querySelectorAll('#ledRow .led')];
  const ledColors = ['red','gold','blue','green','teal'];

  // ─── Audio state ──────────────────────────────────────────
  let audioCtx, stream, source, processor, sink;
  let recording = false, chunks = [];

  function setStatus(t){ statusEl.textContent = t; }
  function setMode(cls){ btn.className = 'talk' + (cls ? ' ' + cls : ''); }
  function ledsOn(on){
    leds.forEach((l,i)=>{ l.className = 'led' + (on ? ' on ' + ledColors[i % ledColors.length] : ''); });
  }
  function showPanel(id, bodyId, text){
    document.getElementById(bodyId).textContent = text;
    document.getElementById(id).classList.add('show');
  }

  // ─── Recording (Web Audio → LINEAR16) ─────────────────────
  async function startRec(){
    if (recording) return;
    stream = await navigator.mediaDevices.getUserMedia({
      audio:{ channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true }
    });
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();   // unlock audio on this gesture

    source    = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    sink      = audioCtx.createGain(); sink.gain.value = 0;         // silent sink (no mic feedback)

    chunks = [];
    processor.onaudioprocess = e => {
      if (!recording) return;
      chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    source.connect(processor); processor.connect(sink); sink.connect(audioCtx.destination);
    recording = true;
  }

  function stopRec(){
    if (!recording) return null;
    recording = false;
    try { processor.disconnect(); source.disconnect(); sink.disconnect(); } catch(e){}
    if (stream) stream.getTracks().forEach(t => t.stop());

    const len = chunks.reduce((a,c)=>a+c.length, 0);
    if (len === 0) return null;
    const merged = new Float32Array(len);
    let off = 0; for (const c of chunks){ merged.set(c, off); off += c.length; }
    const ds  = downsample(merged, audioCtx.sampleRate, TARGET_RATE);
    return bytesToBase64(floatToPCM16(ds));
  }

  function downsample(buf, srcRate, dstRate){
    if (dstRate >= srcRate) return buf;
    const ratio = srcRate / dstRate;
    const outLen = Math.round(buf.length / ratio);
    const out = new Float32Array(outLen);
    let pos = 0;
    for (let i = 0; i < outLen; i++){
      const next = Math.round((i + 1) * ratio);
      let sum = 0, cnt = 0;
      for (let j = pos; j < next && j < buf.length; j++){ sum += buf[j]; cnt++; }
      out[i] = cnt ? sum / cnt : 0;
      pos = next;
    }
    return out;
  }
  function floatToPCM16(f32){
    const dv = new DataView(new ArrayBuffer(f32.length * 2));
    for (let i = 0; i < f32.length; i++){
      let s = Math.max(-1, Math.min(1, f32[i]));
      dv.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return new Uint8Array(dv.buffer);
  }
  function bytesToBase64(bytes){
    let bin = ''; const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk){
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(bin);
  }

  // ─── Send to Vizi (one call: STT + Claude + TTS) ──────────
  async function sendToVizi(b64){
    setMode('thinking'); setStatus('Vizi is thinking…'); ledsOn(false);
    try {
      const res = await fetch(RAILWAY_URL + '/stt-claude-tts', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ audio:b64, sampleRate:TARGET_RATE, mode:MODE })
      });

      const ct = (res.headers.get('content-type') || '');
      if (ct.includes('application/json')){
        const j = await res.json();
        setMode(''); 
        setStatus(j.empty ? 'Didn’t catch that — try again' : ('Error: ' + (j.error || 'unknown')));
        return;
      }

      const transcript = dec(res.headers.get('X-Vizi-Transcript'));
      const text       = dec(res.headers.get('X-Vizi-Text'));
      const commands   = dec(res.headers.get('X-Vizi-Commands'));
      if (transcript) showPanel('pYou','bYou', transcript);
      if (text)       showPanel('pVizi','bVizi', text);
      if (commands)   showPanel('pCmd','bCmd', commands);

      const blob = await res.blob();
      await playBlob(blob);
      setMode(''); setStatus('Ready');
    } catch (e){
      setMode(''); setStatus('Could not reach Vizi — check connection');
    }
  }
  function dec(v){ try { return v ? decodeURIComponent(v) : ''; } catch(_){ return v || ''; } }

  // Decode + play through AudioContext (already unlocked by the press gesture)
  async function playBlob(blob){
    try {
      const arr = await blob.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(arr);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.connect(audioCtx.destination);
      // (later: drive the "talking Vizi" video here — start on play, stop on ended)
      src.start();
      await new Promise(r => { src.onended = r; });
    } catch(e){ /* playback failed; audio context may be locked */ }
  }

  // ─── Press-and-hold wiring ────────────────────────────────
  async function press(e){
    e.preventDefault();
    if (recording) return;
    setMode('listening'); setStatus('Listening…'); ledsOn(true);
    try { await startRec(); }
    catch(err){ setMode(''); setStatus('Microphone blocked — allow mic access'); }
  }
  function release(e){
    e.preventDefault();
    if (!recording) return;
    ledsOn(false);
    const b64 = stopRec();
    if (!b64){ setMode(''); setStatus('Nothing recorded — hold a moment longer'); return; }
    sendToVizi(b64);
  }

  btn.addEventListener('pointerdown', press);
  btn.addEventListener('pointerup',   release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', e => { if (recording) release(e); });
</script>
</body>
</html>
