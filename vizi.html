<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vizi — Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F5F0E8; --cream-dark:#EDE6D6; --cream-mid:#E0D5C0;
    --red:#D94025; --red-dark:#B83320; --blue:#1B4F8A;
    --gold:#E8A020; --teal:#2AACB8; --green:#4CAF50;
    --text:#2A2018; --text-mid:#5A4A38; --text-light:#8A7A68;
    --white:#FFFFFF; --shadow:rgba(42,32,24,0.10); --shadow-lg:rgba(42,32,24,0.18);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--cream); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:1.25rem 1.25rem 2.5rem;
  }

  .head{display:flex;align-items:center;gap:10px;margin-top:0.5rem}
  .logo-mark{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1}
  .logo-mark .A{color:var(--red)} .logo-mark .i{color:var(--blue)}
  .logo-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
  .tag{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.16em;
       text-transform:uppercase;color:var(--text-light);text-align:center;margin:0.2rem 0 1.75rem}

  .stage-wrap{position:relative;margin-bottom:1.5rem}
  .stage{
    position:relative;width:230px;height:230px;border-radius:50%;overflow:hidden;
    border:4px solid var(--cream-dark);background:#0a0a0a;
    box-shadow:0 10px 30px var(--shadow-lg);
  }
  .stage img,.stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stage img{object-position:center top}
  .stage video{object-position:center 12%;opacity:0;transition:opacity .3s ease}
  .stage.talking video{opacity:1}
  .stage-wrap .ring{position:absolute;inset:-4px;border-radius:50%;border:3px solid var(--blue);
    opacity:0;pointer-events:none}
  .stage-wrap.listening .ring{animation:ring 1.15s ease-out infinite}
  @keyframes ring{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.28);opacity:0}}

  .talk{
    width:140px;height:140px;border-radius:50%;
    background:var(--red);color:var(--white);border:none;
    font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;
    cursor:pointer;box-shadow:0 8px 24px rgba(217,64,37,0.32);
    transition:transform .12s, background .2s, box-shadow .2s;
    display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    margin-bottom:1rem;
  }
  .talk:active{background:var(--red-dark)}
  .talk.listening{background:var(--blue);transform:scale(0.96)}
  .talk.thinking{background:var(--gold)}
  /* intro-pending: pulsing ring to invite the tap */
  .talk.intro{background:var(--blue);animation:intro-pulse 1.2s ease-in-out infinite}
  @keyframes intro-pulse{0%,100%{box-shadow:0 0 0 0 rgba(27,79,138,0.5)}60%{box-shadow:0 0 0 18px rgba(27,79,138,0)}}

  .status{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.08em;
          text-transform:uppercase;color:var(--text-light);min-height:1.2em;margin-bottom:1rem;text-align:center}

  .upload-btn{
    display:flex;align-items:center;justify-content:center;gap:.5rem;
    background:var(--white);border:2px solid var(--cream-dark);
    border-radius:10px;padding:.65rem 1.4rem;
    font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;
    color:var(--text-mid);cursor:pointer;transition:all .2s;
    margin-bottom:1.5rem;text-decoration:none;
    box-shadow:0 2px 8px var(--shadow);
  }
  .upload-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(27,79,138,0.04)}
  .upload-btn.waiting{border-color:var(--gold);color:var(--gold);animation:pulse-btn 1.4s ease-in-out infinite}
  @keyframes pulse-btn{0%,100%{opacity:1}50%{opacity:.6}}

  /* ── metronome strip ── */
  .metro-strip{
    display:flex; flex-direction:column; align-items:stretch;
    background:var(--white); border:2px solid var(--cream-dark);
    border-radius:12px; padding:.5rem .7rem .5rem;
    margin-bottom:1rem; width:100%; max-width:340px;
    box-shadow:0 2px 8px var(--shadow);
  }
  .metro-label{
    font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.14em;
    text-transform:uppercase; color:var(--text-light); text-align:center;
    margin-bottom:.35rem;
  }
  .metro-controls{ display:flex; align-items:center; gap:.6rem; }
  .metro-tap{
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    background:var(--cream); border:2px solid var(--cream-dark);
    cursor:pointer; transition:all .07s; display:flex; align-items:center; justify-content:center;
    font-size:.85rem; color:var(--text-mid);
  }
  .metro-tap.pulse{ background:var(--gold); border-color:var(--gold); color:white; transform:scale(0.92) }
  .metro-mid{ flex:1; display:flex; flex-direction:column; gap:.15rem; min-width:0 }
  .metro-bpm-row{ display:flex; align-items:baseline; gap:.3rem }
  .metro-bpm-val{ font-family:'DM Mono',monospace; font-weight:600; font-size:.95rem; color:var(--text) }
  .metro-bpm-label{ font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; color:var(--text-light) }
  .metro-slider{ width:100%; accent-color:var(--blue); height:14px; cursor:pointer; }
  .metro-btn{
    width:38px; height:38px; border-radius:50%; flex-shrink:0; border:none;
    background:var(--green); color:white; cursor:pointer; font-size:.8rem;
    display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .metro-btn.playing{ background:var(--red) }
  .metro-ts{
    font-family:'DM Mono',monospace; font-size:.65rem; color:var(--text-mid);
    background:var(--cream); border:1.5px solid var(--cream-dark); border-radius:6px;
    padding:2px 5px; cursor:pointer; flex-shrink:0;
  }

  .song-banner{
    display:none;width:100%;max-width:440px;
    background:rgba(27,79,138,0.07);border:2px solid rgba(27,79,138,0.2);
    border-radius:10px;padding:.7rem 1rem;margin-bottom:1.25rem;
    font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.04em;
    color:var(--blue);text-align:center;cursor:pointer;transition:background .2s;
  }
  .song-banner.show{display:block}
  .song-banner:hover{background:rgba(27,79,138,0.12)}

  .panels{width:100%;max-width:440px;display:flex;flex-direction:column;gap:0.85rem}
  .panel{background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;
         padding:0.9rem 1.1rem;opacity:0;transform:translateY(8px);transition:all .3s}
  .panel.show{opacity:1;transform:none}
  .panel .label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;
                text-transform:uppercase;color:var(--text-light);margin-bottom:0.3rem}
  .panel.you{border-left:4px solid var(--blue)}
  .panel.vizi{border-left:4px solid var(--red)}
  .panel.cmd{border-left:4px solid var(--gold);background:var(--cream)}
  .panel .body{font-size:0.95rem;line-height:1.55;color:var(--text)}
  .panel.cmd .body{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text-mid);word-break:break-word}

  /* ── song sheet floating panel ── */
  .sheet-float{
    position:fixed; z-index:999;
    top:60px; right:16px;
    width:min(440px, calc(100vw - 32px));
    height:min(580px, calc(100vh - 80px));
    background:var(--white);
    border:2px solid var(--cream-dark);
    border-radius:14px;
    box-shadow:0 12px 40px rgba(42,32,24,0.22);
    display:none; flex-direction:column;
    overflow:hidden; resize:both;
    min-width:280px; min-height:200px;
  }
  .sheet-float.show{display:flex}
  .sheet-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.55rem .75rem;background:var(--cream);
    border-bottom:2px solid var(--cream-dark);
    cursor:grab; flex-shrink:0; user-select:none; gap:.5rem;
  }
  .sheet-head:active{cursor:grabbing}
  .sheet-title{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-mid);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .sheet-controls{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
  .sheet-btn{
    background:var(--cream-dark);border:none;cursor:pointer;
    font-size:.8rem;font-weight:600;color:var(--text-mid);
    width:22px;height:22px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;line-height:1;
  }
  .sheet-btn:hover{background:var(--blue);color:white}
  .sheet-close{
    background:none;border:none;cursor:pointer;font-size:1rem;
    color:var(--text-light);padding:0 .15rem;line-height:1;transition:color .2s;
  }
  .sheet-close:hover{color:var(--red)}
  .sheet-zoom-val{
    font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-light);
    min-width:2.8rem;text-align:center;
  }
  .sheet-body{flex:1;overflow:auto;position:relative;}
  .sheet-content{
    transform-origin:top left;
    transition:transform .15s;
    width:100%; /* scales with zoom */
  }
  .sheet-body iframe{width:100%;height:100%;border:none;display:block;min-height:400px}
  .sheet-body img{width:100%;height:auto;display:block}
  .sheet-body pre{padding:1rem;font-family:'DM Mono',monospace;font-size:.75rem;
    line-height:1.6;white-space:pre-wrap;color:var(--text);}

  .sheet-show-btn{
    display:none;align-items:center;gap:.4rem;
    background:var(--white);border:2px solid var(--blue);
    border-radius:8px;padding:.45rem .9rem;
    font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--blue);cursor:pointer;transition:all .2s;margin-bottom:.75rem;
  }
  .sheet-show-btn.show{display:flex}
  .sheet-show-btn:hover{background:var(--blue);color:white}

  /* ── site nav bar ── */
  .site-nav{
    width:100%; position:sticky; top:0; z-index:60;
    display:flex; align-items:center; justify-content:space-between;
    padding:.7rem 1.25rem; background:rgba(245,240,232,0.96);
    backdrop-filter:blur(12px); border-bottom:2px solid var(--cream-dark);
    margin-bottom:.75rem;
  }
  .site-nav .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .site-nav .logo-mark{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;line-height:1}
  .site-nav .logo-mark .A{color:var(--red)} .site-nav .logo-mark .i{color:var(--blue)}
  .site-nav .logo-name{font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;color:var(--text)}
  .nav-links{display:flex;gap:.4rem;align-items:center}
  .nav-link{
    font-size:.75rem;font-weight:500;color:var(--text-mid);text-decoration:none;
    padding:5px 11px;border-radius:6px;border:1.5px solid var(--cream-dark);
    transition:all .2s;white-space:nowrap;
  }
  .nav-link:hover{border-color:var(--blue);color:var(--blue)}
  .nav-link.active{border-color:var(--red);color:var(--red);background:rgba(217,64,37,0.06)}
</style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark"><span class="A">A</span><span class="i">i</span></div>
      <div class="logo-name">Visual Guitar</div>
    </a>
    <div class="nav-links">
<a href="index.html"   class="nav-link">Home</a>
      <a href="lessons.html" class="nav-link">Lessons</a>
      <a href="songs.html"   class="nav-link">Songs</a>
      <a href="vizi.html"    class="nav-link active">Vizi</a>
    </div>
  </nav>
  <div class="tag">Hold to talk · Release to send</div>

  <div class="stage-wrap" id="stageWrap">
    <div class="stage" id="stage">
      <img id="viziStill" src="ViziWhiteBack.png?v=2" alt="Vizi" />
      <video id="viziVid" src="VIZI%20MUTETALK.mp4" muted loop playsinline preload="auto"></video>
    </div>
    <div class="ring"></div>
  </div>

  <button class="talk" id="talkBtn">Hold<br>to Talk</button>
  <div class="status" id="status">Ready</div>

  <!-- Metronome — always visible, small strip -->
  <div class="metro-strip">
    <div class="metro-label">Metronome</div>
    <div class="metro-controls">
      <div class="metro-tap" id="metroTap" title="Tap tempo">👆</div>
      <div class="metro-mid">
        <div class="metro-bpm-row">
          <span class="metro-bpm-val" id="metroBpmVal">80</span>
          <span class="metro-bpm-label">BPM</span>
          <span class="metro-ts" id="metroTs">4/4</span>
        </div>
        <input class="metro-slider" id="metroSlider" type="range" min="40" max="200" value="80">
      </div>
      <button class="metro-btn" id="metroBtn" title="Start/stop">▶</button>
    </div>
  </div>

  <button class="upload-btn" id="uploadBtn">🎵 Upload a Song</button>
  <div class="song-banner" id="songBanner"></div>

  <button class="sheet-show-btn" id="sheetShowBtn">📄 Show Song Sheet</button>

  <div class="panels">
    <div class="panel you"  id="pYou"><div class="label">You said</div><div class="body" id="bYou"></div></div>
    <div class="panel vizi" id="pVizi"><div class="label">Vizi</div><div class="body" id="bVizi"></div></div>
    <div class="panel cmd"  id="pCmd"><div class="label">Fretboard commands</div><div class="body" id="bCmd"></div></div>
  </div>

  <!-- Floating song sheet panel -->
  <div class="sheet-float" id="sheetWrap">
    <div class="sheet-head" id="sheetDragHandle">
      <span class="sheet-title" id="sheetTitle">Song Sheet</span>
      <div class="sheet-controls">
        <button class="sheet-btn" id="zoomOut">−</button>
        <span class="sheet-zoom-val" id="zoomVal">100%</span>
        <button class="sheet-btn" id="zoomIn">+</button>
        <button class="sheet-btn" id="zoomReset" title="Reset zoom">⟳</button>
        <button class="sheet-close" id="sheetClose">✕</button>
      </div>
    </div>
    <div class="sheet-body" id="sheetBody">
      <div class="sheet-content" id="sheetContent"></div>
    </div>
  </div>

<script>
  const RAILWAY_URL  = 'https://vizi-tts-proxy-production.up.railway.app';
  const TARGET_RATE  = 16000;
  const POLL_SONG_MS = 2000;

  const btn        = document.getElementById('talkBtn');
  const statusEl   = document.getElementById('status');
  const stageWrap  = document.getElementById('stageWrap');
  const stage      = document.getElementById('stage');
  const viziVid    = document.getElementById('viziVid');
  const uploadBtn  = document.getElementById('uploadBtn');
  const songBanner = document.getElementById('songBanner');

  let currentMode   = 'talk';
  let songSessionId = null;
  let songPollTimer = null;
  let songLoaded    = false;

  // Pending intro: stored when song is ready but audio context not yet unlocked
  let pendingIntroBlob = null;
  let pendingIntroText = null;
  let pendingIntroCmd  = null;

  let audioCtx, stream, source, processor, sink;
  let micReady = false, recording = false;
  let chunks = [], preroll = [];
  const PREROLL_FRAMES = 6;

  function setStatus(t){ statusEl.textContent = t; }
  function setBtn(cls){ btn.className = 'talk' + (cls ? ' ' + cls : ''); }
  function setListening(on){ stageWrap.classList.toggle('listening', on); }
  function showTalking(){ stage.classList.add('talking'); try{ viziVid.currentTime=0; viziVid.play(); }catch(e){} }
  function showIdle(){ stage.classList.remove('talking'); try{ viziVid.pause(); }catch(e){} }
  function showPanel(id, bodyId, text){
    document.getElementById(bodyId).textContent = text;
    document.getElementById(id).classList.add('show');
  }

  // ─── Audio context — only created on first gesture ────────
  async function ensureAudioCtx(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
  }

  async function ensureMic(){
    if (micReady) return;
    await ensureAudioCtx();
    stream    = await navigator.mediaDevices.getUserMedia({
      audio:{ channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true }
    });
    source    = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    sink      = audioCtx.createGain(); sink.gain.value = 0;
    processor.onaudioprocess = e => {
      const frame = new Float32Array(e.inputBuffer.getChannelData(0));
      preroll.push(frame);
      if (preroll.length > PREROLL_FRAMES) preroll.shift();
      if (recording) chunks.push(frame);
    };
    source.connect(processor); processor.connect(sink); sink.connect(audioCtx.destination);
    micReady = true;
  }

  async function startCapture(){ await ensureMic(); chunks = preroll.slice(); recording = true; }

  function stopCapture(){
    if (!recording) return null;
    recording = false;
    const len = chunks.reduce((a,c)=>a+c.length, 0);
    if (len === 0) return null;
    const merged = new Float32Array(len);
    let off = 0; for (const c of chunks){ merged.set(c, off); off += c.length; }
    return bytesToBase64(floatToPCM16(downsample(merged, audioCtx.sampleRate, TARGET_RATE)));
  }

  function downsample(buf, srcRate, dstRate){
    if (dstRate >= srcRate) return buf;
    const ratio = srcRate / dstRate, outLen = Math.round(buf.length / ratio);
    const out = new Float32Array(outLen); let pos = 0;
    for (let i=0; i<outLen; i++){
      const next = Math.round((i+1)*ratio); let sum=0, cnt=0;
      for (let j=pos; j<next && j<buf.length; j++){ sum+=buf[j]; cnt++; }
      out[i] = cnt ? sum/cnt : 0; pos = next;
    }
    return out;
  }
  function floatToPCM16(f32){
    const dv = new DataView(new ArrayBuffer(f32.length*2));
    for (let i=0; i<f32.length; i++){
      let s=Math.max(-1,Math.min(1,f32[i]));
      dv.setInt16(i*2, s<0?s*0x8000:s*0x7FFF, true);
    }
    return new Uint8Array(dv.buffer);
  }
  function bytesToBase64(bytes){
    let bin=''; const chunk=0x8000;
    for (let i=0; i<bytes.length; i+=chunk)
      bin += String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
    return btoa(bin);
  }

  async function playBlob(blob){
    try {
      await ensureAudioCtx();
      const arr = await blob.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(arr);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.connect(audioCtx.destination);
      showTalking(); src.start();
      await new Promise(r => { src.onended = r; });
    } catch(e){}
    finally { showIdle(); }
  }

  async function sendToVizi(b64){
    setBtn('thinking'); setStatus('Vizi is thinking…');
    try {
      const res = await fetch(RAILWAY_URL + '/stt-claude-tts', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ audio:b64, sampleRate:TARGET_RATE, mode:currentMode })
      });
      const ct = (res.headers.get('content-type') || '');
      if (ct.includes('application/json')){
        const j = await res.json();
        setBtn(''); setStatus(j.empty ? 'Didn\'t catch that — try again' : 'Error: ' + (j.error||'unknown'));
        return;
      }
      const transcript = dec(res.headers.get('X-Vizi-Transcript'));
      const text       = dec(res.headers.get('X-Vizi-Text'));
      const commands   = dec(res.headers.get('X-Vizi-Commands'));
      if (transcript) showPanel('pYou','bYou', transcript);
      if (text)       showPanel('pVizi','bVizi', text);
      if (commands)   { showPanel('pCmd','bCmd', commands); applyMetronomeCommand(commands); }
      const blob = await res.blob();
      setBtn(''); setStatus('');
      await playBlob(blob);
      if (currentMode === 'song') currentMode = 'talk';
      setStatus('Ready');
    } catch(e){ setBtn(''); setStatus('Could not reach Vizi — check connection'); }
  }
  function dec(v){ try { return v ? decodeURIComponent(v) : ''; } catch(_){ return v||''; } }

  // ─── Intro playback ───────────────────────────────────────
  // The intro blob is fetched as soon as the session is ready,
  // but played on the NEXT user gesture so audioCtx is unlocked.
  async function playPendingIntro(){
    if (!pendingIntroBlob) return;
    const blob = pendingIntroBlob;
    const text = pendingIntroText;
    const cmd  = pendingIntroCmd;
    pendingIntroBlob = null; pendingIntroText = null; pendingIntroCmd = null;
    setBtn(''); // clear intro state
    if (text) showPanel('pVizi','bVizi', text);
    if (cmd)  { showPanel('pCmd','bCmd', cmd); applyMetronomeCommand(cmd); }
    setStatus('');
    await playBlob(blob);
    currentMode = 'talk';
    setStatus('Ready');
  }

  // ─── Song upload flow ─────────────────────────────────────
  uploadBtn.addEventListener('click', async () => {
    if (songPollTimer) return;
    uploadBtn.textContent = '⏳ Creating session…';
    uploadBtn.disabled = true;
    try {
      const res  = await fetch(RAILWAY_URL + '/session-create');
      const data = await res.json();
      songSessionId = data.sessionId;
      sessionStorage.setItem('viziSongSession', songSessionId);
      window.location.href = `songs.html?session=${songSessionId}`;
    } catch(e){
      uploadBtn.textContent = '🎵 Upload a Song';
      uploadBtn.disabled = false;
      setStatus('Could not create session — check connection');
    }
  });

  function startSongPoll(){
    if (songPollTimer) clearInterval(songPollTimer);
    songPollTimer = setInterval(checkSongReady, POLL_SONG_MS);
  }

  async function checkSongReady(){
    if (!songSessionId) return;
    try {
      const res  = await fetch(`${RAILWAY_URL}/session-status/${songSessionId}`);
      const data = await res.json();

      if (data.status === 'ready' && !songLoaded){
        clearInterval(songPollTimer); songPollTimer = null; songLoaded = true;
        sessionStorage.removeItem('viziSongSession');

        const title = data.songTitle || 'song';
        songBanner.textContent = `🎵 "${title}" loaded`;
        songBanner.classList.add('show');
        uploadBtn.className = 'upload-btn';
        uploadBtn.textContent = '🎵 Upload Another Song';
        uploadBtn.disabled = false;

        // Fetch the session prompt and get TTS from Claude
        const promptRes  = await fetch(`${RAILWAY_URL}/session-prompt/${songSessionId}`);
        const promptData = await promptRes.json();

        if (promptData.ready && promptData.message){
          currentMode = 'song';
          const ttsRes = await fetch(RAILWAY_URL + '/claude-tts', {
            method:'POST', headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ message: promptData.message, mode: 'song' })
          });
          if (ttsRes.ok){
            const ct = ttsRes.headers.get('content-type') || '';
            if (!ct.includes('application/json')){
              // Store the intro for the next user gesture
              pendingIntroText = dec(ttsRes.headers.get('X-Vizi-Text'));
              pendingIntroCmd  = dec(ttsRes.headers.get('X-Vizi-Commands'));
              pendingIntroBlob = await ttsRes.blob();
              // Signal the user to tap to hear the intro
              setBtn('intro');
              btn.innerHTML = 'Tap to hear<br>Vizi intro';
              setStatus('Song ready — tap the button to hear Vizi');
              songBanner.textContent += ' — tap button to hear intro';
            }
          }
        }
      } else if (data.status === 'error'){
        clearInterval(songPollTimer); songPollTimer = null;
        uploadBtn.className = 'upload-btn';
        uploadBtn.textContent = '🎵 Upload a Song';
        uploadBtn.disabled = false;
        setStatus('Upload failed — try again');
      }
    } catch(e){ /* poll quietly */ }
  }

  // ─── Talk button press/release ────────────────────────────
  async function press(e){
    e.preventDefault();
    // If there's a pending intro, play it on this gesture
    if (pendingIntroBlob){
      btn.innerHTML = 'Hold<br>to Talk';
      await playPendingIntro();
      return;
    }
    if (recording) return;
    setBtn('listening'); setStatus('Starting mic…');
    try {
      await startCapture();
      setListening(true); setStatus('Listening…');
    } catch(err){
      setBtn(''); setListening(false); setStatus('Microphone blocked — allow mic access');
    }
  }
  function release(e){
    e.preventDefault();
    if (pendingIntroBlob) return; // handled in press
    if (!recording) return;
    setListening(false);
    const b64 = stopCapture();
    if (!b64){ setBtn(''); setStatus('Nothing recorded — hold a moment longer'); return; }
    sendToVizi(b64);
  }

  btn.addEventListener('pointerdown', press);
  btn.addEventListener('pointerup',   release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', e => { if (recording && !pendingIntroBlob) release(e); });

  // ─── Song sheet — floating panel with zoom ────────────────
  const sheetWrap    = document.getElementById('sheetWrap');
  const sheetTitle   = document.getElementById('sheetTitle');
  const sheetBody    = document.getElementById('sheetBody');
  const sheetContent = document.getElementById('sheetContent');
  const sheetClose   = document.getElementById('sheetClose');
  const sheetShowBtn = document.getElementById('sheetShowBtn');
  const dragHandle   = document.getElementById('sheetDragHandle');
  const zoomIn       = document.getElementById('zoomIn');
  const zoomOut      = document.getElementById('zoomOut');
  const zoomReset    = document.getElementById('zoomReset');
  const zoomValEl    = document.getElementById('zoomVal');

  let zoomLevel = 1.0;
  const ZOOM_STEP = 0.15, ZOOM_MIN = 0.4, ZOOM_MAX = 3.0;

  function applyZoom(){
    // For images and text, scale the content div
    // For iframes, scale the iframe itself
    const iframe = sheetContent.querySelector('iframe');
    const img    = sheetContent.querySelector('img');
    const pre    = sheetContent.querySelector('pre');
    if (iframe){
      iframe.style.transform = `scale(${zoomLevel})`;
      iframe.style.transformOrigin = 'top left';
      iframe.style.width  = (100 / zoomLevel) + '%';
      iframe.style.height = (580 / zoomLevel) + 'px';
    } else if (img){
      img.style.width = (zoomLevel * 100) + '%';
    } else if (pre){
      pre.style.fontSize = (0.75 * zoomLevel) + 'rem';
    }
    zoomValEl.textContent = Math.round(zoomLevel * 100) + '%';
  }

  zoomIn.addEventListener('click',    e => { e.stopPropagation(); zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP); applyZoom(); });
  zoomOut.addEventListener('click',   e => { e.stopPropagation(); zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP); applyZoom(); });
  zoomReset.addEventListener('click', e => { e.stopPropagation(); zoomLevel = 1.0; applyZoom(); });

  function loadSongSheet(){
    const dataUrl = sessionStorage.getItem('viziSongFile');
    const name    = sessionStorage.getItem('viziSongName') || 'Song Sheet';
    const type    = sessionStorage.getItem('viziSongType') || '';
    if (!dataUrl) return;

    sheetTitle.textContent = name;
    sheetContent.innerHTML = '';
    zoomLevel = 1.0;

    if (dataUrl.startsWith('text:')){
      const pre = document.createElement('pre');
      pre.textContent = dataUrl.slice(5);
      sheetContent.appendChild(pre);
    } else if (type.includes('pdf')){
      const iframe = document.createElement('iframe');
      iframe.src = dataUrl;
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.minHeight = '500px';
      sheetContent.appendChild(iframe);
    } else if (type.startsWith('image/')){
      const img = document.createElement('img');
      img.src = dataUrl; img.alt = name;
      sheetContent.appendChild(img);
    } else {
      const iframe = document.createElement('iframe');
      iframe.src = dataUrl;
      sheetContent.appendChild(iframe);
    }

    applyZoom();
    sheetWrap.classList.add('show');
    sheetShowBtn.classList.remove('show');
  }

  sheetClose.addEventListener('click', () => {
    sheetWrap.classList.remove('show');
    if (sessionStorage.getItem('viziSongFile')) sheetShowBtn.classList.add('show');
  });

  sheetShowBtn.addEventListener('click', () => {
    sheetWrap.classList.add('show');
    sheetShowBtn.classList.remove('show');
  });

  // drag
  let dragOffX=0, dragOffY=0, dragging=false;
  dragHandle.addEventListener('pointerdown', e => {
    const t = e.target;
    if (t===sheetClose||t===zoomIn||t===zoomOut||t===zoomReset) return;
    dragging=true; dragHandle.setPointerCapture(e.pointerId);
    const r=sheetWrap.getBoundingClientRect();
    dragOffX=e.clientX-r.left; dragOffY=e.clientY-r.top; e.preventDefault();
  });
  dragHandle.addEventListener('pointermove', e => {
    if (!dragging) return;
    const x=Math.max(0,Math.min(window.innerWidth-sheetWrap.offsetWidth,  e.clientX-dragOffX));
    const y=Math.max(0,Math.min(window.innerHeight-sheetWrap.offsetHeight,e.clientY-dragOffY));
    sheetWrap.style.left=x+'px'; sheetWrap.style.top=y+'px'; sheetWrap.style.right='auto';
  });
  dragHandle.addEventListener('pointerup',    ()=>{ dragging=false; });
  dragHandle.addEventListener('pointercancel',()=>{ dragging=false; });

  // Resume session poll after redirect from upload page
  const storedSession = sessionStorage.getItem('viziSongSession');
  if (storedSession && !songLoaded){
    songSessionId = storedSession;
    uploadBtn.className = 'upload-btn waiting';
    uploadBtn.textContent = '⏳ Waiting for song upload…';
    setStatus('Checking for uploaded song…');
    startSongPoll();
  }

  // ─── Exercise hand-off from lessons.html ──────────────────
  // lessons.html links here as vizi.html?stage=X&exercise=Y
  // On arrival we build a context message and have Vizi open
  // the session verbally — student doesn't have to say anything.
  ;(async function checkExerciseParams(){
    const urlParams  = new URLSearchParams(window.location.search);
    const stageId    = urlParams.get('stage');
    const exerciseName = urlParams.get('exercise');
    if (!stageId || !exerciseName) return;

    // Stage metadata map — mirrors lessons.html STAGES array
    const STAGE_LABELS = {
      'tuning':       'Tuning & Setup',
      'rhythm':       'Rhythm Foundations',
      'open-chords':  'Open Chords',
      'chord-theory': 'How Chords Are Built',
      'transitions':  'Chord Transitions',
      'arpeggios':    'Arpeggios',
      'strumming':    'Strumming Patterns',
      'barre-triads': 'Barre Chords & Triads',
      'soloing':      'Soloing & Scales'
    };
    const stageLabel = STAGE_LABELS[stageId] || stageId;

    // Show a banner so the student knows Vizi knows the context
    // Show exercise context banner — no Done button needed, student uses nav
    songBanner.textContent = `📚 ${stageLabel} — ${exerciseName}`;
    songBanner.classList.add('show');

    // Auto-save progress when student navigates away (back to lessons via nav)
    window.addEventListener('beforeunload', () => {
      try {
        const p = JSON.parse(localStorage.getItem('viziProgress') || '{}');
        p[stageId] = p[stageId] || {};
        p[stageId].exercisesDone = p[stageId].exercisesDone || [];
        if (!p[stageId].exercisesDone.includes(exerciseName))
          p[stageId].exercisesDone.push(exerciseName);
        localStorage.setItem('viziProgress', JSON.stringify(p));
      } catch(e){}
    }, { once: true });

    // Build the context message for Claude
    // Tone: Vizi greets them at this specific exercise, explains
    // what to do, and invites them to start. It also issues any
    // relevant fretboard command for this exercise type.
    const message = [
      `LESSON EXERCISE START.`,
      `Stage: "${stageLabel}".`,
      `Exercise: "${exerciseName}".`,
      `Greet the student warmly, tell them exactly what to do for this specific exercise,`,
      `and give them one clear starting instruction.`,
      `If this exercise involves a chord or scale, include the appropriate fretboard command`,
      `(e.g. CHORD G, SCALE C major shape 1, CHORDS [G,C,D]) as a pipe command at the end`,
      `of your response in the standard format.`,
      `Keep your spoken response to 2–3 sentences — just enough to get them started.`,
      `End by inviting them to hold the talk button when they have a question or are ready for the next step.`
    ].join(' ');

    // Wait for the page to finish rendering before speaking
    // (ensures audioCtx is ready for the first gesture unlock pattern)
    // We store the context and play it on first button press —
    // same pattern as the song intro, avoids autoplay block.
    pendingIntroBlob = null; // clear any existing
    pendingIntroText = null;
    pendingIntroCmd  = null;

    try {
      setStatus('Loading your exercise…');
      const res = await fetch(RAILWAY_URL + '/claude-tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, mode: 'talk' })
      });
      if (res.ok && !(res.headers.get('content-type')||'').includes('application/json')){
        pendingIntroText = dec(res.headers.get('X-Vizi-Text'));
        pendingIntroCmd  = dec(res.headers.get('X-Vizi-Commands'));
        pendingIntroBlob = await res.blob();
        setBtn('intro');
        btn.innerHTML = 'Tap to start<br>exercise';
        setStatus('Exercise ready — tap to hear Vizi');
        applyMetronomeCommand(pendingIntroCmd || '');
      } else {
        setStatus('Ready — ask Vizi about this exercise');
      }
    } catch(e){
      setStatus('Ready — ask Vizi about this exercise');
    }

    // Clean the URL so reloading doesn't re-trigger the exercise
    const cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);
  })();

  // ════════════════════════════════════════════════════════
  // METRONOME — compact strip, driven by UI or by Vizi's
  // METRONOME:BPM command (colon-delimited, same as firmware)
  // ════════════════════════════════════════════════════════
  const metroTap    = document.getElementById('metroTap');
  const metroBtn    = document.getElementById('metroBtn');
  const metroSlider = document.getElementById('metroSlider');
  const metroBpmVal = document.getElementById('metroBpmVal');
  const metroTs     = document.getElementById('metroTs');

  let metroCtx = null, metroTimer = null, metroRunning = false;
  let metroBpm = 80, metroBeats = 4, metroBeat = 0;
  const TS_CYCLE = [4, 3, 2, 6, 5];

  function metroClick(accent){
    if (!metroCtx) metroCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = metroCtx.createOscillator(), g = metroCtx.createGain(), t = metroCtx.currentTime;
    o.frequency.value = accent ? 1000 : 700;
    g.gain.setValueAtTime(accent ? 0.7 : 0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(metroCtx.destination);
    o.start(t); o.stop(t + 0.07);
  }
  function metroPulse(){
    metroTap.classList.add('pulse');
    setTimeout(() => metroTap.classList.remove('pulse'), 80);
  }
  function metroLoop(){
    const ms = 60000 / metroBpm;
    metroTimer = setInterval(() => {
      metroBeat = (metroBeat + 1) % metroBeats;
      const accent = metroBeat === 0;
      metroClick(accent);
      metroPulse();
    }, ms);
  }
  function metroStart(){
    if (metroRunning) return;
    metroRunning = true; metroBeat = -1;
    metroBtn.textContent = '■'; metroBtn.classList.add('playing');
    metroLoop();
  }
  function metroStop(){
    metroRunning = false;
    if (metroTimer){ clearInterval(metroTimer); metroTimer = null; }
    metroBtn.textContent = '▶'; metroBtn.classList.remove('playing');
    metroBeat = 0;
  }
  function metroRestart(){ if (metroRunning){ metroStop(); metroStart(); } }
  function setMetroBpm(v){
    metroBpm = Math.max(40, Math.min(220, parseInt(v,10) || 80));
    metroSlider.value = metroBpm;
    metroBpmVal.textContent = metroBpm;
    metroRestart();
  }

  metroBtn.addEventListener('click', () => { metroRunning ? metroStop() : metroStart(); });
  metroSlider.addEventListener('input', () => setMetroBpm(metroSlider.value));
  metroTs.addEventListener('click', () => {
    const idx = TS_CYCLE.indexOf(metroBeats);
    metroBeats = TS_CYCLE[(idx + 1) % TS_CYCLE.length];
    metroTs.textContent = metroBeats === 6 ? '6/8' : metroBeats + '/4';
    metroBeat = 0;
    metroRestart();
  });

  // Tap tempo — average the last few taps
  let tapTimes = [];
  metroTap.addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 5) tapTimes.shift();
    if (tapTimes.length >= 2){
      const intervals = [];
      for (let i=1; i<tapTimes.length; i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
      const avgMs = intervals.reduce((a,b)=>a+b,0) / intervals.length;
      const bpm = Math.round(60000 / avgMs);
      if (bpm >= 40 && bpm <= 220) setMetroBpm(bpm);
    }
    metroPulse();
    // reset tap memory if they pause too long
    clearTimeout(metroTap._resetT);
    metroTap._resetT = setTimeout(() => { tapTimes = []; }, 2000);
  });

  // Parse "METRONOME:120" out of Vizi's pipe commands and apply + auto-start
  function applyMetronomeCommand(commandsStr){
    if (!commandsStr) return;
    const m = commandsStr.match(/METRONOME:(\d+)/i);
    if (m){
      setMetroBpm(parseInt(m[1], 10));
      metroStart();
    }
  }

  loadSongSheet();
</script>
</body>
